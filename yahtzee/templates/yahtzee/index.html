<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Yahtzee — Cinqo</title>
<style>
/* ===== RESET / BASE — identical to Cinqo ===== */
* { box-sizing: border-box; touch-action: none; user-select: none; }
html, body {
  margin: 0; height: 100%;
  background: #1a4d2e;
  font-family: system-ui, sans-serif;
  color: white;
  overflow: hidden;
}

#app {
  width: 100vw; height: 100vh;
  display: flex; flex-direction: column;
}

/* ===== SCOREBOARD ===== */
#scoreboard {
  height: 10%;
  display: flex;
  justify-content: space-around;
  align-items: center;
  background: #0d2818;
  border-bottom: 2px solid #27543a;
  font-size: 1.6rem;
  font-weight: bold;
  flex-shrink: 0;
}
.player         { color: #64748b; transition: color 0.3s; }
.player.active  { color: inherit; text-shadow: 0 0 10px currentColor; }
.player:nth-child(1).active { color: #fbbf24; }
.player:nth-child(2).active { color: #60a5fa; }
#roll-counter   { color: #94a3b8; font-size: 1rem; }

/* ===== HOLD ZONE (top — like Cinqo "stack-area") ===== */
#hold-area {
  position: relative;
  height: 17%;
  background: rgba(30,77,58,0.15);
  border-bottom: 3px solid #2d5f47;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: visible !important;
  flex-shrink: 0;
}
.area-label {
  position: absolute;
  font-size: 0.78rem;
  font-weight: bold;
  color: rgba(255,255,255,0.2);
  text-transform: uppercase;
  letter-spacing: 2px;
  pointer-events: none;
  top: 6px; left: 50%; transform: translateX(-50%);
}

/* ===== GAME CONTAINER (middle row) ===== */
#game-container {
  display: flex;
  flex: 1;
  width: 100%;
  overflow: hidden;
  min-height: 0;
}

/* ===== LEFT SIDEBAR — Yahtzee scorecard ===== */
#left-sidebar {
  width: 220px;
  background: #0d2818;
  border-right: 1px solid #27543a;
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow-y: auto;
  overflow-x: hidden;
}

#scorecard-tabs {
  display: flex;
  border-bottom: 1px solid #27543a;
  flex-shrink: 0;
}
.sc-tab {
  flex: 1;
  padding: 7px 4px;
  font-size: 0.75rem;
  font-weight: bold;
  text-align: center;
  cursor: pointer;
  color: #4a7c5e;
  border-bottom: 3px solid transparent;
  transition: all 0.2s;
  letter-spacing: 1px;
}
.sc-tab.active-tab { color: #fbbf24; border-bottom-color: #fbbf24; }
.sc-tab.p2-tab.active-tab { color: #60a5fa; border-bottom-color: #60a5fa; }

.scorecard-panel { display: none; flex-direction: column; flex: 1; }
.scorecard-panel.visible { display: flex; }

.sc-section-label {
  font-size: 0.6rem;
  font-weight: bold;
  letter-spacing: 2px;
  color: #4a7c5e;
  padding: 5px 8px 3px;
  background: #091c10;
  text-transform: uppercase;
  border-bottom: 1px solid #1a3d28;
  flex-shrink: 0;
}

.sc-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 5px 10px;
  font-size: 0.72rem;
  border-bottom: 1px solid #152a1e;
  cursor: pointer;
  transition: background 0.12s;
  min-height: 26px;
  flex-shrink: 0;
}
.sc-row:hover:not(.sc-filled):not(.sc-disabled) { background: rgba(255,255,255,0.06); }
.sc-row.sc-filled  { opacity: 0.55; cursor: default; }
.sc-row.sc-disabled{ cursor: default; }
.sc-row.sc-suggested {
  background: rgba(74,124,94,0.35);
  border-left: 3px solid #4a7c5e;
}
.sc-row.sc-suggested:hover:not(.sc-filled) { background: rgba(74,124,94,0.5); }

.sc-name { flex: 1; color: #94a3b8; }
.sc-row.sc-filled .sc-name { color: #e2e8f0; }
.sc-val {
  font-weight: bold;
  font-size: 0.9rem;
  min-width: 28px;
  text-align: right;
}
.p1-card .sc-val { color: #fbbf24; }
.p2-card .sc-val { color: #60a5fa; }
.sc-val.sc-empty { color: #2d5f47; font-size: 0.65rem; }

.sc-bonus-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 4px 10px;
  font-size: 0.64rem;
  color: #4a7c5e;
  background: #091c10;
  border-bottom: 1px solid #1a3d28;
  flex-shrink: 0;
}
.sc-bonus-row span:last-child { font-weight: bold; }

.sc-total-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 10px;
  font-size: 0.75rem;
  font-weight: bold;
  color: #94a3b8;
  background: #091c10;
  flex-shrink: 0;
  margin-top: auto;
  border-top: 2px solid #27543a;
}
.sc-total-row span:last-child { font-size: 1.1rem; }
.p1-card .sc-total-row span:last-child { color: #fbbf24; }
.p2-card .sc-total-row span:last-child { color: #60a5fa; }

/* ===== DICE TABLE ===== */
#dice-table {
  position: relative;
  flex: 1;
  background:
    radial-gradient(ellipse at 30% 40%, rgba(45,106,79,0.3) 0%, transparent 50%),
    radial-gradient(ellipse at 70% 60%, rgba(30,77,58,0.3) 0%, transparent 50%),
    linear-gradient(135deg, #1a5c3a 0%, #16502f 50%, #1a5c3a 100%);
  overflow: visible !important;
  perspective: 1200px;
  box-shadow: inset 0 0 100px rgba(0,0,0,0.3);
}

/* ===== RIGHT SIDEBAR — suggestions + logs ===== */
#right-sidebar {
  width: 200px;
  background: #0d2818;
  border-left: 1px solid #27543a;
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow: hidden;
}

#suggest-panel {
  flex: 1;
  overflow-y: auto;
  border-bottom: 1px solid #27543a;
  padding: 6px;
}
#suggest-panel h3 {
  font-size: 0.7rem;
  font-weight: bold;
  letter-spacing: 2px;
  color: #4a7c5e;
  margin: 0 0 6px;
  text-align: center;
  text-transform: uppercase;
}

.sug-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 5px 7px;
  border-radius: 5px;
  margin-bottom: 3px;
  font-size: 0.7rem;
  cursor: pointer;
  background: rgba(255,255,255,0.04);
  border: 1px solid transparent;
  transition: all 0.12s;
}
.sug-item:hover { background: rgba(74,124,94,0.35); border-color: #4a7c5e; }
.sug-item.sug-best { background: rgba(74,124,94,0.3); border-color: #4a7c5e; }
.sug-item.sug-best::before { content: '★ '; color: #fbbf24; }
.sug-pts { font-weight: bold; font-size: 0.95rem; }
.p1-sug .sug-pts { color: #fbbf24; }
.p2-sug .sug-pts { color: #60a5fa; }
.sug-pts.sug-zero { color: #2d5f47; }
.sug-hint { color: #4a7c5e; font-size: 0.6rem; }

#log-panel { padding: 6px; overflow-y: auto; height: 140px; flex-shrink: 0; }
#log-panel h3 {
  font-size: 0.65rem;
  letter-spacing: 2px;
  color: #4a7c5e;
  margin: 0 0 4px;
  text-align: center;
  text-transform: uppercase;
}
#log-list { list-style: none; padding: 0; margin: 0; font-size: 0.65rem; }
#log-list li { padding: 2px 0; border-bottom: 1px solid #1a3d28; color: #94a3b8; }

/* ===== CONTROLS ===== */
#controls {
  height: 12%;
  display: flex;
  justify-content: space-evenly;
  align-items: center;
  background: #0d2818;
  border-top: 2px solid #27543a;
  padding: 0 20px;
  flex-shrink: 0;
}
button {
  font-size: 1rem;
  font-weight: bold;
  padding: 12px 28px;
  border-radius: 12px;
  border: none;
  background: #fbbf24;
  color: #0d2818;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 4px 8px rgba(0,0,0,0.3);
}
button:hover:not(:disabled) {
  background: #fcd34d;
  transform: scale(1.05);
  box-shadow: 0 6px 12px rgba(0,0,0,0.4);
}
button:disabled {
  background: #2d5f47;
  color: #4a7c5e;
  cursor: not-allowed;
  box-shadow: none;
  transform: none;
}

/* ===== 3-D DICE — identical to Cinqo ===== */
.die-wrapper {
  position: absolute;
  width: 80px; height: 80px;
  cursor: grab;
  transition: filter 0.2s;
  z-index: 100;
  pointer-events: auto;
}
.die-wrapper.dragging {
  cursor: grabbing;
  z-index: 10000;
  filter: drop-shadow(0 8px 16px rgba(56,189,248,0.5));
}
.die-wrapper.held-die {
  position: absolute;
  cursor: grab;
}
.die-wrapper.held-die:hover { filter: drop-shadow(0 0 8px rgba(251,191,36,0.6)); }

.cube {
  width: 70px; height: 70px;
  position: absolute;
  top: 5px; left: 5px;
  transform-style: preserve-3d;
  pointer-events: none;
}

.face {
  position: absolute;
  width: 70px; height: 70px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 8px;
  backface-visibility: hidden;
  border: none;
  box-shadow: inset 0 0 0 2px rgba(0,0,0,0.25);
  filter: brightness(1);
  transition: filter 0.2s ease;
}
.face.active {
  filter: brightness(1.2);
  box-shadow: inset 0 0 0 2px rgba(0,0,0,0), 0 0 0 3px rgba(255,255,255,0.45);
}

/* P1 dice = amber, P2 dice = blue */
.p1-die .face { background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%); }
.p2-die .face { background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%); }

.face.front  { transform: rotateY(0deg)   translateZ(35px); }
.face.back   { transform: rotateY(180deg) translateZ(35px); }
.face.right  { transform: rotateY(90deg)  translateZ(35px); }
.face.left   { transform: rotateY(-90deg) translateZ(35px); }
.face.top    { transform: rotateX(90deg)  translateZ(35px); }
.face.bottom { transform: rotateX(-90deg) translateZ(35px); }

/* ===== PIPS ===== */
.pip-grid {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  grid-template-rows: repeat(3,1fr);
  width: 100%; height: 100%;
  padding: 12%;
}
.pip {
  width: 13px; height: 13px;
  border-radius: 50%;
  background: rgba(0,0,0,0.82);
  justify-self: center;
  align-self: center;
}

/* ===== HELD-DIE PLACEHOLDER SLOTS in hold-area ===== */
.hold-slot-ghost {
  width: 80px; height: 80px;
  border: 2px dashed rgba(255,255,255,0.12);
  border-radius: 12px;
  flex-shrink: 0;
}

/* ===== SCORE POPUP (reused from Cinqo) ===== */
#score-popup {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%) scale(0.8);
  background: linear-gradient(135deg, #16402f 0%, #0d2818 100%);
  border: 3px solid #fbbf24;
  border-radius: 20px;
  padding: 36px 52px;
  z-index: 20000;
  opacity: 0;
  transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.8);
  color: white;
}
#score-popup.p2-popup   { border-color: #60a5fa; }
#score-popup.show        { opacity:1; transform: translate(-50%,-50%) scale(1); }
#score-popup h2          { margin: 0 0 16px; font-size: 1.8rem; color: #fbbf24; }
#score-popup.p2-popup h2 { color: #60a5fa; }
#score-popup .score-detail { font-size: 1.1rem; margin: 8px 0; color: #94a3b8; }
#score-popup .final-score  {
  font-size: 2.2rem; font-weight: bold; color: #fbbf24;
  margin: 16px 0; text-shadow: 0 0 20px rgba(251,191,36,0.5);
}
#score-popup.p2-popup .final-score { color: #60a5fa; text-shadow: 0 0 20px rgba(96,165,250,0.5); }
#score-popup button { margin-top: 16px; font-size: 1.1rem; }

/* ===== WINNER + FIREWORKS (identical to Cinqo) ===== */
#fireworks-canvas {
  position: fixed; top: 0; left: 0;
  width: 100vw; height: 100vh;
  z-index: 29999; pointer-events: none;
}
#winner-overlay {
  position: fixed; inset: 0;
  z-index: 30000;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity 0.5s ease;
}
#winner-overlay.show { opacity: 1; }
#winner-box {
  background: linear-gradient(145deg, #111d15, #0d2818, #0a1f12);
  border: 3px solid rgba(255,255,255,0.15);
  border-radius: 28px;
  padding: 50px 70px 45px;
  text-align: center;
  box-shadow: 0 0 60px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.08);
  max-width: 520px; width: 90vw;
  animation: winner-pulse 2s ease-in-out infinite alternate;
}
@keyframes winner-pulse {
  from { box-shadow: 0 0 60px rgba(0,0,0,0.7); }
  to   { box-shadow: 0 0 80px rgba(0,0,0,0.8), 0 0 40px rgba(255,255,255,0.06); }
}
.winner-trophy { font-size: 4rem; display: block; margin-bottom: 10px;
  animation: trophy-bounce 1s ease-in-out infinite alternate; }
@keyframes trophy-bounce {
  from { transform: translateY(0); } to { transform: translateY(-8px); }
}
.winner-title { margin: 0 0 8px; font-size: 2.4rem; font-weight: 900; letter-spacing: 3px; }
.winner-final-score { font-size: 1.2rem; font-weight: 600; margin-bottom: 24px; opacity: 0.9; }
.winner-scoreboard {
  display: flex; align-items: center; justify-content: center;
  gap: 20px; margin-bottom: 28px;
}
.winner-player { display: flex; flex-direction: column; align-items: center; gap: 4px;
  opacity: 0.4; transition: opacity 0.3s; }
.winner-player.winner-active { opacity: 1; }
.wp-label { font-size: 0.85rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }
.wp-score { font-size: 2rem; font-weight: 800; color: #94a3b8; }
.winner-vs { font-size: 1rem; color: #4a7c5e; font-weight: 700; letter-spacing: 2px; }
#winner-box button {
  font-size: 1.1rem; padding: 14px 44px;
  background: linear-gradient(135deg, #fbbf24, #f59e0b);
  border-radius: 14px; box-shadow: 0 4px 18px rgba(251,191,36,0.4);
}
#winner-box button:hover { transform: scale(1.06); }
</style>
</head>
<body>
<div id="app">

  <!-- SCOREBOARD -->
  <div id="scoreboard">
    <div class="player active" id="p1-banner">P1: <span id="p1score">0</span></div>
    <div id="roll-counter">Roll <span id="rolls">0</span> / 3</div>
    <div class="player" id="p2-banner">P2: <span id="p2score">0</span></div>
  </div>

  <!-- HOLD ZONE (top) — dice dragged here are kept between rolls -->
  <div id="hold-area">
    <div class="area-label">HOLD — drag dice here to keep between rolls</div>
  </div>

  <!-- MIDDLE: scorecard | dice table | suggestions -->
  <div id="game-container">

    <!-- LEFT: Yahtzee scorecard -->
    <div id="left-sidebar">
      <div id="scorecard-tabs">
        <div class="sc-tab active-tab"   id="tab-p1" onclick="switchTab(0)">P1 CARD</div>
        <div class="sc-tab p2-tab"       id="tab-p2" onclick="switchTab(1)">P2 CARD</div>
      </div>
      <div class="scorecard-panel p1-card visible" id="panel-p1"></div>
      <div class="scorecard-panel p2-card"         id="panel-p2"></div>
    </div>

    <!-- CENTRE: dice bounce here -->
    <div id="dice-table"></div>

    <!-- RIGHT: suggestions + log -->
    <div id="right-sidebar">
      <div id="suggest-panel">
        <h3>SUGGESTIONS</h3>
        <div id="suggest-list"><p class="sug-hint" style="text-align:center;padding:12px 0">Roll to see options</p></div>
      </div>
      <div id="log-panel">
        <h3>TURN LOG</h3>
        <ul id="log-list"></ul>
      </div>
    </div>

  </div><!-- /game-container -->

  <!-- CONTROLS -->
  <div id="controls">
    <button id="rollBtn">Roll Dice</button>
    <button id="scoreBtn" disabled>Score a Category</button>
    <button id="newGameBtn" onclick="confirmNew()" style="background:#2d5f47;color:#94a3b8;font-size:0.85rem;padding:10px 18px;">New Game</button>
  </div>

</div><!-- /app -->

<script>
// ================================================================
//  CONSTANTS — physics identical to Cinqo
// ================================================================
const DIE_SIZE      = 80;
const NUM_DICE      = 5;
const MAX_ROLLS     = 3;
const GRAVITY       = 0.55;
const BOUNCE_DAMP   = 0.52;
const FRICTION      = 0.90;
const MIN_VEL       = 0.5;

const FLAT_ROTATIONS = {
  1:{x:0,  y:0,   z:0},
  2:{x:-90,y:0,   z:0},
  3:{x:0,  y:-90, z:0},
  4:{x:0,  y:90,  z:0},
  5:{x:90, y:0,   z:0},
  6:{x:0,  y:180, z:0}
};
const VALUE_TO_FACE = {1:'front',2:'top',3:'right',4:'left',5:'bottom',6:'back'};

// ================================================================
//  YAHTZEE CATEGORIES
// ================================================================
const UPPER = [
  {key:'ones',  name:'Ones',   hint:'Sum of 1s'},
  {key:'twos',  name:'Twos',   hint:'Sum of 2s'},
  {key:'threes',name:'Threes', hint:'Sum of 3s'},
  {key:'fours', name:'Fours',  hint:'Sum of 4s'},
  {key:'fives', name:'Fives',  hint:'Sum of 5s'},
  {key:'sixes', name:'Sixes',  hint:'Sum of 6s'},
];
const LOWER = [
  {key:'threeKind', name:'3 of a Kind',  hint:'≥3 alike → sum all'},
  {key:'fourKind',  name:'4 of a Kind',  hint:'≥4 alike → sum all'},
  {key:'fullHouse', name:'Full House',   hint:'3+2 → 25 pts'},
  {key:'smStr',     name:'Sm. Straight', hint:'4 seq → 30 pts'},
  {key:'lgStr',     name:'Lg. Straight', hint:'5 seq → 40 pts'},
  {key:'yahtzee',   name:'YAHTZEE',      hint:'5 alike → 50 pts'},
  {key:'chance',    name:'Chance',       hint:'Sum of all'},
];

function calcScore(key, vals) {
  const c = [0,0,0,0,0,0,0];
  vals.forEach(v=>c[v]++);
  const sum = vals.reduce((a,b)=>a+b,0);
  switch(key) {
    case 'ones':      return c[1]*1;
    case 'twos':      return c[2]*2;
    case 'threes':    return c[3]*3;
    case 'fours':     return c[4]*4;
    case 'fives':     return c[5]*5;
    case 'sixes':     return c[6]*6;
    case 'threeKind': return c.some(v=>v>=3)?sum:0;
    case 'fourKind':  return c.some(v=>v>=4)?sum:0;
    case 'fullHouse': return (c.some(v=>v===3)&&c.some(v=>v===2))?25:0;
    case 'smStr': {
      const u=[...new Set(vals)].sort((a,b)=>a-b);
      let best=1,cur=1;
      for(let i=1;i<u.length;i++){cur=(u[i]===u[i-1]+1)?cur+1:1;best=Math.max(best,cur);}
      return best>=4?30:0;
    }
    case 'lgStr': {
      const u=[...new Set(vals)].sort((a,b)=>a-b);
      if(u.length<5)return 0;
      let s=1;for(let i=1;i<u.length;i++)s=(u[i]===u[i-1]+1)?s+1:1;
      return s>=5?40:0;
    }
    case 'yahtzee': return c.some(v=>v===5)?50:0;
    case 'chance':  return sum;
  }
  return 0;
}

function upperTotal(p) {
  return UPPER.reduce((s,cat)=>{const v=scoreData[p][cat.key];return s+(v!==null?v:0);},0);
}
function bonus(p){ return upperTotal(p)>=63?35:0; }
function grandTotal(p){
  const lo=LOWER.reduce((s,cat)=>{const v=scoreData[p][cat.key];return s+(v!==null?v:0);},0);
  return upperTotal(p)+bonus(p)+lo;
}

// ================================================================
//  GAME STATE
// ================================================================
function blankScores(){
  return {ones:null,twos:null,threes:null,fours:null,fives:null,sixes:null,
          threeKind:null,fourKind:null,fullHouse:null,smStr:null,lgStr:null,yahtzee:null,chance:null};
}

let scoreData   = [blankScores(), blankScores()];
let currentPlayer = 0;  // 0 or 1
let rollsThisTurn = 0;
let diceAreFlying = false;
let animationFrame= null;
let draggedDie    = null;
let allDice       = [];  // physics objects
let hasRolled     = false;

// ================================================================
//  DOM REFS
// ================================================================
const diceTable   = document.getElementById('dice-table');
const holdArea    = document.getElementById('hold-area');
const rollBtn     = document.getElementById('rollBtn');
const scoreBtn    = document.getElementById('scoreBtn');
const rollsDisplay= document.getElementById('rolls');
const p1Score     = document.getElementById('p1score');
const p2Score     = document.getElementById('p2score');
const p1Banner    = document.getElementById('p1-banner');
const p2Banner    = document.getElementById('p2-banner');

// ================================================================
//  PIP CREATION — identical to Cinqo
// ================================================================
function createPips(value) {
  const container = document.createElement('div');
  container.className = 'pip-grid';
  const pipMap = {
    1:[[2,2]],
    2:[[1,1],[3,3]],
    3:[[1,1],[2,2],[3,3]],
    4:[[1,1],[1,3],[3,1],[3,3]],
    5:[[1,1],[1,3],[2,2],[3,1],[3,3]],
    6:[[1,1],[1,2],[1,3],[3,1],[3,2],[3,3]]
  };
  pipMap[value].forEach(([col,row])=>{
    const pip = document.createElement('div');
    pip.className = 'pip';
    pip.style.gridColumn = col;
    pip.style.gridRow    = row;
    container.appendChild(pip);
  });
  return container;
}

function rebuildFaces(die) {
  die.cube.innerHTML = '';
  const sides  = ['front','back','right','left','top','bottom'];
  const values = [1,6,3,4,2,5];
  sides.forEach((side,i)=>{
    const face = document.createElement('div');
    face.className = `face ${side}`;
    face.appendChild(createPips(values[i]));
    die.cube.appendChild(face);
  });
}

function highlightFace(die) {
  die.cube.querySelectorAll('.face').forEach(f=>f.classList.remove('active'));
  const face = die.cube.querySelector(`.face.${VALUE_TO_FACE[die.value]}`);
  if(face) face.classList.add('active');
}

// ================================================================
//  CREATE DIE
// ================================================================
function rand(a,b){ return Math.random()*(b-a)+a; }

function createDie(id) {
  const wrapper = document.createElement('div');
  wrapper.className = `die-wrapper p${currentPlayer+1}-die`;
  wrapper.dataset.id = id;

  const cube = document.createElement('div');
  cube.className = 'cube';
  wrapper.appendChild(cube);
  diceTable.appendChild(wrapper);

  const tableRect = diceTable.getBoundingClientRect();
  const cx = tableRect.width/2;

  const die = {
    id, wrapper, cube,
    x: cx + rand(-120,120) - 40,
    y: -90,
    vx:0, vy:0, angularV:0,
    rotation:{x:rand(0,360),y:rand(0,360),z:rand(0,360)},
    value:1,
    zone:'table',   // 'table' | 'hold'
    settled:true,
    isCollided:false,
    settleFrames:0
  };

  rebuildFaces(die);
  wrapper.addEventListener('mousedown', e=>startDrag(e,die));
  wrapper.addEventListener('touchstart', e=>startDrag(e.touches[0],die),{passive:true});
  allDice.push(die);
  return die;
}

function wakeDie(die){
  die.settled=false;
  die.isCollided=false;
  die.settleFrames=0;
  die.angularV=rand(-15,15);
}

// ================================================================
//  DRAG & DROP
// ================================================================
function startDrag(e, die) {
  if(!hasRolled || diceAreFlying) return;
  draggedDie = die;
  die.wrapper.classList.add('dragging');

  const rect = die.wrapper.getBoundingClientRect();
  die.wrapper.style.left   = rect.left+'px';
  die.wrapper.style.top    = rect.top +'px';
  die.wrapper.style.zIndex = '10000';
  document.getElementById('app').appendChild(die.wrapper);
}

function getDragPos(e){ return e.touches ? e.touches[0] : e; }

document.addEventListener('mousemove', e=>moveDrag(e));
document.addEventListener('touchmove', e=>moveDrag(e.touches[0]),{passive:true});
function moveDrag(e){
  if(!draggedDie) return;
  draggedDie.wrapper.style.left = (e.clientX-40)+'px';
  draggedDie.wrapper.style.top  = (e.clientY-40)+'px';
}

document.addEventListener('mouseup', e=>endDrag(e));
document.addEventListener('touchend', e=>endDrag(e.changedTouches[0]));
function endDrag(e){
  if(!draggedDie) return;
  const die = draggedDie;
  die.wrapper.classList.remove('dragging');
  draggedDie = null;

  const holdRect  = holdArea.getBoundingClientRect();
  const tableRect = diceTable.getBoundingClientRect();
  const y = e.clientY;

  if(y >= holdRect.top && y <= holdRect.bottom) {
    // → hold zone
    die.zone = 'hold';
    holdArea.appendChild(die.wrapper);
    die.wrapper.classList.add('held-die');
    die.wrapper.style.position = 'absolute';
    layoutHeldDice();
  } else if(y >= tableRect.top && y <= tableRect.bottom) {
    // → back to table
    if(die.zone==='hold') die.wrapper.classList.remove('held-die');
    die.zone = 'table';
    diceTable.appendChild(die.wrapper);
    die.wrapper.style.position = 'absolute';
    const pr = diceTable.getBoundingClientRect();
    die.x = Math.max(0, Math.min(e.clientX - pr.left - 40, pr.width-85));
    die.y = Math.max(0, Math.min(e.clientY - pr.top  - 40, pr.height-85));
    die.wrapper.style.left = die.x+'px';
    die.wrapper.style.top  = die.y+'px';
    die.wrapper.style.zIndex = '';
    wakeDie(die);
  } else {
    // dropped outside — return to previous parent
    if(die.zone==='hold'){
      holdArea.appendChild(die.wrapper);
      layoutHeldDice();
    } else {
      diceTable.appendChild(die.wrapper);
      die.wrapper.style.left = die.x+'px';
      die.wrapper.style.top  = die.y+'px';
      die.wrapper.style.zIndex = '';
    }
  }
  updateScoreBtn();
}

function layoutHeldDice(){
  const held = allDice.filter(d=>d.zone==='hold');
  const areaW = holdArea.clientWidth;
  const totalW = held.length * 80 + Math.max(0, held.length-1)*12;
  let startX = (areaW - totalW)/2;
  const topY = (holdArea.clientHeight - 80)/2;
  held.forEach(d=>{
    d.wrapper.style.left     = startX+'px';
    d.wrapper.style.top      = topY+'px';
    d.wrapper.style.position = 'absolute';
    d.wrapper.style.zIndex   = '';
    startX += 92;
  });
}

// ================================================================
//  ROLL
// ================================================================
function rollDice(){
  if(rollsThisTurn >= MAX_ROLLS || diceAreFlying) return;

  const tableDice = allDice.filter(d=>d.zone==='table');
  if(tableDice.length===0){ showToast('All dice are held — drag some back!'); return; }

  rollsThisTurn++;
  rollsDisplay.textContent = rollsThisTurn;
  hasRolled = true;
  diceAreFlying = true;

  tableDice.forEach(die=>{
    wakeDie(die);
    die.value = Math.floor(Math.random()*6)+1;
    rebuildFaces(die);      // repaint faces before flight
    die.vx = rand(-9,9);
    die.vy = rand(-17,-11);
    die.angularV = rand(-20,20);
  });

  if(!animationFrame) animate();
  rollBtn.disabled = rollsThisTurn >= MAX_ROLLS;
  updateScoreBtn();
  renderSuggestions();
}

// ================================================================
//  PHYSICS LOOP — identical to Cinqo
// ================================================================
function animate(){
  let stillMoving = false;
  const tableRect = diceTable.getBoundingClientRect();

  allDice.forEach(die=>{
    if(die.zone!=='table' || die.settled) return;
    stillMoving = true;

    die.vy += GRAVITY;
    die.x  += die.vx;
    die.y  += die.vy;
    die.vx *= FRICTION;

    // die-to-die repulsion
    allDice.forEach(other=>{
      if(other===die || other.zone!=='table') return;
      const dx=die.x-other.x, dy=die.y-other.y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<75){
        const ang=Math.atan2(dy,dx);
        die.vx += Math.cos(ang)*0.8;
        die.vy += Math.sin(ang)*0.8;
      }
    });

    // floor / walls
    if(die.y > tableRect.height-85){
      die.y = tableRect.height-85;
      die.vy *= -BOUNCE_DAMP;
      die.isCollided = true;
    }
    if(die.x < 0){ die.vx*=-BOUNCE_DAMP; die.x=0; }
    if(die.x > tableRect.width-85){ die.vx*=-BOUNCE_DAMP; die.x=tableRect.width-85; }

    // rotation
    if(die.isCollided){
      const t=FLAT_ROTATIONS[die.value];
      die.rotation.x += (t.x-die.rotation.x)*0.12;
      die.rotation.y += (t.y-die.rotation.y)*0.12;
      die.rotation.z += (0  -die.rotation.z)*0.12;
      die.angularV   *= 0.8;
    } else {
      die.rotation.x += die.angularV;
      die.rotation.y += die.angularV;
      die.rotation.z += die.angularV;
    }

    // settle check
    if(Math.abs(die.vx)<MIN_VEL && Math.abs(die.vy)<1 && die.isCollided){
      if(++die.settleFrames>30){
        die.settled=true; die.vx=0; die.vy=0;
      }
    }

    die.wrapper.style.left = die.x+'px';
    die.wrapper.style.top  = die.y+'px';
    die.cube.style.transform = `rotateX(${die.rotation.x}deg) rotateY(${die.rotation.y}deg) rotateZ(${die.rotation.z}deg)`;
  });

  if(stillMoving){
    animationFrame = requestAnimationFrame(animate);
  } else {
    animationFrame = null;
    diceAreFlying  = false;
    // highlight active face on settled dice
    allDice.forEach(d=>{ if(d.zone==='table') highlightFace(d); });
    renderSuggestions();
    updateScoreBtn();
  }
}

// ================================================================
//  SCORE BUTTON / SIDEBAR FLOW
// ================================================================
function updateScoreBtn(){
  scoreBtn.disabled = !hasRolled || diceAreFlying;
}

// Allow clicking a suggestion or scorecard row directly
function scoreCategory(key){
  if(!hasRolled || diceAreFlying){ showToast('Roll the dice first!'); return; }
  const p = currentPlayer;
  if(scoreData[p][key]!==null){ showToast('Already scored!'); return; }

  const vals = allDice.map(d=>d.value);
  const pts  = calcScore(key, vals);
  scoreData[p][key] = pts;

  const catName = [...UPPER,...LOWER].find(c=>c.key===key)?.name || key;
  addLog(`${catName}: +${pts}`);

  if(key==='yahtzee' && pts===50) showToast('YAHTZEE! 🎲');

  renderScorecard(0); renderScorecard(1);

  // check game over
  const done = [0,1].every(pp=>[...UPPER,...LOWER].every(c=>scoreData[pp][c.key]!==null));
  if(done){ showWinner(); return; }

  showTurnPopup(pts, catName);
}

// ================================================================
//  SCORECARD RENDERING
// ================================================================
let activeTab = 0;

function switchTab(p){
  activeTab = p;
  document.getElementById('tab-p1').classList.toggle('active-tab', p===0);
  document.getElementById('tab-p2').classList.toggle('active-tab', p===1);
  document.getElementById('tab-p2').classList.toggle('p2-tab',     true);
  document.getElementById('panel-p1').classList.toggle('visible', p===0);
  document.getElementById('panel-p2').classList.toggle('visible', p===1);
}

function renderScorecard(p){
  const panel = document.getElementById(`panel-p${p+1}`);
  const isCur = p===currentPlayer;
  const sc     = scoreData[p];
  const cls    = `p${p+1}-card`;

  // highlighted categories = non-null potential
  const suggested = new Set();
  if(isCur && hasRolled && !diceAreFlying){
    const vals = allDice.map(d=>d.value);
    [...UPPER,...LOWER].forEach(cat=>{
      if(sc[cat.key]===null && calcScore(cat.key,vals)>0) suggested.add(cat.key);
    });
  }

  const uTotal = upperTotal(p);
  const bon    = bonus(p);
  const needed = Math.max(0,63-uTotal);

  let html = `<div class="sc-section-label">UPPER SECTION</div>`;
  UPPER.forEach(cat=>{
    const v=sc[cat.key], filled=v!==null, sug=suggested.has(cat.key);
    const rowCls=[filled?'sc-filled':'', sug?'sc-suggested':'', !isCur?'sc-disabled':'', cls].filter(Boolean).join(' ');
    html+=`<div class="sc-row ${rowCls}" onclick="scoreCategory('${cat.key}')" title="${cat.hint}">
      <span class="sc-name">${cat.name}</span>
      <span class="sc-val${filled?'':' sc-empty'}">${filled?v:'—'}</span>
    </div>`;
  });
  html+=`<div class="sc-bonus-row">
    <span>Bonus (need ${needed})</span>
    <span>${bon>0?'+35 ✓':'—'}</span>
  </div>`;
  html+=`<div class="sc-section-label">LOWER SECTION</div>`;
  LOWER.forEach(cat=>{
    const v=sc[cat.key], filled=v!==null, sug=suggested.has(cat.key);
    const rowCls=[filled?'sc-filled':'', sug?'sc-suggested':'', !isCur?'sc-disabled':'', cls].filter(Boolean).join(' ');
    html+=`<div class="sc-row ${rowCls}" onclick="scoreCategory('${cat.key}')" title="${cat.hint}">
      <span class="sc-name">${cat.name}</span>
      <span class="sc-val${filled?'':' sc-empty'}">${filled?v:'—'}</span>
    </div>`;
  });
  html+=`<div class="sc-total-row"><span>TOTAL</span><span>${grandTotal(p)}</span></div>`;
  panel.innerHTML = html;

  // update scoreboard totals
  document.getElementById(`p${p+1}score`).textContent = grandTotal(p);
}

// ================================================================
//  SUGGESTIONS PANEL
// ================================================================
function renderSuggestions(){
  const list = document.getElementById('suggest-list');
  const p    = currentPlayer;

  if(!hasRolled || diceAreFlying){
    list.innerHTML = `<p class="sug-hint" style="text-align:center;padding:12px 0">Roll to see options</p>`;
    return;
  }

  const vals = allDice.map(d=>d.value);
  const opts = [...UPPER,...LOWER]
    .filter(cat=>scoreData[p][cat.key]===null)
    .map(cat=>({...cat, pts:calcScore(cat.key,vals)}))
    .sort((a,b)=>b.pts-a.pts);

  if(!opts.length){ list.innerHTML='<p class="sug-hint" style="text-align:center;">All filled</p>'; return; }

  const best = opts[0].pts;
  const pCls = `p${p+1}-sug`;
  list.innerHTML = opts.map((o,i)=>{
    const isBest = i===0 && o.pts===best && o.pts>0;
    return `<div class="sug-item ${pCls}${isBest?' sug-best':''}" onclick="scoreCategory('${o.key}')">
      <span>${o.name}</span>
      <span class="sug-pts${o.pts===0?' sug-zero':''}">${o.pts}</span>
    </div>`;
  }).join('');
}

// ================================================================
//  LOG
// ================================================================
function addLog(msg){
  const li = document.createElement('li');
  li.textContent = `P${currentPlayer+1}: ${msg}`;
  li.style.color = currentPlayer===0?'#fbbf24':'#60a5fa';
  document.getElementById('log-list').prepend(li);
}

// ================================================================
//  TURN POPUP
// ================================================================
function showTurnPopup(pts, catName){
  const existing = document.getElementById('score-popup');
  if(existing) existing.remove();

  const p = currentPlayer;
  const popup = document.createElement('div');
  popup.id = 'score-popup';
  if(p===1) popup.classList.add('p2-popup');

  popup.innerHTML = `
    <h2>Player ${p+1}</h2>
    <div class="score-detail">${catName}</div>
    <div class="final-score">+${pts} pts</div>
    <button onclick="nextTurn()">Continue →</button>
  `;
  document.body.appendChild(popup);
  setTimeout(()=>popup.classList.add('show'),40);
}

// ================================================================
//  NEXT TURN
// ================================================================
function nextTurn(){
  const popup = document.getElementById('score-popup');
  if(popup) popup.remove();

  currentPlayer = currentPlayer===0?1:0;

  // update active banner
  p1Banner.classList.toggle('active', currentPlayer===0);
  p2Banner.classList.toggle('active', currentPlayer===1);

  // auto-switch scorecard tab to current player
  switchTab(currentPlayer);

  // clear dice
  allDice.forEach(d=>d.wrapper.remove());
  allDice = [];
  rollsThisTurn = 0;
  hasRolled     = false;
  diceAreFlying = false;
  if(animationFrame){ cancelAnimationFrame(animationFrame); animationFrame=null; }

  rollsDisplay.textContent = '0';
  rollBtn.disabled  = false;
  scoreBtn.disabled = true;

  initDice();
  renderScorecard(0); renderScorecard(1);
  renderSuggestions();
}

// ================================================================
//  INIT DICE
// ================================================================
function initDice(){
  for(let i=0;i<NUM_DICE;i++) createDie(i);
}

// ================================================================
//  WINNER SCREEN — identical Cinqo fireworks
// ================================================================
function showWinner(){
  const t0=grandTotal(0), t1=grandTotal(1);
  const winner = t0>t1?0:t1>t0?1:-1;
  const wColor = winner===0?'#fbbf24':winner===1?'#60a5fa':'#94a3b8';
  const wName  = winner===-1?'IT\'S A TIE!':`PLAYER ${winner+1} WINS!`;

  const canvas = document.createElement('canvas');
  canvas.id='fireworks-canvas';
  canvas.width=window.innerWidth; canvas.height=window.innerHeight;
  document.body.appendChild(canvas);
  const ctx=canvas.getContext('2d');

  const overlay=document.createElement('div');
  overlay.id='winner-overlay';
  overlay.innerHTML=`
    <div id="winner-box">
      <div class="winner-trophy">🏆</div>
      <h1 class="winner-title" style="color:${wColor};text-shadow:0 0 30px ${wColor}">${wName}</h1>
      <div class="winner-scoreboard">
        <div class="winner-player ${winner===0?'winner-active':''}">
          <span class="wp-label">Player 1</span>
          <span class="wp-score" style="${winner===0?'color:#fbbf24':''}">${t0}</span>
        </div>
        <div class="winner-vs">VS</div>
        <div class="winner-player ${winner===1?'winner-active':''}">
          <span class="wp-label">Player 2</span>
          <span class="wp-score" style="${winner===1?'color:#60a5fa':''}">${t1}</span>
        </div>
      </div>
      <button onclick="location.reload()">Play Again 🎲</button>
    </div>`;
  document.body.appendChild(overlay);
  requestAnimationFrame(()=>overlay.classList.add('show'));

  // fireworks
  const PAL=['#fbbf24','#60a5fa','#a855f7','#f43f5e','#34d399','#fb923c','#fff','#fde68a'];
  let parts=[];
  class Spark{
    constructor(x,y){
      this.x=x;this.y=y;
      const a=Math.random()*Math.PI*2, sp=1.5+Math.random()*4;
      this.vx=Math.cos(a)*sp; this.vy=Math.sin(a)*sp;
      this.life=1; this.decay=0.006+Math.random()*0.018;
      this.size=2+Math.random()*3;
      this.color=PAL[Math.floor(Math.random()*PAL.length)];
    }
    update(){this.x+=this.vx;this.y+=this.vy;this.vy+=0.045;this.vx*=0.995;this.life-=this.decay;}
    draw(){
      ctx.save();ctx.globalAlpha=Math.max(0,this.life);ctx.fillStyle=this.color;
      ctx.shadowBlur=8;ctx.shadowColor=this.color;ctx.beginPath();
      ctx.arc(this.x,this.y,this.size*this.life,0,Math.PI*2);ctx.fill();ctx.restore();
    }
  }
  function burst(x,y,n){for(let i=0;i<n;i++)parts.push(new Spark(x,y));}
  let lastL=0;
  function fwLoop(t){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    if(t-lastL>350+Math.random()*350){
      burst(80+Math.random()*(canvas.width-160),60+Math.random()*(canvas.height*0.38),55+Math.floor(Math.random()*40));
      lastL=t;
    }
    for(let i=parts.length-1;i>=0;i--){parts[i].update();parts[i].draw();if(parts[i].life<=0)parts.splice(i,1);}
    requestAnimationFrame(fwLoop);
  }
  burst(canvas.width*.25,canvas.height*.25,60);
  burst(canvas.width*.75,canvas.height*.20,55);
  burst(canvas.width*.50,canvas.height*.35,65);
  requestAnimationFrame(fwLoop);
}

// ================================================================
//  UTILITIES
// ================================================================
let toastTimer;
function showToast(msg){
  let t=document.getElementById('__toast');
  if(!t){
    t=document.createElement('div');
    t.id='__toast';
    Object.assign(t.style,{
      position:'fixed',bottom:'90px',left:'50%',transform:'translateX(-50%) translateY(40px)',
      background:'#fbbf24',color:'#0d2818',fontWeight:'bold',fontSize:'0.9rem',
      padding:'10px 24px',borderRadius:'10px',zIndex:'25000',
      transition:'transform 0.25s',pointerEvents:'none',whiteSpace:'nowrap'
    });
    document.body.appendChild(t);
  }
  t.textContent=msg;
  t.style.transform='translateX(-50%) translateY(0)';
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{ t.style.transform='translateX(-50%) translateY(40px)'; },2000);
}

function confirmNew(){
  if(confirm('Start a new game? All progress will be lost.')) location.reload();
}

// ================================================================
//  SCORE BTN MODAL — pick a category from list
// ================================================================
scoreBtn.addEventListener('click',()=>{
  // just scroll the scorecard tab into view & pulse it
  switchTab(currentPlayer);
  const panel=document.getElementById(`panel-p${currentPlayer+1}`);
  panel.style.transition='background 0.2s';
  panel.style.background='rgba(74,124,94,0.2)';
  setTimeout(()=>{ panel.style.background=''; },400);
  showToast('Click a category on the scorecard →');
});

// ================================================================
//  BOOT
// ================================================================
rollBtn.addEventListener('click', rollDice);
p1Banner.classList.add('active');
initDice();
renderScorecard(0);
renderScorecard(1);
switchTab(0);
</script>
