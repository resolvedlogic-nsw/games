<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Yahtzee — Cinqo</title>
<style>
* { box-sizing: border-box; touch-action: none; user-select: none; }
html, body { margin:0; height:100%; background:#1a4d2e; font-family:system-ui,sans-serif; color:white; overflow:hidden; }
#app { width:100vw; height:100vh; display:flex; flex-direction:column; }

/* MODE SELECT OVERLAY */
#mode-overlay {
  position:fixed; inset:0; z-index:50000;
  background:linear-gradient(135deg,#0d2818 0%,#1a4d2e 50%,#0d2818 100%);
  display:flex; align-items:center; justify-content:center;
  transition: opacity 0.4s ease;
}
#mode-overlay.hide { opacity:0; pointer-events:none; }
#mode-box {
  text-align:center; padding:50px 60px;
  background:rgba(0,0,0,0.3); border:2px solid #27543a;
  border-radius:24px; box-shadow:0 20px 60px rgba(0,0,0,0.6);
  max-width:440px; width:90vw;
}
#mode-box h1 { font-size:2.8rem; margin:0 0 6px; letter-spacing:3px; color:#fbbf24; text-shadow:0 0 30px rgba(251,191,36,0.4); }
#mode-box p { color:#4a7c5e; font-size:0.9rem; margin:0 0 36px; letter-spacing:2px; text-transform:uppercase; }
.mode-btn {
  display:block; width:100%; margin:12px 0; padding:18px 24px;
  font-size:1.15rem; font-weight:bold; border-radius:14px; border:2px solid transparent;
  cursor:pointer; transition:all 0.2s; text-align:center;
}
.mode-btn-p2 { background:#fbbf24; color:#0d2818; border-color:#fbbf24; }
.mode-btn-p2:hover { background:#fcd34d; transform:scale(1.03); box-shadow:0 6px 20px rgba(251,191,36,0.4); }
.mode-btn-cpu { background:transparent; color:#60a5fa; border-color:#60a5fa; }
.mode-btn-cpu:hover { background:rgba(96,165,250,0.12); transform:scale(1.03); box-shadow:0 6px 20px rgba(96,165,250,0.3); }
.mode-sub { font-size:0.75rem; opacity:0.7; display:block; margin-top:3px; font-weight:normal; }

/* CPU THINKING INDICATOR */
#cpu-thinking {
  position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
  background:rgba(13,40,24,0.95); border:2px solid #60a5fa; border-radius:16px;
  padding:20px 36px; z-index:40000; text-align:center;
  opacity:0; transition:opacity 0.3s; pointer-events:none;
}
#cpu-thinking.show { opacity:1; }
#cpu-thinking p { margin:0; color:#60a5fa; font-size:1rem; font-weight:bold; letter-spacing:2px; }
.cpu-dots span { animation:blink 1.2s infinite; display:inline-block; }
.cpu-dots span:nth-child(2) { animation-delay:0.2s; }
.cpu-dots span:nth-child(3) { animation-delay:0.4s; }
@keyframes blink { 0%,80%,100%{opacity:0} 40%{opacity:1} }

/* SCOREBOARD */
#scoreboard {
  height:9%; display:flex; justify-content:space-around; align-items:center;
  background:#0d2818; border-bottom:2px solid #27543a;
  font-size:1.7rem; font-weight:bold; flex-shrink:0;
}
.player { color:#64748b; transition:color 0.3s; }
.player.active { color:inherit; text-shadow:0 0 10px currentColor; }
.player:nth-child(1).active { color:#fbbf24; }
.player:nth-child(3).active { color:#60a5fa; }
#roll-counter { color:#94a3b8; font-size:1rem; text-align:center; line-height:1.4; }
/* HOLD BAR */
#hold-bar {
  position:relative; height:16%;
  background:rgba(20,60,40,0.25); border-bottom:3px solid #2d5f47;
  display:flex; align-items:center; flex-shrink:0; overflow:visible !important;
}
#hold-area {
  position:relative; flex:1; height:100%;
  display:flex; align-items:center; justify-content:center; gap:16px;
  overflow:visible !important;
}
.hold-slot-marker {
  width:80px; height:80px;
  border:2px dashed rgba(255,255,255,0.15);
  border-radius:12px;
  background:rgba(0,0,0,0.1);
  flex-shrink:0;
  position: relative;
}
.area-label {
  position:absolute; font-size:0.68rem; font-weight:bold;
  color:rgba(255,255,255,0.18); text-transform:uppercase; letter-spacing:2px;
  pointer-events:none; bottom:4px; left:50%; transform:translateX(-50%); white-space:nowrap;
}
/* BUTTONS */
button {
  font-size:0.95rem; font-weight:bold; padding:10px 22px;
  border-radius:12px; border:none; background:#fbbf24; color:#0d2818;
  cursor:pointer; transition:all 0.2s; box-shadow:0 4px 8px rgba(0,0,0,0.3); white-space:nowrap;
}
button:hover:not(:disabled) { background:#fcd34d; transform:scale(1.05); box-shadow:0 6px 12px rgba(0,0,0,0.4); }
button:disabled { background:#2d5f47; color:#4a7c5e; cursor:not-allowed; box-shadow:none; transform:none; }
/* CORNER PLAY AREA BUTTONS */
#rollBtn {
  position: absolute;
  bottom: 20px;
  left: 20px;
  z-index: 2000;
  padding: 14px 28px;
  font-size: 1.1rem;
}
#newGameBtn {
  position: absolute;
  bottom: 20px;
  right: 20px;
  z-index: 2000;
  background:#1a3d28;
  color:#a3b8cc;
  font-size:0.85rem;
  padding:10px 18px;
  border:1px solid #2d5f47;
}
#newGameBtn:hover { background:#2d5f47; color:#fff; }
/* GAME CONTAINER */
#game-container { display:flex; flex:1; width:100%; overflow:hidden; min-height:0; }
/* LEFT SIDEBAR — scorecard */
#left-sidebar {
  width:245px; background:#0d2818; border-right:1px solid #27543a;
  display:flex; flex-direction:column; flex-shrink:0; overflow-y:auto; overflow-x:hidden;
}
#scorecard-tabs { display:flex; border-bottom:1px solid #27543a; flex-shrink:0; }
.sc-tab {
  flex:1; padding:9px 4px; font-size:0.85rem; font-weight:bold;
  text-align:center; cursor:pointer; color:#4a7c5e;
  border-bottom:3px solid transparent; transition:all 0.2s; letter-spacing:1px;
}
.sc-tab.active-tab { color:#fbbf24; border-bottom-color:#fbbf24; }
.sc-tab.p2-tab.active-tab { color:#60a5fa; border-bottom-color:#60a5fa; }
.scorecard-panel { display:none; flex-direction:column; flex:1; }
.scorecard-panel.visible { display:flex; }
.sc-section-label {
  font-size:0.68rem; font-weight:bold; letter-spacing:2px; color:#4a7c5e;
  padding:6px 10px 4px; background:#091c10; text-transform:uppercase;
  border-bottom:1px solid #1a3d28; flex-shrink:0;
}
.sc-row {
  display:flex; justify-content:space-between; align-items:center;
  padding:6px 12px; font-size:0.88rem; border-bottom:1px solid #152a1e;
  cursor:pointer; transition:background 0.12s; min-height:30px; flex-shrink:0;
}
.sc-row:hover:not(.sc-filled):not(.sc-disabled) { background:rgba(255,255,255,0.06); }
.sc-row.sc-filled { opacity:0.55; cursor:default; }
.sc-row.sc-disabled { cursor:default; }
.sc-row.sc-suggested { background:rgba(74,124,94,0.35); border-left:3px solid #4a7c5e; }
.sc-row.sc-suggested:hover:not(.sc-filled) { background:rgba(74,124,94,0.5); }
.sc-name { flex:1; color:#94a3b8; }
.sc-row.sc-filled .sc-name { color:#e2e8f0; }
.sc-val { font-weight:bold; font-size:1rem; min-width:32px; text-align:right; }
.p1-card .sc-val { color:#fbbf24; }
.p2-card .sc-val { color:#60a5fa; }
.sc-val.sc-empty { color:#2d5f47; font-size:0.7rem; }
.sc-bonus-row {
  display:flex; justify-content:space-between; align-items:center;
  padding:5px 12px; font-size:0.75rem; color:#4a7c5e;
  background:#091c10; border-bottom:1px solid #1a3d28; flex-shrink:0;
}
.sc-bonus-row span:last-child { font-weight:bold; }
.sc-ybonus-row {
  display:flex; justify-content:space-between; align-items:center;
  padding:5px 12px; font-size:0.75rem; color:#4a7c5e;
  background:#091c10; border-bottom:1px solid #1a3d28; flex-shrink:0; gap:6px;
}
.yb-boxes { display:flex; gap:5px; }
.yb-box {
  width:22px; height:22px; border:2px solid #2d5f47; border-radius:4px;
  display:flex; align-items:center; justify-content:center;
  font-size:0.8rem; font-weight:bold; transition:all 0.3s;
}
.yb-box.scored { border-color:#fbbf24; background:rgba(251,191,36,0.15); color:#fbbf24; }
.p2-card .yb-box.scored { border-color:#60a5fa; background:rgba(96,165,250,0.15); color:#60a5fa; }
.sc-total-row {
  display:flex; justify-content:space-between; align-items:center;
  padding:7px 12px; font-size:0.85rem; font-weight:bold; color:#94a3b8;
  background:#091c10; flex-shrink:0; margin-top:auto; border-top:2px solid #27543a;
}
.sc-total-row span:last-child { font-size:1.2rem; }
.p1-card .sc-total-row span:last-child { color:#fbbf24; }
.p2-card .sc-total-row span:last-child { color:#60a5fa; }
/* DICE TABLE */
#dice-table {
  position:relative; flex:1;
  background:
    radial-gradient(ellipse at 30% 40%,rgba(45,106,79,0.3) 0%,transparent 50%),
    radial-gradient(ellipse at 70% 60%,rgba(30,77,58,0.3) 0%,transparent 50%),
    linear-gradient(135deg,#1a5c3a 0%,#16502f 50%,#1a5c3a 100%);
  overflow:visible !important; perspective:1200px;
  box-shadow:inset 0 0 100px rgba(0,0,0,0.3);
}
#dbl-hint {
  position:absolute; bottom:10px; left:50%; transform:translateX(-50%);
  font-size:0.62rem; color:rgba(255,255,255,0.18); letter-spacing:2px;
  text-transform:uppercase; pointer-events:none; white-space:nowrap;
}
/* RIGHT SIDEBAR */
#right-sidebar {
  width:215px; background:#0d2818; border-left:1px solid #27543a;
  display:flex; flex-direction:column; flex-shrink:0; overflow:hidden;
}
#suggest-panel { flex:1; overflow-y:auto; border-bottom:1px solid #27543a; padding:8px; }
#suggest-panel h3 {
  font-size:0.78rem; font-weight:bold; letter-spacing:2px; color:#4a7c5e;
  margin:0 0 7px; text-align:center; text-transform:uppercase;
}
.sug-item {
  display:flex; justify-content:space-between; align-items:center;
  padding:7px 9px; border-radius:6px; margin-bottom:4px; font-size:0.82rem;
  cursor:pointer; background:rgba(255,255,255,0.04); border:1px solid transparent; transition:all 0.12s;
}
.sug-item:hover { background:rgba(74,124,94,0.35); border-color:#4a7c5e; }
.sug-item.sug-best { background:rgba(74,124,94,0.28); border-color:#4a7c5e; }
.sug-item.sug-best::before { content:'★ '; color:#fbbf24; }
.sug-pts { font-weight:bold; font-size:1.05rem; }
.p1-sug .sug-pts { color:#fbbf24; }
.p2-sug .sug-pts { color:#60a5fa; }
.sug-pts.sug-zero { color:#2d5f47; }
.sug-dim { color:#4a7c5e; font-size:0.68rem; }
#log-panel { padding:6px; overflow-y:auto; height:130px; flex-shrink:0; border-top:1px solid #1a3d28; }
#log-panel h3 { font-size:0.7rem; letter-spacing:2px; color:#4a7c5e; margin:0 0 5px; text-align:center; text-transform:uppercase; }
#log-list { list-style:none; padding:0; margin:0; font-size:0.72rem; }
#log-list li { padding:3px 0; border-bottom:1px solid #1a3d28; color:#94a3b8; }
/* 3-D DICE */
.die-wrapper {
  position:absolute; width:80px; height:80px;
  cursor:grab; z-index:100; pointer-events:auto;
}
.die-wrapper.dragging { cursor:grabbing; z-index:10000; filter:drop-shadow(0 8px 16px rgba(56,189,248,0.5)); }
.die-wrapper.held-die { position:absolute; cursor:grab; }
.die-wrapper.held-die:hover { filter:drop-shadow(0 0 10px rgba(251,191,36,0.7)); }
.die-wrapper.sliding-transit { pointer-events:none; cursor:default; z-index:5000; }
.cube { width:70px; height:70px; position:absolute; top:5px; left:5px; transform-style:preserve-3d; pointer-events:none; }
.face {
  position:absolute; width:70px; height:70px;
  display:flex; align-items:center; justify-content:center;
  border-radius:8px; backface-visibility:hidden;
  box-shadow:inset 0 0 0 2px rgba(0,0,0,0.25);
  filter:brightness(1); transition:filter 0.2s ease;
}
.face.active { filter:brightness(1.2); box-shadow:inset 0 0 0 2px rgba(0,0,0,0),0 0 0 3px rgba(255,255,255,0.45); }
.p1-die .face { background:linear-gradient(135deg,#fbbf24 0%,#f59e0b 100%); }
.p2-die .face { background:linear-gradient(135deg,#60a5fa 0%,#3b82f6 100%); }
.face.front  { transform:rotateY(0deg)   translateZ(35px); }
.face.back   { transform:rotateY(180deg) translateZ(35px); }
.face.right  { transform:rotateY(90deg)  translateZ(35px); }
.face.left   { transform:rotateY(-90deg) translateZ(35px); }
.face.top    { transform:rotateX(90deg)  translateZ(35px); }
.face.bottom { transform:rotateX(-90deg) translateZ(35px); }
.pip-grid {
  display:grid; grid-template-columns:repeat(3,1fr); grid-template-rows:repeat(3,1fr);
  width:100%; height:100%; padding:12%;
}
.pip {
  width:13px; height:13px; border-radius:50%; background:rgba(0,0,0,0.82);
  justify-self:center; align-self:center;
}
.face.blank .pip { opacity:0; }
/* SCORE POPUP */
#score-popup {
  position:fixed; top:50%; left:50%;
  transform:translate(-50%,-50%) scale(0.8);
  background:linear-gradient(135deg,#16402f,#0d2818);
  border:3px solid #fbbf24; border-radius:20px; padding:36px 52px;
  z-index:20000; opacity:0; transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);
  text-align:center; box-shadow:0 20px 60px rgba(0,0,0,0.8); color:white;
}
#score-popup.p2-popup { border-color:#60a5fa; }
#score-popup.show { opacity:1; transform:translate(-50%,-50%) scale(1); }
#score-popup h2 { margin:0 0 14px; font-size:1.8rem; color:#fbbf24; }
#score-popup.p2-popup h2 { color:#60a5fa; }
#score-popup.ytz-popup h2 { color:#a855f7; }
#score-popup .score-detail { font-size:1.1rem; margin:7px 0; color:#94a3b8; }
#score-popup .final-score { font-size:2.2rem; font-weight:bold; color:#fbbf24; margin:14px 0; text-shadow:0 0 20px rgba(251,191,36,0.5); }
#score-popup.p2-popup .final-score { color:#60a5fa; text-shadow:0 0 20px rgba(96,165,250,0.5); }
#score-popup.ytz-popup .final-score { color:#a855f7; text-shadow:0 0 20px rgba(168,85,247,0.5); }
#score-popup button { margin-top:14px; font-size:1.1rem; }
.popup-timer { font-size:0.7rem; color:#4a7c5e; margin-top:8px; letter-spacing:1px; }
/* WINNER */
#fireworks-canvas { position:fixed; top:0; left:0; width:100vw; height:100vh; z-index:29999; pointer-events:none; }
#winner-overlay { position:fixed; inset:0; z-index:30000; display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity 0.5s ease; }
#winner-overlay.show { opacity:1; }
#winner-box {
  background:linear-gradient(145deg,#111d15,#0d2818,#0a1f12);
  border:3px solid rgba(255,255,255,0.15); border-radius:28px; padding:50px 70px 45px;
  text-align:center; box-shadow:0 0 60px rgba(0,0,0,0.7),inset 0 1px 0 rgba(255,255,255,0.08);
  max-width:520px; width:90vw; animation:winner-pulse 2s ease-in-out infinite alternate;
}
@keyframes winner-pulse {
  from { box-shadow:0 0 60px rgba(0,0,0,0.7); }
  to   { box-shadow:0 0 80px rgba(0,0,0,0.8),0 0 40px rgba(255,255,255,0.06); }
}
.winner-trophy { font-size:4rem; display:block; margin-bottom:10px; animation:trophy-bounce 1s ease-in-out infinite alternate; }
@keyframes trophy-bounce { from{transform:translateY(0);} to{transform:translateY(-8px);} }
.winner-title { margin:0 0 8px; font-size:2.4rem; font-weight:900; letter-spacing:3px; }
.winner-scoreboard { display:flex; align-items:center; justify-content:center; gap:20px; margin-bottom:28px; }
.winner-player { display:flex; flex-direction:column; align-items:center; gap:4px; opacity:0.4; transition:opacity 0.3s; }
.winner-player.winner-active { opacity:1; }
.wp-label { font-size:0.85rem; color:#94a3b8; text-transform:uppercase; letter-spacing:1px; }
.wp-score { font-size:2rem; font-weight:800; color:#94a3b8; }
.winner-vs { font-size:1rem; color:#4a7c5e; font-weight:700; letter-spacing:2px; }
#winner-box button { font-size:1.1rem; padding:14px 44px; background:linear-gradient(135deg,#fbbf24,#f59e0b); border-radius:14px; box-shadow:0 4px 18px rgba(251,191,36,0.4); }
#winner-box button:hover { transform:scale(1.06); }
</style>
</head>
<body>

<!-- MODE SELECT -->
<div id="mode-overlay">
  <div id="mode-box">
    <h1>🎲 CINQO</h1>
    <p>Yahtzee · Select Mode</p>
    <button class="mode-btn mode-btn-p2" onclick="startGame(false)">
      2 Players
      <span class="mode-sub">Pass & play on one screen</span>
    </button>
    <button class="mode-btn mode-btn-cpu" onclick="startGame(true)">
      vs CPU 🤖
      <span class="mode-sub">Play against a smart computer opponent</span>
    </button>
  </div>
</div>

<!-- CPU THINKING -->
<div id="cpu-thinking">
  <p>CPU thinking<span class="cpu-dots"><span>.</span><span>.</span><span>.</span></span></p>
</div>

<div id="app">
  <div id="scoreboard">
    <div class="player active" id="p1-banner">P1: <span id="p1score">0</span></div>
    <div id="roll-counter">Roll <span id="rolls">0</span> / 3</div>
    <div class="player" id="p2-banner">P2: <span id="p2score">0</span></div>
  </div>
  <div id="hold-bar">
    <div id="hold-area">
      <div class="area-label">HOLD — double-click or drag to park in spaces · double-click held die to return</div>
    </div>
  </div>
  <div id="game-container">
    <div id="left-sidebar">
      <div id="scorecard-tabs">
        <div class="sc-tab active-tab" id="tab-p1" onclick="switchTab(0)">P1 CARD</div>
        <div class="sc-tab p2-tab"    id="tab-p2" onclick="switchTab(1)">P2 CARD</div>
      </div>
      <div class="scorecard-panel p1-card visible" id="panel-p1"></div>
      <div class="scorecard-panel p2-card"         id="panel-p2"></div>
    </div>
    <div id="dice-table">
      <button id="rollBtn">Roll Dice</button>
      <button id="newGameBtn" onclick="confirmNew()">New Game</button>
      <div id="dbl-hint">Click a die to hold/release · drag to place in a specific slot</div>
    </div>
    <div id="right-sidebar">
      <div id="suggest-panel">
        <h3>SUGGESTIONS</h3>
        <div id="suggest-list"><p class="sug-dim" style="text-align:center;padding:14px 0">Roll to see options</p></div>
      </div>
      <div id="log-panel">
        <h3>TURN LOG</h3>
        <ul id="log-list"></ul>
      </div>
    </div>
  </div>
</div>
<script>
// ================================================================ CONSTANTS
const NUM_DICE=5, MAX_ROLLS=3;
const GRAVITY=0.55, BOUNCE_DAMP=0.52, FRICTION=0.90, MIN_VEL=0.5;
const FLAT_ROT={1:{x:0,y:0,z:0},2:{x:-90,y:0,z:0},3:{x:0,y:-90,z:0},4:{x:0,y:90,z:0},5:{x:90,y:0,z:0},6:{x:0,y:180,z:0}};
const VAL_FACE={1:'front',2:'top',3:'right',4:'left',5:'bottom',6:'back'};

// ================================================================ GAME MODE
let isCPUMode = false;
let cpuIsThinking = false;

function startGame(cpu) {
  isCPUMode = cpu;
  const overlay = document.getElementById('mode-overlay');
  overlay.classList.add('hide');
  setTimeout(() => {
    overlay.style.display='none';
    initHoldSlots();
    initDice();
    renderCard(0); renderCard(1); switchTab(0);
  }, 420);

  // Update labels
  if (cpu) {
    document.getElementById('p2-banner').innerHTML = '🤖 CPU: <span id="p2score">0</span>';
    document.getElementById('tab-p2').textContent = 'CPU CARD';
  }
}

// ================================================================ CATEGORIES
const UPPER=[
  {key:'ones',  name:'Ones',   hint:'Sum of 1s'},
  {key:'twos',  name:'Twos',   hint:'Sum of 2s'},
  {key:'threes',name:'Threes', hint:'Sum of 3s'},
  {key:'fours', name:'Fours',  hint:'Sum of 4s'},
  {key:'fives', name:'Fives',  hint:'Sum of 5s'},
  {key:'sixes', name:'Sixes',  hint:'Sum of 6s'},
];
const LOWER=[
  {key:'threeKind',name:'3 of a Kind', hint:'≥3 alike → sum all'},
  {key:'fourKind', name:'4 of a Kind', hint:'≥4 alike → sum all'},
  {key:'fullHouse',name:'Full House',  hint:'3+2 → 25 pts'},
  {key:'smStr',    name:'Sm. Straight',hint:'4 seq → 30 pts'},
  {key:'lgStr',    name:'Lg. Straight',hint:'5 seq → 40 pts'},
  {key:'yahtzee',  name:'YAHTZEE',     hint:'5 alike → 50 pts'},
  {key:'chance',   name:'Chance',      hint:'Sum of all'},
];
function calcScore(key,vals){
  const c=[0,0,0,0,0,0,0]; vals.forEach(v=>c[v]++);
  const sum=vals.reduce((a,b)=>a+b,0);
  switch(key){
    case 'ones':      return c[1];
    case 'twos':      return c[2]*2;
    case 'threes':    return c[3]*3;
    case 'fours':     return c[4]*4;
    case 'fives':     return c[5]*5;
    case 'sixes':     return c[6]*6;
    case 'threeKind': return c.some(v=>v>=3)?sum:0;
    case 'fourKind':  return c.some(v=>v>=4)?sum:0;
    case 'fullHouse': return (c.some(v=>v===3)&&c.some(v=>v===2))?25:0;
    case 'smStr':{const u=[...new Set(vals)].sort((a,b)=>a-b);let b=1,r=1;for(let i=1;i<u.length;i++){r=u[i]===u[i-1]+1?r+1:1;b=Math.max(b,r);}return b>=4?30:0;}
    case 'lgStr':{const u=[...new Set(vals)].sort((a,b)=>a-b);if(u.length<5)return 0;let s=1;for(let i=1;i<u.length;i++)s=u[i]===u[i-1]+1?s+1:1;return s>=5?40:0;}
    case 'yahtzee': return c.some(v=>v===5)?50:0;
    case 'chance':  return sum;
  }
  return 0;
}
function isYahtzeeWildcard(p, vals) {
  const isYtz = vals.every(v => v === vals[0]);
  return isYtz && SD[p].yahtzee === 50;
}
function upperTotal(p){return UPPER.reduce((s,cat)=>{const v=SD[p][cat.key];return s+(v!==null?v:0);},0);}
function bonus(p){return upperTotal(p)>=63?35:0;}
function yBonusTotal(p){return (SD[p].yahtzeeBonuses||0)*100;}
function grandTotal(p){return upperTotal(p)+bonus(p)+LOWER.reduce((s,cat)=>{const v=SD[p][cat.key];return s+(v!==null?v:0);},0)+yBonusTotal(p);}

let SD=[blank(),blank()];

// ================================================================ CREATE DIE
function rand(a,b){return Math.random()*(b-a)+a;}
function mkDie(id){

// ================================================================ SMOOTH SLIDE ANIMATION
function toggleDieZoneAnimated(die) {
  if(!rolled||flying||transitBusy) return;

  const appContainer = document.getElementById('app');
  const appRect = appContainer.getBoundingClientRect();
  const sr = die.wrapper.getBoundingClientRect();

  const startX = sr.left - appRect.left;
  const startY = sr.top - appRect.top;
  let targetX, targetY;
  let targetSlotIdx = -1;
  if(die.zone === 'table') {
    targetSlotIdx = holdSlots.findIndex(s => s === null);
    if(targetSlotIdx === -1) return;
    holdSlots[targetSlotIdx] = die;
    const slotBox = document.getElementById(`hold-slot-${targetSlotIdx}`).getBoundingClientRect();
    targetX = slotBox.left - appRect.left;
    targetY = slotBox.top - appRect.top;
  } else {
    if(die.currentSlot !== null) { holdSlots[die.currentSlot] = null; }
    const tr = TABLE.getBoundingClientRect();
    targetX = (tr.left - appRect.left) + tr.width / 2 - 40 + rand(-80, 80);
    targetY = (tr.top - appRect.top) + tr.height * 0.35 + rand(-30, 30);
  }
  transitBusy = true;
  die.wrapper.classList.add('sliding-transit');
  die.wrapper.style.position = 'absolute';
  die.wrapper.style.left = startX + 'px';
  die.wrapper.style.top = startY + 'px';
  die.wrapper.style.zIndex = '5000';
  appContainer.appendChild(die.wrapper);
  const duration = 500;
  const startTime = performance.now();
  function step(now) {
    const elapsed = now - startTime;
    const progress = Math.min(elapsed / duration, 1);
    const currentX = startX + (targetX - startX) * progress;
    const currentY = startY + (targetY - startY) * progress;
    die.wrapper.style.left = currentX + 'px';
    die.wrapper.style.top = currentY + 'px';
    if (progress < 1) {
      requestAnimationFrame(step);
    } else {
      die.wrapper.classList.remove('sliding-transit');
      die.wrapper.style.zIndex = '';
      if (die.zone === 'table') {
        die.zone = 'hold';
        die.currentSlot = targetSlotIdx;
        const slotContainer = document.getElementById(`hold-slot-${targetSlotIdx}`);
        slotContainer.appendChild(die.wrapper);
        die.wrapper.classList.add('held-die');
        die.wrapper.style.left = '0px';
        die.wrapper.style.top = '0px';
        buildFaces(die, false);
        highlightFace(die);
      } else {
        die.zone = 'table';
        die.currentSlot = null;
        die.wrapper.classList.remove('held-die');
        TABLE.appendChild(die.wrapper);
        const tr = TABLE.getBoundingClientRect();
        die.x = targetX - (tr.left - appRect.left);
        die.y = targetY - (tr.top - appRect.top);
        die.wrapper.style.left = die.x + 'px';
        die.wrapper.style.top = die.y + 'px';
        buildFaces(die, false);
        highlightFace(die);
        wakeDie(die); die.vx = rand(-2, 2); die.vy = rand(-3, 0);
        if(!rafId) animate();
      }
      transitBusy = false;
      renderSug(); renderCard(0); renderCard(1);
    }
  }
  requestAnimationFrame(step);
}
function moveDieToSlotDirect(die, slotIdx) {
  if(die.currentSlot !== null) { holdSlots[die.currentSlot] = null; }
  die.zone = 'hold';
  die.currentSlot = slotIdx;
  holdSlots[slotIdx] = die;
  const targetSlotMarker = document.getElementById(`hold-slot-${slotIdx}`);
  targetSlotMarker.appendChild(die.wrapper);
  die.wrapper.classList.add('held-die');
  die.wrapper.style.left = '0px';
  die.wrapper.style.top = '0px';
  die.wrapper.style.position = 'absolute';
  buildFaces(die, false);
  highlightFace(die);
}

// ================================================================ DRAG
let dragStartX=0, dragStartY=0, dragMoved=false;
const DRAG_THRESHOLD = 6; // px before we consider it a drag not a click

function startDrag(e,die){
  if(!rolled||flying||transitBusy) return;
  dragStartX = e.clientX; dragStartY = e.clientY; dragMoved = false;
  dragged=die;
  // Don't detach yet — wait until mouse actually moves past threshold
}
document.addEventListener('mousemove',e=>{
  if(!dragged) return;
  const dx=e.clientX-dragStartX, dy=e.clientY-dragStartY;
  if(!dragMoved && Math.sqrt(dx*dx+dy*dy) < DRAG_THRESHOLD) return;
  if(!dragMoved) {
    // Commit to drag: detach die and add dragging style
    dragMoved = true;
    dragged.wrapper.classList.add('dragging');
    const r=dragged.wrapper.getBoundingClientRect();
    dragged.wrapper.style.position='fixed';
    dragged.wrapper.style.left=r.left+'px'; dragged.wrapper.style.top=r.top+'px';
    dragged.wrapper.style.zIndex='10000';
    document.getElementById('app').appendChild(dragged.wrapper);
  }
  dragged.wrapper.style.left=(e.clientX-40)+'px';
  dragged.wrapper.style.top=(e.clientY-40)+'px';
});
document.addEventListener('touchmove',e=>{
  if(!dragged) return;
  const tx=e.touches[0].clientX, ty=e.touches[0].clientY;
  const dx=tx-dragStartX, dy=ty-dragStartY;
  if(!dragMoved && Math.sqrt(dx*dx+dy*dy) < DRAG_THRESHOLD) return;
  if(!dragMoved) {
    dragMoved = true;
    dragged.wrapper.classList.add('dragging');
    const r=dragged.wrapper.getBoundingClientRect();
    dragged.wrapper.style.position='fixed';
    dragged.wrapper.style.left=r.left+'px'; dragged.wrapper.style.top=r.top+'px';
    dragged.wrapper.style.zIndex='10000';
    document.getElementById('app').appendChild(dragged.wrapper);
  }
  dragged.wrapper.style.left=(tx-40)+'px';
  dragged.wrapper.style.top=(ty-40)+'px';
},{passive:true});
document.addEventListener('mouseup',e=>endDrag(e));
document.addEventListener('touchend',e=>endDrag(e.changedTouches[0]));
function endDrag(e){
  if(!dragged) return;
  const die=dragged; dragged=null;

  // Pure click (no drag movement) — toggle hold zone
  if(!dragMoved) {
    if(!transitBusy && !cpuIsThinking) toggleDieZoneAnimated(die);
    return;
  }

  die.wrapper.classList.remove('dragging');
  const cx = e.clientX, cy = e.clientY;
  const tr = TABLE.getBoundingClientRect();
  let droppedOnSlotIdx = -1;
  for (let i = 0; i < 5; i++) {
    const box = document.getElementById(`hold-slot-${i}`).getBoundingClientRect();
    if (cx >= box.left && cx <= box.right && cy >= box.top && cy <= box.bottom) {
      droppedOnSlotIdx = i; break;
    }
  }
  if (droppedOnSlotIdx !== -1) {
    if (holdSlots[droppedOnSlotIdx] === null || holdSlots[droppedOnSlotIdx] === die) {
      moveDieToSlotDirect(die, droppedOnSlotIdx);
    } else {
      let lowestOpenIdx = holdSlots.findIndex(s => s === null);
      if (lowestOpenIdx !== -1) { moveDieToSlotDirect(die, lowestOpenIdx); }
      else { revertDiePlacement(die); }
    }
  } else if (cy >= tr.top && cy <= tr.bottom && cx >= tr.left && cx <= tr.right) {
    if (die.currentSlot !== null) { holdSlots[die.currentSlot] = null; die.currentSlot = null; }
    die.zone = 'table';
    die.wrapper.classList.remove('held-die');
    TABLE.appendChild(die.wrapper);
    die.x = Math.max(0, Math.min(cx - tr.left - 40, tr.width - 85));
    die.y = Math.max(0, Math.min(cy - tr.top - 40, tr.height - 135));
    die.wrapper.style.left = die.x + 'px';
    die.wrapper.style.top = die.y + 'px';
    wakeDie(die); if(!rafId) animate();
  } else { revertDiePlacement(die); }
  renderSug(); renderCard(0); renderCard(1);
}
function revertDiePlacement(die) {
  die.wrapper.style.position = 'absolute';
  if (die.zone === 'hold') {
    const targetSlotMarker = document.getElementById(`hold-slot-${die.currentSlot}`);
    targetSlotMarker.appendChild(die.wrapper);
    die.wrapper.style.left = '0px';
    die.wrapper.style.top = '0px';
  } else {
    TABLE.appendChild(die.wrapper);
    die.wrapper.style.left = die.x + 'px';
    die.wrapper.style.top = die.y + 'px';
  }
}

// ================================================================ ROLL
function rollDice(){
  if(rollsN>=MAX_ROLLS||flying||transitBusy||cpuIsThinking) return;
  const td=dice.filter(d=>d.zone==='table');
  if(!td.length){showToast('All dice are held!');return;}
  rollsN++; ROLLDISP.textContent=rollsN; rolled=true; flying=true;
  const tr=TABLE.getBoundingClientRect();
  td.forEach((d,i)=>{
    // Ensure valid starting position using current rect
    if(d.preRoll || d.x<=0 || d.x>=tr.width-85) {
      d.x = Math.max(20, Math.min(tr.width/2 + rand(-120,120) - 40, tr.width-105));
    }
    d.y = -90;
    d.preRoll=false; wakeDie(d);
    d.value=Math.floor(Math.random()*6)+1;
    buildFaces(d,false);
    d.vx=rand(-9,9); d.vy=rand(-17,-11); d.angV=rand(-20,20);
    d.wrapper.style.left=d.x+'px'; d.wrapper.style.top=d.y+'px';
  });
  if(!rafId) animate();
  ROLLBTN.disabled=rollsN>=MAX_ROLLS;
  renderSug();
}

// ================================================================ PHYSICS
function animate(){
  let still=false;
  const tr=TABLE.getBoundingClientRect();
  dice.forEach(d=>{
    if(d.zone!=='table'||d.settled) return;
    still=true;
    d.vy+=GRAVITY; d.x+=d.vx; d.y+=d.vy; d.vx*=FRICTION;
    dice.forEach(o=>{
      if(o===d||o.zone!=='table') return;
      const dx=d.x-o.x,dy=d.y-o.y,dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<75){const a=Math.atan2(dy,dx);d.vx+=Math.cos(a)*0.8;d.vy+=Math.sin(a)*0.8;}
    });
    if(d.y>tr.height-135){d.y=tr.height-135;d.vy*=-BOUNCE_DAMP;d.collided=true;}
    if(d.x<0){d.vx*=-BOUNCE_DAMP;d.x=0;}
    if(d.x>tr.width-85){d.vx*=-BOUNCE_DAMP;d.x=tr.width-85;}
    if(d.collided){
      const t=FLAT_ROT[d.value];
      d.rot.x+=(t.x-d.rot.x)*0.12; d.rot.y+=(t.y-d.rot.y)*0.12; d.rot.z+=(0-d.rot.z)*0.12;
      d.angV*=0.8;
    } else {d.rot.x+=d.angV;d.rot.y+=d.angV;d.rot.z+=d.angV;}
    if(Math.abs(d.vx)<MIN_VEL&&Math.abs(d.vy)<1&&d.collided){if(++d.sf>30){d.settled=true;d.vx=0;d.vy=0;}}
    d.wrapper.style.left=d.x+'px'; d.wrapper.style.top=d.y+'px';
    d.cube.style.transform=`rotateX(${d.rot.x}deg) rotateY(${d.rot.y}deg) rotateZ(${d.rot.z}deg)`;
  });
  if(still){rafId=requestAnimationFrame(animate);}
  else{
    rafId=null; flying=false;
    dice.forEach(d=>{if(d.zone==='table'&&!d.preRoll)highlightFace(d);});
    renderSug(); renderCard(0); renderCard(1);
    // Trigger CPU if it's CPU's turn
    if(isCPUMode && curP === 1 && rolled) {
      scheduleCPU();
    }
  }
}

// ================================================================ CPU AI
function scheduleCPU() {
  if(cpuIsThinking) return;
  cpuIsThinking = true;
  ROLLBTN.disabled = true;
  document.getElementById('cpu-thinking').classList.add('show');
  setTimeout(doCPUTurn, 900 + Math.random() * 600);
}

function cpuChooseDiceToHold(vals) {
  // Returns array of indices to HOLD (move to hold zone)
  const c = [0,0,0,0,0,0,0]; vals.forEach(v => c[v]++);
  const sc = SD[1];

  // Priority-based holding strategy
  // 1. Yahtzee in progress (4+ of a kind)
  for(let v=1;v<=6;v++) {
    if(c[v] >= 4) return vals.map((d,i) => d===v ? i : -1).filter(i=>i>=0);
  }

  // 2. Almost large straight (4 in a sequence)
  const u = [...new Set(vals)].sort((a,b)=>a-b);
  if(u.length >= 4) {
    let bestRun = [], bestLen = 0;
    for(let start=0;start<=u.length-4;start++){
      let run=[u[start]]; let good=true;
      for(let j=start+1;j<u.length;j++){
        if(u[j]===u[j-1]+1) run.push(u[j]);
        else if(u[j]!==u[j-1]) { if(run.length+1 < 4) { good=false; break; } }
      }
      if(run.length > bestLen) { bestLen=run.length; bestRun=run; }
    }
    // Check for 4-consecutive
    for(let i=0;i<=u.length-4;i++){
      if(u[i+1]===u[i]+1 && u[i+2]===u[i]+2 && u[i+3]===u[i]+3){
        const seqSet = new Set([u[i],u[i+1],u[i+2],u[i+3]]);
        if(sc.lgStr===null) return vals.map((d,i2) => seqSet.has(d) ? i2 : -1).filter(i2=>i2>=0);
      }
    }
  }

  // 3. Three of a kind
  for(let v=6;v>=1;v--) {
    if(c[v] >= 3) return vals.map((d,i) => d===v ? i : -1).filter(i=>i>=0);
  }

  // 4. Full house setup (2 pairs or pair+triple)
  const pairs = [], triples = [];
  for(let v=1;v<=6;v++){ if(c[v]===2) pairs.push(v); if(c[v]===3) triples.push(v); }
  if(triples.length && pairs.length && sc.fullHouse===null) {
    return vals.map((d,i) => (triples.includes(d)||pairs.includes(d)) ? i : -1).filter(i=>i>=0);
  }

  // 5. Small straight fragments (3 consecutive)
  if(u.length >= 3) {
    for(let i=0;i<=u.length-3;i++){
      if(u[i+1]===u[i]+1 && u[i+2]===u[i]+2){
        const seqSet = new Set([u[i],u[i+1],u[i+2]]);
        if(sc.smStr===null || sc.lgStr===null) return vals.map((d,i2) => seqSet.has(d) ? i2 : -1).filter(i2=>i2>=0);
      }
    }
  }

  // 6. Keep pairs (prefer high values)
  for(let v=6;v>=1;v--) {
    if(c[v] === 2) return vals.map((d,i) => d===v ? i : -1).filter(i=>i>=0);
  }

  // 7. Keep highest single for upper section if not filled
  const upperMap = {1:'ones',2:'twos',3:'threes',4:'fours',5:'fives',6:'sixes'};
  for(let v=6;v>=1;v--) {
    if(c[v]>0 && sc[upperMap[v]]===null) {
      return vals.map((d,i) => d===v ? i : -1).filter(i=>i>=0);
    }
  }

  // 8. Keep the highest die
  const maxVal = Math.max(...vals);
  return [vals.indexOf(maxVal)];
}

function cpuChooseCategory(vals) {
  const sc = SD[1];
  const isWld = isYahtzeeWildcard(1, vals);

  const opts = [...UPPER,...LOWER].filter(c => sc[c.key]===null).map(cat => {
    let pts = 0;
    if(isWld) {
      if(cat.key==='fullHouse') pts=25;
      else if(cat.key==='smStr') pts=30;
      else if(cat.key==='lgStr') pts=40;
      else pts=calcScore(cat.key,vals);
    } else {
      pts = calcScore(cat.key,vals);
    }
    // Add bonus consideration: if upper section needed
    let bonus = 0;
    const upperMap = {ones:1,twos:2,threes:3,fours:4,fives:5,sixes:6};
    if(upperMap[cat.key] && upperTotal(1) < 63) bonus = pts * 0.3; // slight bias for upper when behind
    return { ...cat, pts, score: pts + bonus };
  });

  opts.sort((a,b) => b.score - a.score);
  return opts[0]?.key || null;
}

function doCPUTurn() {
  // CPU decides: roll again and hold, or score?
  const vals = dice.map(d => d.value);
  const bestCat = cpuChooseCategory(vals);
  const bestScore = bestCat ? calcScore(bestCat, vals) : 0;

  const shouldRollAgain = rollsN < MAX_ROLLS && (
    bestScore < 20 ||
    (bestScore < 35 && rollsN < 2)
  );

  if(shouldRollAgain) {
    // Decide which dice to hold
    const holdIndices = cpuChooseDiceToHold(vals);
    const cpuTR = TABLE.getBoundingClientRect();

    // Release all currently held dice back to table first
    dice.forEach(d => {
      if(d.zone === 'hold') {
        holdSlots[d.currentSlot] = null;
        d.zone = 'table';
        d.currentSlot = null;
        d.wrapper.classList.remove('held-die');
        TABLE.appendChild(d.wrapper);
        d.x = Math.max(20, Math.min(cpuTR.width/2 + rand(-100,100) - 40, cpuTR.width-105));
        d.y = Math.max(20, cpuTR.height * 0.4 + rand(-20,20));
        d.wrapper.style.left = d.x + 'px';
        d.wrapper.style.top = d.y + 'px';
      }
    });

    // Hold the chosen indices
    holdIndices.forEach(idx => {
      const die = dice[idx];
      if(die && die.zone === 'table') {
        const slotIdx = holdSlots.findIndex(s => s === null);
        if(slotIdx !== -1) moveDieToSlotDirect(die, slotIdx);
      }
    });

    cpuIsThinking = false;
    document.getElementById('cpu-thinking').classList.remove('show');

    // Now roll the remaining table dice using rollDice() which handles positioning
    setTimeout(() => {
      rollsN++; ROLLDISP.textContent=rollsN; rolled=true; flying=true;
      const tr = TABLE.getBoundingClientRect();
      const td = dice.filter(d => d.zone==='table');
      td.forEach(d=>{
        // Ensure valid position before launching
        d.x = Math.max(20, Math.min(tr.width/2 + rand(-120,120) - 40, tr.width-105));
        d.y = -90;
        d.wrapper.style.left = d.x + 'px';
        d.wrapper.style.top = d.y + 'px';
        d.preRoll=false; wakeDie(d);
        d.value=Math.floor(Math.random()*6)+1;
        buildFaces(d,false);
        d.vx=rand(-9,9); d.vy=rand(-17,-11); d.angV=rand(-20,20);
      });
      ROLLBTN.disabled=rollsN>=MAX_ROLLS;
      if(!rafId) animate();
      renderSug();
      // animate() will call scheduleCPU() when dice settle
    }, 600);
  } else {
    // Score the best category
    cpuIsThinking = false;
    document.getElementById('cpu-thinking').classList.remove('show');

    if(bestCat) {
      setTimeout(() => {
        scoreCategory(bestCat);
      }, 400);
    }
  }
}

// ================================================================ SCORING
function scoreCategory(key){
  if(!rolled||flying||transitBusy){showToast('Roll first!');return;}
  const p=curP, sc=SD[p];
  const vals=dice.map(d=>d.value);
  const isYtz = vals.every(v=>v===vals[0]);
  if(key==='yahtzee'){
    if(sc.yahtzee!==null){
      if(isYtz && sc.yahtzee===50) {
        sc.yahtzeeBonuses = (sc.yahtzeeBonuses || 0) + 1;
        addLog('★ EXTRA YAHTZEE BONUS +100!');
        showToast('Bonus applied! Select your wildcard category on the card.');
        renderCard(0); renderCard(1); renderSug();
      } else {
        showToast('Already scored!');
      }
      return;
    }
    const pts=calcScore('yahtzee',vals);
    sc.yahtzee=pts;
    addLog('YAHTZEE: +'+pts);
    if(pts===50){showYtzPopup();return;}
    finishScore(pts,'YAHTZEE');
    return;
  }
  if(sc[key]!==null){showToast('Already scored!');return;}
  let pts = 0;
  if (isYahtzeeWildcard(p, vals)) {
    const matchingNumber = vals[0];
    const upperKey = UPPER[matchingNumber - 1].key;
    if (sc[upperKey] === null) {
      if (key !== upperKey) { showToast(`Must score in ${UPPER[matchingNumber - 1].name} first!`); return; }
      pts = calcScore(key, vals);
    } else {
      if (key === 'fullHouse') pts = 25;
      else if (key === 'smStr') pts = 30;
      else if (key === 'lgStr') pts = 40;
      else pts = calcScore(key, vals);
    }
    sc.yahtzeeBonuses = (sc.yahtzeeBonuses || 0) + 1;
    addLog('★ YAHTZEE BONUS +100!');
  } else {
    pts = calcScore(key, vals);
  }
  sc[key]=pts;
  const name=[...UPPER,...LOWER].find(c=>c.key===key)?.name||key;
  addLog(name+': +'+pts);
  finishScore(pts,name);
}
function finishScore(pts,name){
  renderCard(0);renderCard(1);
  if([0,1].every(p=>[...UPPER,...LOWER].every(c=>SD[p][c.key]!==null))){showWinner();return;}
  showTurnPopup(pts,name);
}

// ================================================================ YAHTZEE POPUP
function showYtzPopup(){
  clearPopup();
  const p=document.createElement('div'); p.id='score-popup'; p.classList.add('ytz-popup');
  p.innerHTML=`<h2>🎲 YAHTZEE! 🎲</h2><div class="score-detail">${isCPUMode&&curP===1?'CPU':'Player '+(curP+1)}</div><div class="final-score">+50 pts</div><div class="popup-timer">Auto-continuing in 4s…</div><button onclick="ytzContinue()">Continue →</button>`;
  document.body.appendChild(p);
  setTimeout(()=>p.classList.add('show'),40);
  p._tid=setTimeout(ytzContinue,4000);
}
function ytzContinue(){
  const p=document.getElementById('score-popup'); if(!p)return;
  clearTimeout(p._tid); p.remove();
  renderCard(0);renderCard(1);
  if([0,1].every(p=>[...UPPER,...LOWER].every(c=>SD[p][c.key]!==null))){showWinner();return;}
  showTurnPopup(50,'YAHTZEE');
}

// ================================================================ TURN POPUP
function showTurnPopup(pts,name){
  clearPopup();
  const p=document.createElement('div'); p.id='score-popup';
  if(curP===1) p.classList.add('p2-popup');
  const label = (isCPUMode && curP===1) ? '🤖 CPU' : `Player ${curP+1}`;
  const isCPUTurn = isCPUMode && curP===1;
  p.innerHTML=`<h2>${label}</h2><div class="score-detail">${name}</div><div class="final-score">+${pts} pts</div>
    ${isCPUTurn ? `<div class="popup-timer">Auto-continuing in 2.5s…</div><button onclick="nextTurn()">Continue →</button>` : `<button onclick="nextTurn()">Continue →</button>`}`;
  document.body.appendChild(p);
  setTimeout(()=>p.classList.add('show'),40);
  if(isCPUTurn) {
    p._tid = setTimeout(nextTurn, 2500);
  }
}
function clearPopup(){const e=document.getElementById('score-popup');if(e){clearTimeout(e._tid);e.remove();}}

// ================================================================ NEXT TURN
function nextTurn(){
  clearPopup();
  curP=curP===0?1:0;
  P1BAN.classList.toggle('active',curP===0); P2BAN.classList.toggle('active',curP===1);
  switchTab(curP);
  dice.forEach(d=>d.wrapper.remove()); dice=[];
  holdSlots = [null, null, null, null, null];
  rollsN=0; rolled=false; flying=false; cpuIsThinking=false;
  if(rafId){cancelAnimationFrame(rafId);rafId=null;}
  ROLLDISP.textContent='0'; ROLLBTN.disabled=false;
  initDice(); renderCard(0); renderCard(1); renderSug();

  // If CPU's turn, auto-start
  if(isCPUMode && curP===1) {
    setTimeout(() => {
      if(!cpuIsThinking) {
        cpuIsThinking = true;
        ROLLBTN.disabled = true;
        document.getElementById('cpu-thinking').classList.add('show');
        setTimeout(() => {
          cpuIsThinking = false;
          document.getElementById('cpu-thinking').classList.remove('show');
          ROLLBTN.disabled = false;
          rollDice();
        }, 800);
      }
    }, 300);
  }
}

// ================================================================ SCORECARD
let activeTab=0;
function switchTab(p){
  activeTab=p;
  document.getElementById('tab-p1').classList.toggle('active-tab',p===0);
  document.getElementById('tab-p2').classList.toggle('active-tab',p===1);
  document.getElementById('panel-p1').classList.toggle('visible',p===0);
  document.getElementById('panel-p2').classList.toggle('visible',p===1);
}
function renderCard(p){
  const panel=document.getElementById(`panel-p${p+1}`);
  const isCur=p===curP, sc=SD[p], cls=`p${p+1}-card`;
  const vals=dice.map(d=>d.value);
  const isWld = isYahtzeeWildcard(p, vals);
  const matchingNumber = vals[0];
  const matchingUpperKey = isWld ? UPPER[matchingNumber - 1].key : null;
  const forceUpper = isWld && sc[matchingUpperKey] === null;
  const sug=new Set();
  // Only show suggestions for human players
  const isHumanTurn = isCur && !(isCPUMode && p===1);
  if(isHumanTurn&&rolled&&!flying){
    [...UPPER,...LOWER].forEach(cat=>{
      if(sc[cat.key]===null) {
        if (forceUpper) { if (cat.key === matchingUpperKey) sug.add(cat.key); }
        else if (isWld) { sug.add(cat.key); }
        else if (calcScore(cat.key,vals)>0) { sug.add(cat.key); }
      }
    });
  }
  const uT=upperTotal(p), bon=bonus(p), need=Math.max(0,63-uT), yb=sc.yahtzeeBonuses||0;
  let h=`<div class="sc-section-label">UPPER SECTION</div>`;
  UPPER.forEach(cat=>{
    const v=sc[cat.key],f=v!==null,s=sug.has(cat.key);
    const canClick = isCur && !(isCPUMode && p===1);
    const rc=[f?'sc-filled':'',s?'sc-suggested':'',!canClick?'sc-disabled':'',cls].filter(Boolean).join(' ');
    h+=`<div class="sc-row ${rc}" onclick="${canClick?`scoreCategory('${cat.key}')`:''}"><span class="sc-name">${cat.name}</span><span class="sc-val${f?'':' sc-empty'}">${f?v:'—'}</span></div>`;
  });
  h+=`<div class="sc-bonus-row"><span>Bonus (need ${need} more)</span><span>${bon?'+35 ✓':'—'}</span></div>`;
  h+=`<div class="sc-section-label">LOWER SECTION</div>`;
  LOWER.forEach(cat=>{
    const v=sc[cat.key],f=v!==null,s=sug.has(cat.key);
    const canClick = isCur && !(isCPUMode && p===1);
    const rc=[f?'sc-filled':'',s?'sc-suggested':'',!canClick?'sc-disabled':'',cls].filter(Boolean).join(' ');
    h+=`<div class="sc-row ${rc}" onclick="${canClick?`scoreCategory('${cat.key}')`:''}"><span class="sc-name">${cat.name}</span><span class="sc-val${f?'':' sc-empty'}">${f?v:'—'}</span></div>`;
  });
  const b1=yb>=1?'scored':'',b2=yb>=2?'scored':'',b3=yb>=3?'scored':'';
  h+=`<div class="sc-ybonus-row ${cls}" title="Yahtzee bonuses"><span>Yahtzee Bonus×100</span><div class="yb-boxes"><div class="yb-box ${b1}">${yb>=1?'✕':''}</div><div class="yb-box ${b2}">${yb>=2?'✕':''}</div><div class="yb-box ${b3}">${yb>=3?'✕':''}</div></div></div>`;
  h+=`<div class="sc-total-row ${cls}"><span>TOTAL</span><span>${grandTotal(p)}</span></div>`;
  panel.innerHTML=h;
  document.getElementById(`p${p+1}score`).textContent=grandTotal(p);
}

// ================================================================ SUGGESTIONS
function renderSug(){
  const list=document.getElementById('suggest-list'), p=curP;
  // Don't show suggestions during CPU turn
  if(isCPUMode && curP===1) {
    list.innerHTML=`<p class="sug-dim" style="text-align:center;padding:14px 0">CPU is deciding…</p>`;
    return;
  }
  if(!rolled||flying){list.innerHTML=`<p class="sug-dim" style="text-align:center;padding:14px 0">Roll to see options</p>`;return;}
  const vals=dice.map(d=>d.value);
  const isWld = isYahtzeeWildcard(p, vals);
  const matchingNumber = vals[0];
  const matchingUpperKey = isWld ? UPPER[matchingNumber - 1].key : null;
  const forceUpper = isWld && SD[p][matchingUpperKey] === null;
  const opts=[...UPPER,...LOWER].filter(c=>SD[p][c.key]===null).map(c=>{
    let pts = 0;
    if (forceUpper) { pts = c.key === matchingUpperKey ? calcScore(c.key, vals) : 0; }
    else if (isWld) {
      if (c.key === 'fullHouse') pts = 25;
      else if (c.key === 'smStr') pts = 30;
      else if (c.key === 'lgStr') pts = 40;
      else pts = calcScore(c.key, vals);
    } else { pts = calcScore(c.key, vals); }
    return {...c, pts};
  }).sort((a,b)=>b.pts-a.pts);
  if(!opts.length){list.innerHTML='<p class="sug-dim" style="text-align:center">All filled</p>';return;}
  const best=opts[0].pts, pCls=`p${p+1}-sug`;
  list.innerHTML=opts.map((o,i)=>{
    const ib=i===0&&o.pts===best&&o.pts>0;
    return `<div class="sug-item ${pCls}${ib?' sug-best':''}" onclick="scoreCategory('${o.key}')"><span>${o.name}</span><span class="sug-pts${o.pts===0?' sug-zero':''}">${o.pts}</span></div>`;
  }).join('');
}

// ================================================================ LOG
function addLog(msg){
  const li=document.createElement('li');
  const label = (isCPUMode && curP===1) ? '🤖 CPU' : `P${curP+1}`;
  li.textContent=`${label}: ${msg}`;
  li.style.color=curP===0?'#fbbf24':'#60a5fa';
  document.getElementById('log-list').prepend(li);
}

// ================================================================ WINNER + FIREWORKS
function showWinner(){
  const t0=grandTotal(0),t1=grandTotal(1);
  const w=t0>t1?0:t1>t0?1:-1;
  const wc=w===0?'#fbbf24':w===1?'#60a5fa':'#94a3b8';
  const p1label='Player 1', p2label=isCPUMode?'CPU 🤖':'Player 2';
  let wn;
  if(w===-1) wn="IT'S A TIE!";
  else if(w===0) wn="PLAYER 1 WINS!";
  else wn=isCPUMode?"CPU WINS!":"PLAYER 2 WINS!";
  const cv=document.createElement('canvas'); cv.id='fireworks-canvas';
  cv.width=window.innerWidth; cv.height=window.innerHeight;
  document.body.appendChild(cv);
  const ctx=cv.getContext('2d');
  const ov=document.createElement('div'); ov.id='winner-overlay';
  ov.innerHTML=`<div id="winner-box">
    <div class="winner-trophy">🏆</div>
    <h1 class="winner-title" style="color:${wc};text-shadow:0 0 30px ${wc}">${wn}</h1>
    <div class="winner-scoreboard">
      <div class="winner-player ${w===0?'winner-active':''}"><span class="wp-label">${p1label}</span><span class="wp-score" style="${w===0?'color:#fbbf24':''}">${t0}</span></div>
      <div class="winner-vs">VS</div>
      <div class="winner-player ${w===1?'winner-active':''}"><span class="wp-label">${p2label}</span><span class="wp-score" style="${w===1?'color:#60a5fa':''}">${t1}</span></div>
    </div>
    <button onclick="location.reload()">Play Again 🎲</button>
  </div>`;
  document.body.appendChild(ov);
  requestAnimationFrame(()=>ov.classList.add('show'));
  const PAL=['#fbbf24','#60a5fa','#a855f7','#f43f5e','#34d399','#fb923c','#ffffff','#fde68a'];
  let parts=[], lastL=-9999, fwId;
  function Sp(x,y){
    const a=Math.random()*Math.PI*2,sp=2+Math.random()*5;
    this.x=x;this.y=y;this.vx=Math.cos(a)*sp;this.vy=Math.sin(a)*sp;
    this.life=1;this.decay=0.007+Math.random()*0.016;
    this.r=2+Math.random()*3;this.col=PAL[Math.floor(Math.random()*PAL.length)];
  }
  Sp.prototype.tick=function(){this.x+=this.vx;this.y+=this.vy;this.vy+=0.055;this.vx*=0.992;this.life-=this.decay;};
  Sp.prototype.draw=function(){
    if(this.life<=0)return;
    ctx.save();ctx.globalAlpha=this.life;ctx.fillStyle=this.col;
    ctx.shadowBlur=8;ctx.shadowColor=this.col;
    ctx.beginPath();ctx.arc(this.x,this.y,this.r*this.life,0,Math.PI*2);ctx.fill();ctx.restore();
  };
  function burst(x,y,n){for(let i=0;i<n;i++)parts.push(new Sp(x,y));}
  burst(cv.width*.25,cv.height*.22,70); burst(cv.width*.75,cv.height*.18,65); burst(cv.width*.5,cv.height*.3,75);
  function loop(ts){
    ctx.clearRect(0,0,cv.width,cv.height);
    if(ts-lastL>380+Math.random()*420){
      burst(80+Math.random()*(cv.width-160),50+Math.random()*(cv.height*.35),55+Math.floor(Math.random()*45));
      lastL=ts;
    }
    for(let i=parts.length-1;i>=0;i--){parts[i].tick();parts[i].draw();if(parts[i].life<=0)parts.splice(i,1);}
    fwId=requestAnimationFrame(loop);
  }
  fwId=requestAnimationFrame(loop);
}

// ================================================================ TOAST
let ttid;
function showToast(msg){
  let t=document.getElementById('__toast');
  if(!t){t=document.createElement('div');t.id='__toast';Object.assign(t.style,{position:'fixed',bottom:'20px',left:'50%',transform:'translateX(-50%) translateY(50px)',background:'#fbbf24',color:'#0d2818',fontWeight:'bold',fontSize:'0.9rem',padding:'10px 24px',borderRadius:'10px',zIndex:'25000',transition:'transform 0.25s',pointerEvents:'none',whiteSpace:'nowrap'});document.body.appendChild(t);}
  t.textContent=msg; t.style.transform='translateX(-50%) translateY(0)';
  clearTimeout(ttid); ttid=setTimeout(()=>{t.style.transform='translateX(-50%) translateY(50px)';},2200);
}
function confirmNew(){if(confirm('Start a new game? All progress will be lost.'))location.reload();}

// ================================================================ BOOT
function initDice(){ for(let i=0;i<NUM_DICE;i++) mkDie(i); }

ROLLBTN.addEventListener('click', () => {
  if(isCPUMode && curP===1) return; // Block manual roll during CPU turn
  rollDice();
});
P1BAN.classList.add('active');
</script>
