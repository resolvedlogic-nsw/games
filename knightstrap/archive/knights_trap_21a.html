<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Knight's Trap</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&display=swap');
  * { box-sizing: border-box; }
  body {
    margin: 0; overflow: hidden; font-family: 'Cinzel', serif; user-select: none; -webkit-user-select: none;
    background: url('https://images2.alphacoders.com/974/thumb-1920-974513.jpg') no-repeat center center fixed;
    background-size: cover;
  }
  body::before {
    content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); z-index: -1;
  }
  canvas { display: block; }

  #main-menu {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: radial-gradient(circle, rgba(26,10,0,0.4) 0%, rgba(0,0,0,0.75) 100%);
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    z-index: 20; gap: 14px;
  }
  .menu-title {
    font-size: 70px; font-weight: 900; color: #ffaa00;
    text-shadow: 0 0 40px #ff6600, 0 0 80px #ff330066;
    letter-spacing: 6px; margin-bottom: 10px; text-align: center;
    animation: flicker 3s infinite;
  }
  @keyframes flicker {
    0%,100%{text-shadow:0 0 40px #ff6600,0 0 80px #ff330066;}
    50%{text-shadow:0 0 60px #ffaa00,0 0 100px #ff660088,0 0 5px #fff;}
  }
  .menu-subtitle { color: #cc8833; font-size: 17px; letter-spacing: 4px; margin-bottom: 28px; text-transform: uppercase; }
  .menu-btn {
    padding: 15px 60px; font-size: 19px; font-family: 'Cinzel', serif; font-weight: 700;
    background: linear-gradient(135deg, #3a1a00, #6a3000); color: #ffcc77;
    border: 2px solid #aa6600; border-radius: 4px; cursor: pointer;
    transition: all 0.2s; letter-spacing: 2px; text-transform: uppercase;
    box-shadow: 0 0 20px #ff660033, inset 0 1px 0 #ffaa0044;
  }
  .menu-btn:hover { background: linear-gradient(135deg, #5a2800, #8a4400); border-color: #ffaa00; transform: scale(1.04); box-shadow: 0 0 30px #ff880055; }
  .menu-divider { color: #553300; font-size: 13px; letter-spacing: 3px; }

  #ui-container { display: none; }
  #ui { position: absolute; top: 20px; left: 0; right: 0; text-align: center; pointer-events: none; z-index: 5; }
  #turn-badge {
    display: inline-block; padding: 10px 44px;
    background: rgba(0,0,0,0.78); backdrop-filter: blur(8px);
    border: 2px solid #555; border-radius: 4px;
    color: white; font-size: 19px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 3px;
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  #game-over {
    display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.55); backdrop-filter: blur(4px);
    flex-direction: column; justify-content: center; align-items: center;
    color: white; z-index: 10; pointer-events: none;
  }
  #game-over-card {
    background: linear-gradient(160deg, #1a0800, #0d0500);
    padding: 48px 68px; border-radius: 6px; border: 2px solid #aa6600;
    box-shadow: 0 0 60px #ff440033, 0 20px 60px rgba(0,0,0,0.9);
    text-align: center; pointer-events: auto;
  }
  #game-over h1 { font-size: 50px; margin: 0 0 10px; font-weight: 900; letter-spacing: 4px; }
  #game-over p { font-size: 17px; color: #cc9955; margin-bottom: 32px; letter-spacing: 2px; }
  .restart-btn {
    padding: 14px 50px; font-size: 17px; border: 2px solid #aa6600; border-radius: 4px;
    cursor: pointer; background: linear-gradient(135deg, #3a1a00, #6a3000);
    color: #ffcc77; font-family: 'Cinzel', serif; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase;
    box-shadow: 0 0 20px #ff660033; transition: transform 0.15s, background 0.2s;
  }
  .restart-btn:hover { transform: scale(1.05); background: linear-gradient(135deg, #5a2800, #8a4400); }
  #hints {
    position: absolute; bottom: 18px; width: 100%; text-align: center;
    color: rgba(255,200,100,0.22); pointer-events: none; font-size: 12px; letter-spacing: 2px;
  }
</style>
</head>
<body>

<div id="main-menu">
  <div class="menu-title">KNIGHT'S TRAP</div>
  <div class="menu-subtitle">Choose your battlefield</div>
  <button class="menu-btn" id="btn-8">8 × 8 Board</button>
  <div class="menu-divider">— or —</div>
  <button class="menu-btn" id="btn-10">10 × 10 Board</button>
</div>

<div id="ui-container">
  <div id="ui"><div id="turn-badge">...</div></div>
  <div id="game-over">
    <div id="game-over-card">
      <h1 id="winner-text">Blue Wins!</h1>
      <p id="reason-text">Red was trapped.</p>
      <button class="restart-btn" onclick="location.reload()">⚔ Play Again</button>
    </div>
  </div>
  <div id="hints">Drag to Rotate &nbsp;•&nbsp; Click a glowing square to Move</div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const TILE_SIZE = 1, GAP = 0.1, STEP = TILE_SIZE + GAP;
let BOARD_SIZE = 8;
let turn = 'blue', isAnimating = false, gameActive = false;
let burningTileCoords = []; // {x,z} currently on fire

const state = {
  blue: { x:0, z:0, mesh:null, color:0x1a55ff },
  red:  { x:7, z:7, mesh:null, color:0xdd1111 }
};

/* --- SCENE --- */
const scene = new THREE.Scene();
// No scene.background — CSS body image shows through the alpha renderer

const camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.1, 200);
camera.position.set(0, 15, 13);
camera.lookAt(0,0,0);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;
renderer.setClearColor(0x000000, 0); // fully transparent clear
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true; controls.dampingFactor = 0.06;
controls.maxPolarAngle = Math.PI / 2.15;
controls.minDistance = 7; controls.maxDistance = 42;

/* --- LIGHTS --- */
scene.add(new THREE.AmbientLight(0xffe8cc, 0.4));
const sun = new THREE.DirectionalLight(0xfffbf0, 1.5);
sun.position.set(8, 20, 8); sun.castShadow = true;
sun.shadow.mapSize.width = sun.shadow.mapSize.height = 2048;
sun.shadow.camera.left = -22; sun.shadow.camera.right = 22;
sun.shadow.camera.top = 22; sun.shadow.camera.bottom = -22;
sun.shadow.camera.far = 70;
scene.add(sun);
const fillLight = new THREE.DirectionalLight(0x8899ff, 0.28);
fillLight.position.set(-5, 4, -5);
scene.add(fillLight);

/* --- WOOD TEXTURE (procedural) --- */
function makeWoodTex() {
  const S = 512, cv = document.createElement('canvas');
  cv.width = cv.height = S;
  const cx = cv.getContext('2d');
  // base gradient
  const g = cx.createLinearGradient(0, 0, S * 0.2, S);
  g.addColorStop(0,   '#7a4a1e');
  g.addColorStop(0.25,'#8b5a28');
  g.addColorStop(0.5, '#6e3d12');
  g.addColorStop(0.75,'#9b6a38');
  g.addColorStop(1,   '#7a4a1e');
  cx.fillStyle = g; cx.fillRect(0,0,S,S);
  // grain lines
  cx.globalAlpha = 0.16;
  for (let i = 0; i < 40; i++) {
    const bx = (i/40)*S + Math.sin(i*1.4)*16;
    const w  = 1 + Math.random()*2.5;
    cx.strokeStyle = Math.random()>0.5 ? '#3d1f00' : '#c88840';
    cx.lineWidth = w;
    cx.beginPath(); cx.moveTo(bx, 0);
    for (let y = 0; y < S; y += 3) cx.lineTo(bx + Math.sin(y*0.04+i)*9, y);
    cx.stroke();
  }
  // knot
  cx.globalAlpha = 0.1; cx.beginPath();
  cx.ellipse(S*0.7, S*0.3, 16, 9, 0.3, 0, Math.PI*2);
  cx.strokeStyle='#3d1f00'; cx.lineWidth=3; cx.stroke();
  // subtle noise
  const id = cx.getImageData(0,0,S,S);
  for (let i=0;i<id.data.length;i+=4){const n=(Math.random()-0.5)*22;id.data[i]+=n;id.data[i+1]+=n*0.65;id.data[i+2]+=n*0.3;}
  cx.putImageData(id,0,0);
  const t = new THREE.CanvasTexture(cv);
  return t;
}
const woodTex = makeWoodTex();

function woodMat() {
  return new THREE.MeshStandardMaterial({
    map: woodTex, roughness: 0.78, metalness: 0.04,
    emissive: new THREE.Color(0), emissiveIntensity: 0
  });
}

/* --- TILE GEOMETRY --- */
const tileGeo = new THREE.BoxGeometry(TILE_SIZE, 0.22, TILE_SIZE);

/* --- KNIGHT MESH --- */
const mMetal   = new THREE.MeshStandardMaterial({ color:0xbbbbcc, roughness:0.22, metalness:0.92 });
const mDkMetal = new THREE.MeshStandardMaterial({ color:0x9999aa, roughness:0.28, metalness:0.90 });
const mVisor   = new THREE.MeshStandardMaterial({ color:0x080814, roughness:0.08, metalness:0.98 });
const mGold    = new THREE.MeshStandardMaterial({ color:0xddaa00, roughness:0.18, metalness:1.0  });

function B(w,h,d){ return new THREE.BoxGeometry(w,h,d); }
function M(geo,mat,x=0,y=0,z=0,rx=0,ry=0){
  const m=new THREE.Mesh(geo,mat);
  m.position.set(x,y,z); m.rotation.set(rx,ry,0); m.castShadow=true; return m;
}

function createKnight(teamColor) {
  const g = new THREE.Group();
  const mCloth = new THREE.MeshStandardMaterial({ color:teamColor, roughness:0.88 });

  // boots
  g.add(M(B(0.14,0.10,0.16), mDkMetal, -0.09, 0.05, 0.01));
  g.add(M(B(0.14,0.10,0.16), mDkMetal,  0.09, 0.05, 0.01));
  // greaves (lower leg armour)
  g.add(M(B(0.13,0.22,0.13), mDkMetal, -0.09, 0.19, 0));
  g.add(M(B(0.13,0.22,0.13), mDkMetal,  0.09, 0.19, 0));
  // knee guards
  g.add(M(B(0.16,0.07,0.16), mMetal, -0.09, 0.22, 0));
  g.add(M(B(0.16,0.07,0.16), mMetal,  0.09, 0.22, 0));
  // tabard (coloured cloth skirt)
  g.add(M(B(0.28,0.14,0.17), mCloth, 0, 0.32, 0));
  // torso / breastplate
  g.add(M(B(0.38,0.30,0.22), mMetal, 0, 0.50, 0));
  // central chest ridge
  g.add(M(B(0.05,0.26,0.04), mGold, 0, 0.50, 0.12));
  // coloured cloth under arms
  g.add(M(B(0.10,0.28,0.18), mCloth, -0.24, 0.46, 0));
  g.add(M(B(0.10,0.28,0.18), mCloth,  0.24, 0.46, 0));
  // pauldrons
  g.add(M(B(0.15,0.09,0.24), mMetal, -0.265, 0.62, 0));
  g.add(M(B(0.15,0.09,0.24), mMetal,  0.265, 0.62, 0));
  g.add(M(B(0.13,0.08,0.21), mDkMetal,-0.265,0.53, 0));
  g.add(M(B(0.13,0.08,0.21), mDkMetal, 0.265,0.53, 0));
  // neck gorget
  g.add(M(B(0.16,0.08,0.16), mMetal, 0, 0.70, 0));
  // helmet
  g.add(M(B(0.30,0.27,0.30), mMetal, 0, 0.87, 0));
  g.add(M(B(0.34,0.04,0.34), mMetal, 0, 1.01, 0));   // brim
  g.add(M(B(0.06,0.15,0.30), mDkMetal,-0.17,0.85, 0)); // left cheek
  g.add(M(B(0.06,0.15,0.30), mDkMetal, 0.17,0.85, 0)); // right cheek
  g.add(M(B(0.33,0.07,0.06), mVisor, 0, 0.88, 0.14));  // visor slit
  g.add(M(B(0.04,0.15,0.06), mMetal,  0, 0.85, 0.14)); // nose guard
  g.add(M(B(0.08,0.05,0.28), mGold,   0, 1.04, 0));    // crest base
  g.add(M(B(0.06,0.20,0.20), mCloth,  0, 1.15,-0.01)); // plume

  // LEFT ARM + SHIELD
  g.add(M(B(0.12,0.26,0.12), mDkMetal,-0.26, 0.46, 0));
  g.add(M(B(0.13,0.10,0.13), mMetal,  -0.26, 0.35, 0)); // gauntlet
  const sb = M(B(0.28,0.40,0.06), mCloth, -0.42, 0.46, 0.09); sb.rotation.y= 0.25; g.add(sb);
  const sr = M(B(0.30,0.42,0.04), mMetal, -0.42, 0.46, 0.07); sr.rotation.y= 0.25; g.add(sr);
  g.add(M(B(0.08,0.08,0.09), mGold, -0.455, 0.46, 0.15)); // shield boss

  // RIGHT ARM + SWORD
  g.add(M(B(0.12,0.26,0.12), mDkMetal, 0.26, 0.46, 0));
  g.add(M(B(0.13,0.10,0.13), mMetal,   0.26, 0.35, 0)); // gauntlet
  g.add(M(B(0.22,0.04,0.04), mGold,    0.26, 0.30, 0.13)); // crossguard
  g.add(M(B(0.04,0.13,0.04), mDkMetal, 0.26, 0.22, 0.13)); // grip
  g.add(M(B(0.08,0.08,0.08), mGold,    0.26, 0.14, 0.13)); // pommel
  g.add(M(B(0.035,0.55,0.025),mMetal,  0.26, 0.65, 0.13)); // blade

  g.traverse(c => { if(c.isMesh) c.castShadow=true; });
  return g;
}

/* --- BOARD --- */
const boardGroup = new THREE.Group();
scene.add(boardGroup);
let tiles = [];

function g2w(x,z) {
  const off = ((BOARD_SIZE-1)*STEP)/2;
  return { x: x*STEP-off, y:0, z: z*STEP-off };
}

/* --- FIRE PARTICLES --- */
const fireParticles  = [];
const emberParticles = [];

function makeFlame(col) {
  const m = new THREE.Mesh(
    new THREE.PlaneGeometry(0.13, 0.21),
    new THREE.MeshBasicMaterial({ color:col, transparent:true, opacity:0.88, depthWrite:false, side:THREE.DoubleSide })
  );
  return m;
}

function spawnFire(gx, gz) {
  const origin = g2w(gx, gz);
  const tile   = tiles[gx][gz];
  tile.userData.onFire = true;
  tile.material.color.setHex(0x3a1200);
  tile.material.emissive.setHex(0xff3300);
  tile.material.emissiveIntensity = 0.55;

  for (let i = 0; i < 20; i++) {
    const t = Math.random();
    const col = t < 0.35 ? 0xff2200 : t < 0.65 ? 0xff7700 : 0xffee00;
    const fm  = makeFlame(col);
    const ox  = (Math.random()-0.5)*0.72;
    const oz  = (Math.random()-0.5)*0.72;
    fm.position.set(origin.x+ox, 0.12, origin.z+oz);
    scene.add(fm);
    fireParticles.push({
      mesh:fm, ox, oz,
      wx: origin.x, wz: origin.z,
      speed: 0.013+Math.random()*0.017,
      life: 0.5+Math.random()*0.5,
      maxLife: 0,
      phase: Math.random()*Math.PI*2,
      key: `${gx},${gz}`
    });
    fireParticles[fireParticles.length-1].maxLife = fireParticles[fireParticles.length-1].life;
  }
}

function killFire(gx, gz) {
  const key = `${gx},${gz}`;
  for (let i=fireParticles.length-1;i>=0;i--) {
    if(fireParticles[i].key===key){ scene.remove(fireParticles[i].mesh); fireParticles.splice(i,1); }
  }
  // spawn embers
  const origin = g2w(gx,gz);
  for(let i=0;i<10;i++){
    const em = new THREE.Mesh(
      new THREE.PlaneGeometry(0.07,0.07),
      new THREE.MeshBasicMaterial({color:0xff5500,transparent:true,opacity:0.9,depthWrite:false})
    );
    em.position.set(origin.x+(Math.random()-0.5)*0.7, 0.15+Math.random()*0.35, origin.z+(Math.random()-0.5)*0.7);
    em.rotation.x = -Math.PI/2;
    scene.add(em);
    emberParticles.push({ mesh:em, vy:0.016+Math.random()*0.02, life:1.0 });
  }
  // charcoal
  const tile = tiles[gx][gz];
  tile.userData.onFire  = false;
  tile.material.color.setHex(0x0e0e0e);
  tile.material.emissive.setHex(0x1a0600);
  tile.material.emissiveIntensity = 0.12;
  tile.position.y = -0.09;
}

function updateFire() {
  const t = Date.now()*0.001;
  for(let i=fireParticles.length-1;i>=0;i--) {
    const p = fireParticles[i];
    p.life -= 0.017;
    if(p.life<=0){
      // respawn tongue
      const nt=Math.random();
      p.mesh.material.color.setHex(nt<0.35?0xff2200:nt<0.65?0xff7700:0xffee00);
      p.ox=(Math.random()-0.5)*0.72; p.oz=(Math.random()-0.5)*0.72;
      p.speed=0.013+Math.random()*0.017;
      p.life=0.5+Math.random()*0.5; p.maxLife=p.life;
    }
    const prog = 1 - p.life/p.maxLife;
    const waver = Math.sin(t*6+p.phase)*0.07;
    p.mesh.position.set(p.wx+p.ox+waver, 0.12+prog*0.55, p.wz+p.oz);
    p.mesh.material.opacity = (1-prog*prog)*0.92;
    const s=0.7+(1-prog)*0.55; p.mesh.scale.set(s, s+prog*0.75, 1);
    p.mesh.rotation.z = Math.sin(t*4+p.phase)*0.28;
    // billboard
    const dy = camera.position.y - p.mesh.position.y;
    const dh = Math.sqrt((camera.position.x-p.mesh.position.x)**2+(camera.position.z-p.mesh.position.z)**2);
    p.mesh.rotation.x = -Math.PI/2 + Math.atan2(dy, dh);
  }
  // pulse tiles on fire
  burningTileCoords.forEach(({x,z})=>{
    const tile=tiles[x]?.[z];
    if(tile?.userData.onFire) tile.material.emissiveIntensity=0.38+Math.sin(t*9+x+z)*0.22;
  });
  // embers
  for(let i=emberParticles.length-1;i>=0;i--){
    const e=emberParticles[i];
    e.life-=0.026; e.mesh.position.y+=e.vy; e.vy*=0.95;
    e.mesh.material.opacity=e.life*0.88;
    if(e.life<=0){scene.remove(e.mesh);emberParticles.splice(i,1);}
  }
}

/* --- HIGHLIGHT --- */
function highlightMoves() {
  for(let x=0;x<BOARD_SIZE;x++) for(let z=0;z<BOARD_SIZE;z++){
    const t=tiles[x][z];
    if(!t.userData.burned && !t.userData.onFire){ t.material.emissive.setHex(0); t.material.emissiveIntensity=0; }
  }
  const p=state[turn];
  [[1,2],[1,-2],[-1,2],[-1,-2],[2,1],[2,-1],[-2,1],[-2,-1]].forEach(([dx,dz])=>{
    const tx=p.x+dx, tz=p.z+dz;
    if(isLegal(p.x,p.z,tx,tz)){
      tiles[tx][tz].material.emissive.setHex(state[turn].color);
      tiles[tx][tz].material.emissiveIntensity=0.60;
    }
  });
}

/* --- GAME LOGIC --- */
function isLegal(sx,sz,tx,tz){
  if(tx<0||tx>=BOARD_SIZE||tz<0||tz>=BOARD_SIZE) return false;
  if(tiles[tx][tz].userData.burned) return false;
  const dx=Math.abs(tx-sx),dz=Math.abs(tz-sz);
  return (dx===2&&dz===1)||(dx===1&&dz===2);
}
function hasMoves(player){
  const p=state[player];
  return [[1,2],[1,-2],[-1,2],[-1,-2],[2,1],[2,-1],[-2,1],[-2,-1]].some(([dx,dz])=>isLegal(p.x,p.z,p.x+dx,p.z+dz));
}
function updateUI(){
  const badge=document.getElementById('turn-badge');
  badge.innerText=(turn==='blue'?'⚔ Blue Knight':'⚔ Red Knight')+"'s Turn";
  const col=turn==='blue'?'#4488ff':'#ff4444';
  badge.style.borderColor=col; badge.style.color=col; badge.style.boxShadow=`0 0 20px ${col}55`;
}
function endGame(winner,reason){
  gameActive=false;
  document.getElementById('game-over').style.display='flex';
  document.getElementById('winner-text').innerText=(winner==='blue'?'Blue':'Red')+' Knight Wins!';
  document.getElementById('winner-text').style.color=winner==='blue'?'#4488ff':'#ff4444';
  document.getElementById('reason-text').innerText=reason;
  for(let x=0;x<BOARD_SIZE;x++) for(let z=0;z<BOARD_SIZE;z++)
    if(tiles[x]?.[z]&&!tiles[x][z].userData.burned&&!tiles[x][z].userData.onFire)
      tiles[x][z].material.emissiveIntensity=0;
}

function executeMove(tx,tz){
  isAnimating=true;
  const ps=state[turn], mover=turn, enemy=turn==='blue'?'red':'blue';
  const ox=ps.x, oz=ps.z;

  // extinguish previous fire → charcoal
  burningTileCoords.forEach(({x,z})=>killFire(x,z));
  burningTileCoords=[];

  // mark old tile burned, ignite it
  tiles[ox][oz].userData.burned=true;
  spawnFire(ox,oz);
  burningTileCoords.push({x:ox,z:oz});

  // Snap Y to known resting height before reading startPos,
  // so the idle bob's arbitrary sine value doesn't corrupt the arc.
  ps.mesh.position.y = 0.11;
  const startPos=ps.mesh.position.clone();
  const ep=g2w(tx,tz);
  const endPos=new THREE.Vector3(ep.x,0.11,ep.z);
  ps.mesh.lookAt(ep.x, ps.mesh.position.y, ep.z);

  const t0=Date.now(), dur=520;
  function jump(){
    const raw=Math.min((Date.now()-t0)/dur,1);
    const ease=raw<0.5?2*raw*raw:-1+(4-2*raw)*raw;
    ps.mesh.position.lerpVectors(startPos,endPos,ease);
    ps.mesh.position.y=0.11+Math.sin(raw*Math.PI)*1.85;
    ps.mesh.rotation.x=Math.sin(raw*Math.PI)*0.22;
    if(raw<1){requestAnimationFrame(jump);return;}
    ps.mesh.rotation.x=0; ps.x=tx; ps.z=tz;
    if(tx===state[enemy].x&&tz===state[enemy].z){endGame(mover,'The enemy knight was captured!');return;}
    if(!hasMoves(mover)){endGame(enemy,mover[0].toUpperCase()+mover.slice(1)+' trapped themselves!');return;}
    turn=enemy; updateUI();
    if(!hasMoves(turn)){endGame(mover,turn[0].toUpperCase()+turn.slice(1)+' has no moves!');return;}
    highlightMoves(); isAnimating=false;
  }
  jump();
}

/* --- START GAME --- */
function startGame(size) {
  BOARD_SIZE=size;
  if(size>8) camera.position.set(0,19,16);

  boardGroup.clear(); tiles=[];
  fireParticles.forEach(p=>scene.remove(p.mesh)); fireParticles.length=0;
  emberParticles.forEach(e=>scene.remove(e.mesh)); emberParticles.length=0;
  burningTileCoords=[];

  for(let x=0;x<BOARD_SIZE;x++){
    tiles[x]=[];
    for(let z=0;z<BOARD_SIZE;z++){
      const pos=g2w(x,z);
      const t=new THREE.Mesh(tileGeo,woodMat());
      t.position.set(pos.x,0,pos.z); t.receiveShadow=true; t.castShadow=true;
      t.userData={gridX:x,gridZ:z,burned:false,onFire:false,isTile:true};
      tiles[x][z]=t; boardGroup.add(t);
    }
  }

  if(state.blue.mesh) scene.remove(state.blue.mesh);
  state.blue.x=0; state.blue.z=0;
  state.blue.mesh=createKnight(state.blue.color);
  const bp=g2w(0,0);
  state.blue.mesh.position.set(bp.x,0.11,bp.z);
  state.blue.mesh.rotation.y=Math.PI*0.6;
  scene.add(state.blue.mesh);

  if(state.red.mesh) scene.remove(state.red.mesh);
  const re=BOARD_SIZE-1;
  state.red.x=re; state.red.z=re;
  state.red.mesh=createKnight(state.red.color);
  const rp=g2w(re,re);
  state.red.mesh.position.set(rp.x,0.11,rp.z);
  state.red.mesh.rotation.y=-Math.PI*0.6;
  scene.add(state.red.mesh);

  document.getElementById('main-menu').style.display='none';
  document.getElementById('ui-container').style.display='block';
  turn=Math.random()<0.5?'blue':'red';
  gameActive=true; updateUI(); highlightMoves();
}

document.getElementById('btn-8').addEventListener('click',()=>startGame(8));
document.getElementById('btn-10').addEventListener('click',()=>startGame(10));

/* --- INPUT --- */
const ray=new THREE.Raycaster(), ptr=new THREE.Vector2();
let ds={x:0,y:0};
renderer.domElement.addEventListener('pointerdown',e=>{ds.x=e.clientX;ds.y=e.clientY;});
renderer.domElement.addEventListener('pointerup',e=>{
  if(Math.hypot(e.clientX-ds.x,e.clientY-ds.y)>5||!gameActive||isAnimating) return;
  ptr.x=(e.clientX/innerWidth)*2-1; ptr.y=-(e.clientY/innerHeight)*2+1;
  ray.setFromCamera(ptr,camera);
  const hits=ray.intersectObjects(boardGroup.children);
  if(hits.length>0){
    const td=hits[0].object;
    if(td.userData.isTile){
      const p=state[turn];
      if(isLegal(p.x,p.z,td.userData.gridX,td.userData.gridZ))
        executeMove(td.userData.gridX,td.userData.gridZ);
    }
  }
});

/* --- IDLE BOB --- */
function idle(){
  if(isAnimating||!gameActive) return;
  const t=Date.now()*0.003;
  if(state.blue.mesh){state.blue.mesh.position.y=0.11+Math.sin(t)*0.025;state.blue.mesh.rotation.y=Math.PI*0.6+Math.sin(t*0.6)*0.04;}
  if(state.red.mesh) {state.red.mesh.position.y=0.11+Math.sin(t+1.9)*0.025;state.red.mesh.rotation.y=-Math.PI*0.6+Math.sin(t*0.6+1.9)*0.04;}
}

function animate(){
  requestAnimationFrame(animate);
  controls.update(); idle(); updateFire();
  renderer.render(scene,camera);
}
animate();

window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>
