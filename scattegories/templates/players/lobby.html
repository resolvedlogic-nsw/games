{% extends "base.html" %}
{% block title %}Waiting for Game{% endblock %}
{% block extra_head %}
<style>
body {
  background: var(--white);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

.lobby-header {
  text-align: center;
  margin-bottom: 40px;
}

.player-name {
  font-family: var(--font-display);
  font-size: 2.8rem;
  color: var(--slate);
  letter-spacing: 1px;
}

.player-label {
  color: var(--grey);
  font-size: 0.9rem;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 6px;
}

.status-card {
  width: 100%;
  max-width: 380px;
  background: #f1f5f9;
  border-radius: 16px;
  padding: 32px 24px;
  text-align: center;
}

.status-icon {
  font-size: 3rem;
  margin-bottom: 16px;
  display: block;
}

.status-title {
  font-family: var(--font-display);
  font-size: 2rem;
  color: var(--slate);
  margin-bottom: 8px;
  letter-spacing: 1px;
}

.status-sub {
  color: var(--grey);
  font-size: 0.95rem;
  line-height: 1.5;
}

.waiting-dots {
  display: inline-flex;
  gap: 6px;
  margin-top: 24px;
}

.waiting-dots span {
  width: 8px; height: 8px;
  background: var(--amber);
  border-radius: 50%;
  animation: dot-bounce 1.2s ease-in-out infinite;
}
.waiting-dots span:nth-child(2) { animation-delay: 0.2s; }
.waiting-dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes dot-bounce {
  0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
  40% { transform: translateY(-8px); opacity: 1; }
}

.round-info {
  width: 100%;
  max-width: 380px;
  margin-top: 20px;
  display: none;
}

.letter-big {
  font-family: var(--font-display);
  font-size: 8rem;
  color: var(--amber);
  text-align: center;
  line-height: 1;
  text-shadow: 0 8px 32px rgba(245,158,11,0.4);
}

.change-name {
  margin-top: 40px;
  color: var(--grey);
  font-size: 0.85rem;
  text-decoration: none;
}
.change-name:hover { color: var(--slate); }
</style>
{% endblock %}
{% block body %}
<div class="lobby-header">
  <div class="player-label">Playing as</div>
  <div class="player-name" id="player-name">{{ player.display_name }}</div>
</div>

<div class="status-card" id="status-card">
  <span class="status-icon">🎯</span>
  <div class="status-title" id="status-title">WAITING</div>
  <div class="status-sub" id="status-sub">The host will start the game soon.<br>Stay on this screen!</div>
  <div class="waiting-dots">
    <span></span><span></span><span></span>
  </div>
</div>

<div class="round-info" id="round-info">
  <div class="letter-big" id="round-letter"></div>
</div>

<a href="/change-name/" class="change-name">← Change my name</a>

<script>
let currentGameId = {{ game.id|default:"null" }};
let currentRoundId = null;
let pollInterval;

async function poll() {
  if (!currentGameId) {
    // Look for any active game
    try {
      const res = await fetch('/game/api/1/state/');
      if (res.ok) {
        const data = await res.json();
        currentGameId = data.game_id;
      }
    } catch(e) {}
    return;
  }

  try {
    const res = await fetch(`/game/api/${currentGameId}/state/`);
    const data = await res.json();

    if (data.round) {
      updateUI(data);
    }
  } catch(e) {}
}

function updateUI(data) {
  const round = data.round;
  const statusTitle = document.getElementById('status-title');
  const statusSub = document.getElementById('status-sub');
  const statusIcon = document.querySelector('.status-icon');
  const roundInfo = document.getElementById('round-info');

  if (round.status === 'waiting') {
    statusTitle.textContent = 'ROUND ' + round.number;
    statusSub.textContent = 'Round is about to begin. Get ready!';
    statusIcon.textContent = '⏳';
    document.getElementById('round-letter').textContent = round.letter;
    roundInfo.style.display = 'block';
  } else if (round.status === 'playing') {
    // Redirect to game screen
    window.location.href = `/play/${currentGameId}/`;
  } else if (round.status === 'reviewing' || round.status === 'locked') {
    statusTitle.textContent = 'TIME\'S UP';
    statusSub.textContent = 'The host is reviewing answers. Sit tight!';
    statusIcon.textContent = '🔍';
  } else if (round.status === 'complete') {
    statusTitle.textContent = 'ROUND DONE';
    statusSub.textContent = 'Check the leaderboard on screen!';
    statusIcon.textContent = '🏆';
  }
}

// Poll every 2.5 seconds
pollInterval = setInterval(poll, 2500);
poll();
</script>
{% endblock %}
