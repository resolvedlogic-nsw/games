{% extends "scattegories_base.html" %}

{% block body %}
<div style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; text-align: center; padding: 20px;">

    <h1 style="font-family: var(--font-display); font-size: 5rem; color: var(--slate); margin-bottom: 10px; letter-spacing: 2px;">
        SCATTEGORIES
    </h1>

    <p style="color: var(--slate-light); font-size: 1.2rem; margin-bottom: 40px;">
        Select your role to continue
    </p>

    <div style="display: flex; gap: 20px; flex-wrap: wrap; justify-content: center;">
        <!-- Player Link -->
        <a href="{% url 'scattegories:player_join' %}" class="btn-primary" style="text-decoration: none; padding: 16px 40px; font-size: 1.2rem; display: inline-block; text-align: center;">
            Join as Player
        </a>

        <!-- Host Link -->
        <a href="{% url 'scattegories:host_dashboard' %}" style="text-decoration: none; background: var(--slate); color: var(--white); padding: 16px 40px; border-radius: var(--radius); font-size: 1.2rem; display: inline-block; font-weight: 700; text-align: center; transition: all 0.15s ease;">
            Host a Game
        </a>
    </div>

</div>
{% endblock %}
