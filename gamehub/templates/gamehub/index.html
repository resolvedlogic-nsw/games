<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Game Launcher</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: #0d0d0f;
            color: #e6e6e6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: radial-gradient(circle at top, #1a1a1d, #0d0d0f 70%);
        }

        h1 {
            font-size: 42px;
            margin-bottom: 40px;
            letter-spacing: 2px;
            color: #ffffff;
            text-shadow: 0 0 12px #6a00ff;
        }

        .button-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 320px;
        }

        a.game-button {
            display: block;
            padding: 16px 20px;
            background: #1f1f24;
            color: #ffffff;
            text-decoration: none;
            font-size: 20px;
            border-radius: 10px;
            border: 2px solid #6a00ff;
            text-align: center;
            transition: 
                background 0.25s ease,
                transform 0.15s ease,
                box-shadow 0.25s ease;
        }

        a.game-button:hover {
            background: #6a00ff;
            transform: translateY(-4px);
            box-shadow: 0 0 18px #6a00ff;
        }

        a.game-button:active {
            transform: translateY(0);
            box-shadow: 0 0 8px #6a00ff;
        }

        footer {
            margin-top: 50px;
            font-size: 14px;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <h1>Game Launcher</h1>

    <div class="button-container">
        <a class="game-button" href="{% url 'cinqo:index' %}">Play Cinqo</a>
        <a class="game-button" href="{% url 'fivecrowns:index' %}">Play Five Crowns</a>
        <a class="game-button" href="{% url 'knightstrap:index' %}">Play Knightstrap</a>
        <a class="game-button" href="{% url 'labyrinth:index' %}">Play Labyrinth</a>
    </div>

    <footer>games.resolvedlogic.com.au</footer>

</body>
</html>
