<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Game Launcher</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            padding: 40px;
            text-align: center;
        }
        h1 { margin-bottom: 30px; }
        .button-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 400px;
            margin: 0 auto;
        }
        a.game-button {
            display: block;
            padding: 15px 20px;
            background: #0078d4;
            color: white;
            text-decoration: none;
            font-size: 20px;
            border-radius: 8px;
            transition: background 0.2s;
        }
        a.game-button:hover { background: #005fa3; }
    </style>
</head>
<body>

    <h1>Game Launcher</h1>

    <div class="button-container">
        <!-- The Hub (Brain) now points to the Pawn's "namespace" -->
        <a class="game-button" href="{% url 'cinqo:index' %}">Play Cinqo</a>
        <a class="game-button" href="{% url 'fivecrowns:index' %}">Play Five Crowns</a>
        <a class="game-button" href="{% url 'knightstrap:index' %}">Play Knightstrap</a>
        <a class="game-button" href="{% url 'labyrinth:index' %}">Play Labyrinth</a>
    </div>

</body>
</html>
