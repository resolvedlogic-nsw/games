<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Labyrinth – Game {{ game.id }}</title>
{% load static %}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════════════
   LABYRINTH – board.html stylesheet
   ═══════════════════════════════════════════════════════════════════ */
:root {
  --gold:       #c9a84c;
  --gold-dim:   rgba(201,168,76,0.35);
  --dark:       #0a0806;
  --dark2:      #120e05;
  --cell:       64px;
  --gap:        3px;
  --board-w:    calc(7 * var(--cell) + 6 * var(--gap));
  --reachable:  rgba(220, 50, 50, 0.2);
  --reach-bdr:  var(--reach-player, #dc3232);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--dark);
  color: #d4c09a;
  font-family: 'Crimson Pro', Georgia, serif;
  overflow-x: hidden;
}

body {
  background-image: 
    radial-gradient(ellipse at 15% 15%, #241505 0%, transparent 45%),
    radial-gradient(ellipse at 85% 85%, #160e02 0%, transparent 45%);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* --- Top Navigation Bar --- */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 24px;
  border-bottom: 1px solid var(--gold-dim);
  background: linear-gradient(to bottom, rgba(20,14,3,0.95), rgba(10,8,6,0.95));
  backdrop-filter: blur(4px);
  position: sticky;
  top: 0;
  z-index: 100;
}
.topbar-title {
  font-family: 'Cinzel Decorative', serif;
  font-size: 1.1rem;
  color: var(--gold);
  letter-spacing: 0.1em;
}
.turn-badge {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 0.9rem;
  letter-spacing: 0.08em;
}
.player-dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.3);
  display: inline-block;
  transition: background 0.3s;
}

/* --- Main Layout --- */
.game-layout {
  height: 100vh;
  display: grid;
  grid-template-columns: 200px 1fr 200px;
  gap: 0;
  padding: 8px;
  align-items: center;
  justify-items: center;
}
.side-panel {
  padding: 10px;
  width: 100%;
  overflow-y: auto;
  max-height: 100vh;
}
.panel-title {
  font-family: 'Cinzel Decorative', serif;
  font-size: 0.65rem;
  letter-spacing: 0.2em;
  color: var(--gold);
  opacity: 0.6;
  text-transform: uppercase;
  margin-bottom: 14px;
  border-bottom: 1px solid var(--gold-dim);
  padding-bottom: 6px;
}

/* --- The Board --- */
.board-container {
  position: relative;
  width: var(--board-w);
  height: var(--board-w);
  padding: 30px;
  background: #1a140b;
  border: 2px solid var(--gold-dim);
  border-radius: 8px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.8), inset 0 0 40px rgba(0,0,0,0.8);
}
.board-grid {
  position: relative;
  width: 100%;
  height: 100%;
}

/* --- Tiles --- */
.tile {
  position: absolute;
  width: var(--cell);
  height: var(--cell);
  transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
  border-radius: 4px;
  box-shadow: 0 4px 8px rgba(0,0,0,0.5);
  overflow: hidden;
  background: #2a2012;
  border: 1px solid rgba(201,168,76,0.2);
}
.tile-bg {
  width: 100%;
  height: 100%;
  position: absolute;
  top: 0;
  left: 0;
  background-size: cover;
  background-position: center;
  transition: transform 0.3s ease;
}
.tile-char {
  width: 60%;
  height: 60%;
  position: absolute;
  top: 20%;
  left: 20%;
  object-fit: contain;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.8));
  z-index: 2;
  transition: transform 0.3s ease;
}
.tile-overlay {
  position: absolute;
  inset: 0;
  pointer-events: none;
  transition: background 0.3s;
  z-index: 3;
}
.tile.reachable .tile-overlay {
  background: var(--reachable);
  box-shadow: inset 0 0 0 2px var(--reach-bdr);
}

/* --- Meeples --- */
.meeple {
  position: absolute;
  width: 36px;
  height: 36px;
  transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  z-index: 10;
  filter: drop-shadow(0 4px 6px rgba(0,0,0,0.6));
  pointer-events: none;
}

/* --- Push Buttons --- */
.push-btn {
  position: absolute;
  width: 24px;
  height: 24px;
  background: rgba(201,168,76,0.1);
  border: 1px solid var(--gold-dim);
  border-radius: 50%;
  color: var(--gold);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.2s;
  z-index: 20;
  font-size: 10px;
}
.push-btn:hover {
  background: var(--gold);
  color: var(--dark);
  transform: scale(1.2);
  box-shadow: 0 0 10px var(--gold);
}
.push-btn.disabled {
  opacity: 0.1;
  pointer-events: none;
}

/* --- Spare Tile UI --- */
.spare-wrapper {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 15px;
}
.spare-container {
  width: calc(var(--cell) * 1.5);
  height: calc(var(--cell) * 1.5);
  position: relative;
  border-radius: 6px;
  box-shadow: 0 10px 20px rgba(0,0,0,0.6);
  overflow: hidden;
  border: 1px solid rgba(201,168,76,0.4);
}
.rotate-btn {
  background: rgba(20,14,4,0.6);
  border: 1px solid var(--gold-dim);
  color: var(--gold);
  padding: 8px 16px;
  border-radius: 4px;
  font-family: 'Cinzel Decorative', serif;
  font-size: 0.8rem;
  cursor: pointer;
  transition: all 0.2s;
}
.rotate-btn:hover {
  background: var(--gold);
  color: var(--dark);
  box-shadow: 0 0 12px rgba(201,168,76,0.4);
}

/* --- Player Cards --- */
.player-card {
  background: rgba(0,0,0,0.4);
  border: 1px solid var(--gold-dim);
  border-radius: 6px;
  padding: 12px;
  margin-bottom: 12px;
  transition: transform 0.2s, border-color 0.2s;
  position: relative;
  overflow: hidden;
}
.player-card.active {
  border-color: var(--gold);
  background: rgba(201,168,76,0.05);
  box-shadow: inset 0 0 20px rgba(0,0,0,0.8), 0 0 10px rgba(201,168,76,0.1);
}
.player-card.active::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 4px;
  background: var(--gold);
  box-shadow: 0 0 8px var(--gold);
}
.pcard-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
}
.pcard-meeple {
  width: 24px;
  height: 24px;
  object-fit: contain;
}
.pcard-name {
  font-family: 'Cinzel Decorative', serif;
  font-size: 0.9rem;
  font-weight: bold;
  color: #fff;
}
.pcard-target {
  display: flex;
  align-items: center;
  gap: 12px;
  background: rgba(0,0,0,0.6);
  padding: 8px;
  border-radius: 4px;
  border: 1px solid rgba(255,255,255,0.05);
}

/* --- Treasure/Winner Popup --- */
#treasure-popup {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(8px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.4s;
}
#treasure-popup.show {
  opacity: 1;
  pointer-events: auto;
}
.treasure-card {
  background: linear-gradient(145deg, #1e1507, #0f0b04);
  border: 1px solid var(--gold);
  padding: 50px;
  border-radius: 8px;
  text-align: center;
  box-shadow: 0 0 50px rgba(201,168,76,0.2);
  transform: scale(0.9);
  transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}
#treasure-popup.show .treasure-card {
  transform: scale(1);
}
.treasure-title {
  font-family: 'Cinzel Decorative', serif;
  font-size: 2.5rem;
  color: var(--gold);
  margin-bottom: 20px;
  text-shadow: 0 0 20px rgba(201,168,76,0.6);
}
#treasure-img {
  width: 120px;
  height: 120px;
  object-fit: contain;
  filter: drop-shadow(0 10px 15px rgba(0,0,0,0.8));
  margin-bottom: 30px;
}

/* --- Toasts --- */
#toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: rgba(20,14,4,0.95);
  border: 1px solid var(--gold);
  padding: 12px 30px;
  border-radius: 30px;
  color: var(--gold);
  font-family: 'Cinzel Decorative', serif;
  letter-spacing: 0.1em;
  font-size: 0.9rem;
  transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  z-index: 1000;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}
#toast.show {
  transform: translateX(-50%) translateY(0);
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">Labyrinth</div>
  <div class="turn-badge" id="turn-indicator">
    <div class="player-dot" id="turn-dot"></div>
    <span class="phase-label" id="phase-label">Push a Tile</span>
  </div>
  <div style="font-size: 0.8rem; color: var(--gold-dim);">
    {% if game.mode == 'online' %}Room Code: <span style="color:#fff; letter-spacing: 0.2em;">{{ game.room_code }}</span>{% endif %}
  </div>
</div>

<div class="game-layout">
  <div class="side-panel left-panel">
    <div class="panel-title">Current Spare</div>
    <div class="spare-wrapper">
      <div class="spare-container" id="spare-container"></div>
      <button class="rotate-btn" onclick="rotateSpare()">↻ Rotate Tile</button>
    </div>
  </div>

  <div class="board-container" id="board-container">
    <div class="board-grid" id="grid"></div>
  </div>

  <div class="side-panel right-panel">
    <div class="panel-title">Adventurers</div>
    <div id="players-list"></div>
  </div>
</div>

<div id="treasure-popup">
  <div class="treasure-card">
    <div class="treasure-title" id="popup-title">Target Found!</div>
    <img id="treasure-img" src="" alt="Popup Image">
    <div id="game-over-buttons" style="display: none; margin-top: 24px; gap: 14px; justify-content: center;">
      <button class="rotate-btn" onclick="document.getElementById('treasure-popup').classList.remove('show')">View Board</button>
      <a href="{% url 'labyrinth:index' %}" class="rotate-btn" style="text-decoration:none; display:inline-block; text-align:center;">New Game</a>
    </div>
  </div>
</div>

<div id="toast">Your Turn</div>

<script>
// --- Constants & Config ---
const GAME_ID = {{ game.id }};
const BASE_URL = `/labyrinth/${GAME_ID}`;
const STATIC_URL = "{% static '' %}";
const THEME = "{{ theme }}";
const MODE = "{{ game.mode }}";
const MY_ID = parseInt("{{ player_id }}");

// Base image folder based on theme
const IMG_BASE = THEME === 'pokemon' ? `${STATIC_URL}images/pokemon/` : `${STATIC_URL}images/`;

let state = null;
let phase = 'push'; // local phase flag

// --- Helper Functions ---

// 1. Get correct tile image (SVG for classic, JPG for pokemon)
function getTilePath(shape) {
  if (THEME === 'pokemon') return `${IMG_BASE}path${shape}.jpg`;
  return `${IMG_BASE}shape${shape}.svg`;
}

// 2. Get correct meeple/ball
function getMeeplePath(colorHex) {
  const cMap = { '#e74c3c':'red', '#3498db':'blue', '#2ecc71':'green', '#f39c12':'yellow', '#9b59b6':'purple' };
  const colorName = cMap[colorHex] || 'red';
  if (THEME === 'pokemon') return `${IMG_BASE}ball${colorName}.png`;
  return `${IMG_BASE}meeple_${colorName}.svg`; 
}

// 3. Get character image (handles secret tokens for online mode)
function charImg(id) {
  if (id === '?') return `${IMG_BASE}secret.png`; // Fallback if you create a secret.png
  const n = String(id).padStart(2, '0');
  return `${IMG_BASE}character${n}.png`;
}

// --- Polling & Setup ---
fetchState();

if (MODE === 'online') {
  setInterval(() => {
    fetch(`${BASE_URL}/poll/`)
      .then(r => r.json())
      .then(newState => {
        // Only re-render if the sequence number advanced (someone made a move)
        if (!state || newState.seq > state.seq) {
          state = newState;
          render(state);
        }
      });
  }, 2500);
}

function toast(msg, color = 'var(--gold)') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.borderColor = color;
  el.style.color = color;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

function canInteract() {
  return MODE === 'pass_and_play' || state.current_turn === MY_ID;
}

// --- Main Render Engine ---
function render(st) {
  state = st;
  
  // Topbar UI
  document.getElementById('turn-dot').style.background = st.current_player.color;
  if (MODE === 'online' && st.current_turn !== MY_ID) {
    document.getElementById('phase-label').textContent = `Waiting for ${st.current_player.name}...`;
  } else {
    document.getElementById('phase-label').textContent = phase === 'push' ? "Push a Tile" : "Move your piece";
  }

  buildGrid(st);
  buildSpare(st.spare);
  buildPlayers(st);
  
  // Check win state specifically for spectators/other devices
  if (st.phase === 'over') {
    const winner = st.players.find(p => p.winner);
    if (winner && winner.id !== MY_ID && MODE === 'online') {
       toast(`Game Over! ${winner.name} wins!`, winner.color);
    }
  }
}

// --- Build the Board ---
function buildGrid(st) {
  const gridEl = document.getElementById('grid');
  gridEl.innerHTML = '';
  
  // These must match your CSS --cell and --gap
  const cell = 64; 
  const gap = 3;
  
  // 1. Draw Tiles
  for (let r = 0; r < 7; r++) {
    for (let c = 0; c < 7; c++) {
      const t = st.tiles[r][c];
      const isReachable = (phase === 'move') && st.reachable.some(([rr, cc]) => rr === r && cc === c);
      
      const div = document.createElement('div');
      div.className = `tile ${isReachable ? 'reachable' : ''}`;
      div.style.left = `${c * (cell + gap)}px`;
      div.style.top = `${r * (cell + gap)}px`;
      
      if (isReachable && canInteract()) {
        div.style.cursor = 'pointer';
        div.onclick = () => moveTo(r, c);
      }

      // Background path
      const bg = document.createElement('div');
      bg.className = 'tile-bg';
      bg.style.backgroundImage = `url('${getTilePath(t.shape)}')`;
      bg.style.transform = `rotate(${t.rotation * 90}deg)`;
      div.appendChild(bg);

      // Character Target
      if (t.character) {
        const img = document.createElement('img');
        img.className = 'tile-char';
        img.src = charImg(t.character);
        img.style.transform = `rotate(-${t.rotation * 90}deg)`; // keep character upright
        bg.appendChild(img);
      }
      
      const overlay = document.createElement('div');
      overlay.className = 'tile-overlay';
      div.appendChild(overlay);

      gridEl.appendChild(div);
    }
  }

  // 2. Draw Push Buttons
  if (phase === 'push' && canInteract() && st.phase !== 'over') {
    const indices = [1, 3, 5];
    const offsets = {
      'top':    { x: c => c*(cell+gap)+cell/2-12, y: () => -20, sym: '▼' },
      'bottom': { x: c => c*(cell+gap)+cell/2-12, y: () => 7*(cell+gap)-10, sym: '▲' },
      'left':   { x: () => -20, y: r => r*(cell+gap)+cell/2-12, sym: '▶' },
      'right':  { x: () => 7*(cell+gap)-10, y: r => r*(cell+gap)+cell/2-12, sym: '◀' }
    };

    const lp = st.last_push;
    const revDir = {'left':'right','right':'left','top':'bottom','bottom':'top'};
    
    ['top','bottom','left','right'].forEach(dir => {
      indices.forEach(idx => {
        // Hide the button that would reverse the last move
        if (lp && lp.index === idx && revDir[dir] === lp.direction) return;
        
        const btn = document.createElement('div');
        btn.className = 'push-btn';
        const fn = offsets[dir];
        btn.style.left = `${fn.x(idx)}px`;
        btn.style.top = `${fn.y(idx)}px`;
        btn.textContent = fn.sym;
        btn.onclick = () => pushTile(dir, idx);
        gridEl.appendChild(btn);
      });
    });
  }

  // 3. Draw Meeples (Simplified logic - base color only)
  st.players.forEach(p => {
    const m = document.createElement('img');
    m.className = 'meeple';
    m.src = getMeeplePath(p.color);
    
    // Center meeple on tile
    m.style.left = `${p.col * (cell + gap) + cell/2 - 18}px`;
    m.style.top = `${p.row * (cell + gap) + cell/2 - 18}px`;
    gridEl.appendChild(m);
  });
}

function buildSpare(sp) {
  const container = document.getElementById('spare-container');
  container.innerHTML = '';
  
  const bg = document.createElement('div');
  bg.className = 'tile-bg';
  bg.style.backgroundImage = `url('${getTilePath(sp.shape)}')`;
  bg.style.transform = `rotate(${sp.rotation * 90}deg)`;
  
  if (sp.character) {
    const img = document.createElement('img');
    img.className = 'tile-char';
    img.src = charImg(sp.character);
    img.style.transform = `rotate(-${sp.rotation * 90}deg)`;
    bg.appendChild(img);
  }
  container.appendChild(bg);
}

function buildPlayers(st) {
  const list = document.getElementById('players-list');
  list.innerHTML = '';
  
  st.players.forEach(p => {
    const isTurn = (p.id === st.current_turn);
    const card = document.createElement('div');
    card.className = `player-card ${isTurn ? 'active' : ''}`;
    
    const needsHome = p.current_target === null;
    let targetHtml = '';
    
    if (needsHome) {
      // Go Home Square UI
      targetHtml = `
        <div style="width:44px; height:44px; border-radius:4px; border:1px solid var(--gold-dim); background: rgba(0,0,0,0.4); display:flex; align-items:center; justify-content:center; box-shadow: inset 0 0 8px rgba(0,0,0,0.8);">
          <div style="width:24px; height:24px; border-radius:50%; background:${p.color}; border:2px solid rgba(255,255,255,0.8); box-shadow: 0 0 10px ${p.color}; display:flex; align-items:center; justify-content:center; font-size:12px;">🏠</div>
        </div>`;
    } else if (p.current_target === '?') {
      // Secret Target for Online mode
      targetHtml = `<div style="width:44px;height:44px;display:flex;align-items:center;justify-content:center;border:1px solid var(--gold-dim);color:var(--gold); font-size: 24px;">?</div>`;
    } else {
      // Normal Target
      targetHtml = `<img src="${charImg(p.current_target)}" style="width:44px; height:44px; object-fit:contain;">`;
    }

    card.innerHTML = `
      <div class="pcard-header">
        <img src="${getMeeplePath(p.color)}" class="pcard-meeple">
        <span class="pcard-name" style="color: ${p.color}">${p.name} ${p.winner ? '👑' : ''}</span>
      </div>
      <div class="pcard-target">
        ${targetHtml}
        <div style="flex:1;">
          <div style="font-size:0.7rem; color:var(--gold-dim); text-transform:uppercase; margin-bottom:4px;">${needsHome ? 'Return Home!' : 'Hunting'}</div>
          <div style="font-size:0.8rem;">Tokens: <span style="color:#fff">${p.score} / ${p.total_tokens}</span></div>
        </div>
      </div>
    `;
    list.appendChild(card);
  });
}

// --- API Calls ---
function fetchState() {
  fetch(`${BASE_URL}/state/`)
    .then(r => r.json())
    .then(st => { state = st; render(st); });
}

function rotateSpare() {
  if (!canInteract() || phase !== 'push') return;
  fetch(`${BASE_URL}/rotate-spare/`, {method:'POST', headers:{'X-CSRFToken':'{{ csrf_token }}'}})
    .then(r => r.json())
    .then(render);
}

function pushTile(dir, idx) {
  if (!canInteract() || phase !== 'push') return;
  fetch(`${BASE_URL}/push/`, {
    method: 'POST', 
    headers: {'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}'},
    body: JSON.stringify({direction: dir, index: idx})
  })
  .then(r => r.json())
  .then(st => {
    if (st.error) { toast(st.error, '#e74c3c'); return; }
    
    phase = 'move';
    document.documentElement.style.setProperty('--reach-player', st.current_player.color);
    render(st);
    toast("Now move your piece!");
  });
}

function moveTo(r, c) {
  if (!canInteract() || phase !== 'move') return;
  
  const previousTarget = state.current_player.current_target;

  fetch(`${BASE_URL}/move/`, {
    method: 'POST', 
    headers: {'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}'},
    body: JSON.stringify({player_id: MY_ID, row: r, col: c})
  })
  .then(res => res.json())
  .then(st => {
    if (st.error) { toast(st.error, '#e74c3c'); return; }
    
    phase = 'push';
    render(st);

    // Popup Logic
    const popup = document.getElementById('treasure-popup');
    const img = document.getElementById('treasure-img');
    const title = document.getElementById('popup-title');
    const btnGroup = document.getElementById('game-over-buttons');

    if (st.message === "PLAYER_WON") {
      title.textContent = `${st.current_player.name} WINS!`;
      title.style.color = st.current_player.color;
      title.style.textShadow = `0 0 20px ${st.current_player.color}`;
      
      // Winner shows their OWN meeple/ball
      img.src = getMeeplePath(st.current_player.color); 
      
      btnGroup.style.display = 'flex';
      popup.classList.add('show');
      toast(`Game Over! ${st.current_player.name} is the winner!`, st.current_player.color);

    } else if (st.message === "TARGET_FOUND") {
      title.textContent = "Target Found!";
      title.style.color = "var(--gold)";
      title.style.textShadow = "0 0 20px var(--gold)";
      
      img.src = charImg(previousTarget); 
      
      btnGroup.style.display = 'none';
      popup.classList.add('show');
      
      setTimeout(() => {
        popup.classList.remove('show');
        if (st.phase !== 'over') {
          toast(`${st.players[st.current_turn].name}'s turn`);
        }
      }, 2500);

    } else {
      if (st.phase !== 'over') {
        toast(`${st.players[st.current_turn].name}'s turn`);
      }
    }
  });
}
</script>
</body>
</html>
