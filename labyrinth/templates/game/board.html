<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Labyrinth – Game {{ game.id }}</title>
{% load static %}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════════════
   LABYRINTH – board.html stylesheet
   ═══════════════════════════════════════════════════════════════════ */
:root {
  --gold:       #c9a84c;
  --gold-dim:   rgba(201,168,76,0.35);
  --dark:       #0a0806;
  --dark2:      #120e05;
  --cell:       64px;
  --gap:        3px;
  --board-w:    calc(7 * var(--cell) + 6 * var(--gap));
  --reachable:  rgba(220, 50, 50, 0.2);
  --reach-bdr:  var(--reach-player, #dc3232);
  --reach-player: #dc3232;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--dark);
  color: #d4c09a;
  font-family: 'Crimson Pro', Georgia, serif;
  overflow-x: hidden;
}

body {
  background-image:
    radial-gradient(ellipse at 15% 15%, #241505 0%, transparent 45%),
    radial-gradient(ellipse at 85% 85%, #160e02 0%, transparent 45%);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── Top bar ──────────────────────────────────────────────── */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 24px;
  border-bottom: 1px solid var(--gold-dim);
  background: linear-gradient(to bottom, rgba(20,14,3,0.95), rgba(10,8,6,0.95));
  backdrop-filter: blur(4px);
  position: sticky; top: 0; z-index: 100;
}

.topbar-title {
  font-family: 'Cinzel Decorative', serif;
  font-size: 1.1rem;
  color: var(--gold);
  letter-spacing: 0.1em;
}

.turn-badge {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 0.9rem;
  letter-spacing: 0.08em;
}

.player-dot {
  width: 12px; height: 12px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.3);
  display: inline-block;
}

.phase-label {
  font-size: 0.75rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--gold);
  opacity: 0.7;
}

.home-link {
  font-size: 0.8rem;
  color: var(--gold-dim);
  text-decoration: none;
  letter-spacing: 0.1em;
  transition: color 0.2s;
}
.home-link:hover { color: var(--gold); }

/* ── Layout ───────────────────────────────────────────────── */
.game-layout {
  height: 100vh;
  display: grid;
  grid-template-columns: 170px 1fr 170px;
  grid-template-rows: 1fr;
  gap: 0;
  padding: 8px;
  align-items: center;
  justify-items: center;
  overflow: hidden;
}

/* ── Side panels ──────────────────────────────────────────── */
.side-panel {
  padding: 10px;
  width: 100%;
  overflow-y: auto;
  max-height: 100vh;
}

.panel-title {
  font-family: 'Cinzel Decorative', serif;
  font-size: 0.65rem;
  letter-spacing: 0.2em;
  color: var(--gold);
  opacity: 0.6;
  text-transform: uppercase;
  margin-bottom: 14px;
  border-bottom: 1px solid var(--gold-dim);
  padding-bottom: 6px;
}

/* ── Spare tile panel ─────────────────────────────────────── */
.spare-wrapper {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}

.spare-tile-container {
  position: relative;
  width: 80px; height: 80px;
}

.rotate-btn {
  background: linear-gradient(135deg, #4a3410, #8b6914);
  border: 1px solid var(--gold-dim);
  color: var(--gold);
  padding: 8px 20px;
  font-family: 'Cinzel Decorative', serif;
  font-size: 0.6rem;
  letter-spacing: 0.12em;
  cursor: pointer;
  transition: all 0.2s;
  width: 100%;
}
.rotate-btn:hover {
  background: linear-gradient(135deg, #8b6914, #c9a84c);
  color: var(--dark);
  box-shadow: 0 0 16px rgba(201,168,76,0.3);
}

/* ── Players list ─────────────────────────────────────────── */
.player-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.player-card {
  padding: 10px 12px;
  border: 1px solid rgba(201,168,76,0.15);
  background: rgba(20,14,4,0.6);
  display: flex;
  align-items: center;
  gap: 10px;
  transition: all 0.3s;
}
.player-card.active-player {
  border-color: var(--gold);
  background: rgba(201,168,76,0.08);
  box-shadow: 0 0 16px rgba(201,168,76,0.15);
}

.player-avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.2);
  flex-shrink: 0;
}

.player-info { flex: 1; min-width: 0; }
.player-name {
  font-size: 0.85rem;
  font-weight: 400;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.player-pos {
  font-size: 0.7rem;
  opacity: 0.5;
  letter-spacing: 0.05em;
}

/* ── Board area ───────────────────────────────────────────── */
.board-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
}

/* ── Push arrows ──────────────────────────────────────────── */
.push-row {
  display: grid;
  grid-template-columns: var(--cell) repeat(7, var(--cell) var(--gap)) var(--cell);
  /* simplify: just use flex for arrow rows */
  display: flex;
  gap: var(--gap);
  width: calc(var(--board-w) + 2 * var(--cell) + 2 * var(--gap));
}

.push-arrow {
  width: var(--cell);
  height: var(--cell);
  display: flex;
  align-items: center;
  justify-content: center;
  background: transparent;
  border: none;
  cursor: pointer;
  color: var(--gold);
  opacity: 0.4;
  transition: all 0.2s;
  font-size: 1.4rem;
  flex-shrink: 0;
}
.push-arrow:hover:not(:disabled) {
  opacity: 1;
  text-shadow: 0 0 12px var(--gold);
  transform: scale(1.1);
}
.push-arrow:disabled { opacity: 0.1; cursor: default; }
.push-arrow.spacer { pointer-events: none; opacity: 0; }

/* ── Board with side arrows ───────────────────────────────── */
.board-with-sides {
  display: flex;
  gap: var(--gap);
  align-items: flex-start;
}

.side-arrows {
  display: flex;
  flex-direction: column;
  gap: var(--gap);
}

/* ── Grid ─────────────────────────────────────────────────── */
.board-grid {
  display: grid;
  grid-template-columns: repeat(7, var(--cell));
  grid-template-rows: repeat(7, var(--cell));
  gap: var(--gap);
  background: #050302;
  border: 1px solid rgba(201,168,76,0.2);
  box-shadow:
    0 0 0 1px rgba(0,0,0,0.8),
    0 20px 60px rgba(0,0,0,0.9),
    inset 0 0 40px rgba(0,0,0,0.5);
  position: relative;
}

/* ── Tile ─────────────────────────────────────────────────── */
.tile {
  width: var(--cell);
  height: var(--cell);
  position: relative;
  overflow: hidden;
  cursor: default;
  transition: box-shadow 0.15s, transform 0.15s;
  background: #1a1206;
}

.tile img.tile-base {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  /* rotation applied via transform on wrapper */
}

.tile img.tile-char {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  /* counter-rotate the character so it stays upright */
}

.tile-inner {
  position: absolute;
  inset: 0;
  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.tile.reachable {
  cursor: pointer;
  /* Use the dynamic variables for the border and the outer shadow */
  box-shadow: inset 0 0 0 2px var(--reach-player), 0 0 12px var(--reachable-bg);
}
.tile.reachable::after {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--reachable-bg); /* Use dynamic variable for the inner pulse */
  pointer-events: none;
  animation: pulse-green 1.2s ease-in-out infinite;
}
@keyframes pulse-green {
  0%, 100% { opacity: 0.4; }
  50%       { opacity: 0.9; }
}

.tile.player-here::before {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(255,255,255,0.04);
  z-index: 5;
}

/* ── Player tokens on tiles ───────────────────────────────── */
.token-layer {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 10;
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  justify-content: center;
  gap: 2px;
  padding: 4px;
}

.token {
  width: 36px; height: 36px; /* Doubled size */
  flex-shrink: 0;
  transition: transform 0.3s ease;
}

/* ── Spare tile ───────────────────────────────────────────── */
.spare-tile {
  width: 80px; height: 80px;
}

/* ── Phase indicator ──────────────────────────────────────── */
.phase-indicator {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-top: 16px;
}

.phase-step {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.75rem;
  opacity: 0.4;
  transition: opacity 0.3s;
  letter-spacing: 0.05em;
}
.phase-step.active { opacity: 1; color: var(--gold); }
.phase-step.done   { opacity: 0.6; text-decoration: line-through; }

.phase-num {
  width: 18px; height: 18px;
  border-radius: 50%;
  border: 1px solid currentColor;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.65rem;
  flex-shrink: 0;
}

/* ── Toast notifications ──────────────────────────────────── */
#toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: rgba(20,14,4,0.95);
  border: 1px solid var(--gold-dim);
  color: var(--gold);
  padding: 10px 24px;
  font-size: 0.85rem;
  letter-spacing: 0.1em;
  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  z-index: 999;
  pointer-events: none;
  white-space: nowrap;
}
#toast.show { transform: translateX(-50%) translateY(0); }
#toast.error { border-color: #dc6464; color: #dc6464; }

/* ── Responsive ───────────────────────────────────────────── */
@media (max-width: 900px) {
  :root { --cell: 52px; }
  .game-layout {
    grid-template-columns: 1fr;
    grid-template-rows: auto auto auto;
    padding: 10px;
  }
  .side-panel { padding: 8px; }
}

/* ── Target Found Pop-up ── */
#treasure-popup {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.8);
  backdrop-filter: blur(8px);
  z-index: 2000;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}

#treasure-popup.show {
  opacity: 1;
  pointer-events: auto;
}

.treasure-card {
  background: linear-gradient(145deg, #1e1507, #0a0806);
  border: 2px solid var(--gold);
  padding: 40px 60px;
  border-radius: 8px;
  text-align: center;
  transform: scale(0.8) translateY(50px);
  transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  box-shadow: 0 0 50px rgba(201,168,76,0.3);
}

#treasure-popup.show .treasure-card {
  transform: scale(1) translateY(0);
}

.treasure-title {
  font-family: 'Cinzel Decorative', serif;
  color: var(--gold);
  font-size: 2.5rem;
  margin-bottom: 20px;
  text-shadow: 0 0 20px var(--gold);
}

#treasure-img {
  width: 150px;
  height: 150px;
  border-radius: 8px;
  box-shadow: inset 0 0 20px #000;
}
</style>
</head>
<body>

<!-- ── Main layout ──────────────────────────────────────────────── -->
<div class="game-layout">

  <!-- Left panel: title + spare tile + rotate + phase -->
  <div class="side-panel">
    <div style="margin-bottom:14px; border-bottom:1px solid var(--gold-dim); padding-bottom:10px;">
      <div class="panel-title" style="font-size:0.85rem; opacity:1; color:var(--gold); margin-bottom:4px;">Labyrinth</div>
      <div id="tb-name" style="font-size:0.75rem; letter-spacing:0.08em;"></div>
      <div id="tb-phase" style="font-size:0.65rem; letter-spacing:0.15em; text-transform:uppercase; opacity:0.6; margin-top:2px;"></div>
      <a href="{% url 'labyrinth:index' %}" style="font-size:0.7rem; color:var(--gold-dim); text-decoration:none; display:block; margin-top:6px;">← New Game</a>
    </div>
    <div class="panel-title">Spare Tile</div>
    <div class="spare-wrapper">
      <div class="spare-tile-container" id="spare-tile"></div>
      <button class="rotate-btn" onclick="rotateSpareTile()">↻ Rotate</button>
    </div>

    <div style="margin-top: 16px;">
      <div class="panel-title">Phase</div>
      <div class="phase-indicator">
        <div class="phase-step" id="ph-push">
          <div class="phase-num">1</div>
          <span>Push a tile</span>
        </div>
        <div class="phase-step" id="ph-move">
          <div class="phase-num">2</div>
          <span>Move token</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Centre: board -->
  <div class="board-area" id="board-area">
    <!-- Rendered by JS -->
  </div>

  <!-- Right panel: players -->
  <div class="side-panel">
    <div class="panel-title">Adventurers</div>
    <div class="player-list" id="player-list"></div>
  </div>

</div>

<div id="toast"></div>
<div id="treasure-popup">
  <div class="treasure-card">
    <div class="treasure-title">Target Found!</div>
    <img id="treasure-img" src="" alt="Treasure">
  </div>
</div>
<!-- ════════════════════════════════════════════════════════════════
     JAVASCRIPT
     ════════════════════════════════════════════════════════════════ -->
<script>
const GAME_ID   = {{ game.id }};
const MY_ID     = {{ player_id }};
const IMG_BASE  = "{% static 'images/' %}";
const MEEPLE_BASE = "{% static 'images/' %}";
const GAME_URL  = `/labyrinth/${GAME_ID}`;
const PLAYER_COLORS_NAME = ['red','blue','green','yellow'];
const PLAYER_COLORS_HEX  = ['#e74c3c','#3498db','#2ecc71','#f39c12'];
const CORNERS = [[0,0],[0,6],[6,6],[6,0]];

// Phase: 'push' or 'move'
let phase = 'push';
let state = {{ state_json|safe }};

// ── Tile image helpers ────────────────────────────────────────────

function shapeImg(shape) {
  const map = { 'i': 'shapei.svg', 'l': 'shapel.svg', 't': 'shapet.svg' };
  return IMG_BASE + map[shape];
}

function charImg(id) {
  const n = String(id).padStart(2, '0');
  return IMG_BASE + `character${n}.png`;
}

function rotDeg(r) { return r * 90; }

// ── Build the board HTML ──────────────────────────────────────────

function buildBoard(st) {
  const area = document.getElementById('board-area');

  const reachSet = new Set((st.reachable || []).map(([r,c]) => `${r},${c}`));
  const playerMap = {};  // "row,col" → [players]
  for (const p of st.players) {
    const key = `${p.row},${p.col}`;
    if (!playerMap[key]) playerMap[key] = [];
    playerMap[key].push(p);
  }

  const lp = st.last_push;

  // Build push-arrow disabling logic
  function arrowDisabled(dir, idx) {
    if (phase !== 'push') return true;
    // Disabled if it would reverse last push
    const rev = { left:'right', right:'left', top:'bottom', bottom:'top' };
    if (lp && rev[dir] === lp.direction && idx === lp.index) return true;
    return false;
  }

  // Movable row/col indices (1,3,5)
  const movable = [1, 3, 5];

  // ── Top push row ──────────────────────────────────────────────
  let topRowHTML = '<div class="push-row">';
  topRowHTML += '<button class="push-arrow spacer" disabled></button>';
  for (let c = 0; c < 7; c++) {
    if (movable.includes(c)) {
      const dis = arrowDisabled('top', c) ? 'disabled' : '';
      topRowHTML += `<button class="push-arrow" ${dis} title="Push column ${c} down" onclick="pushTile('top',${c})">▼</button>`;
    } else {
      topRowHTML += '<button class="push-arrow spacer" disabled></button>';
    }
  }
  topRowHTML += '<button class="push-arrow spacer" disabled></button>';
  topRowHTML += '</div>';

  // ── Grid with side arrows ─────────────────────────────────────
  let gridHTML = '<div class="board-with-sides">';

  // Left arrows
  gridHTML += '<div class="side-arrows">';
  for (let r = 0; r < 7; r++) {
    if (movable.includes(r)) {
      const dis = arrowDisabled('left', r) ? 'disabled' : '';
      gridHTML += `<button class="push-arrow" style="height:var(--cell)" ${dis} title="Push row ${r} right" onclick="pushTile('left',${r})">▶</button>`;
    } else {
      gridHTML += `<button class="push-arrow spacer" style="height:var(--cell)" disabled></button>`;
    }
  }
  gridHTML += '</div>';

  // Grid cells
  gridHTML += '<div class="board-grid" id="grid">';
  for (let r = 0; r < 7; r++) {
    for (let c = 0; c < 7; c++) {
      const tile = st.tiles[r][c];
      const key  = `${r},${c}`;
      const isReachable = reachSet.has(key);
      const playersHere = playerMap[key] || [];

      let cls = 'tile';
      if (isReachable) cls += ' reachable';
      if (playersHere.length) cls += ' player-here';

      let clickAttr = '';
      if (isReachable && phase === 'move') {
        clickAttr = `onclick="moveTo(${r},${c})"`;
      }

      // Character counter-rotation: base rotates, char must counter-rotate to stay upright
      const cDeg = -rotDeg(tile.rotation);

      gridHTML += `<div class="${cls}" data-row="${r}" data-col="${c}" ${clickAttr}>`;
      gridHTML += `  <div class="tile-inner" style="transform:rotate(${rotDeg(tile.rotation)}deg)">`;
      
      // Inject home base dots onto the corners
      const homeColors = { '0,0': '#e74c3c', '0,6': '#3498db', '6,6': '#2ecc71', '6,0': '#f39c12' };
      if (homeColors[key]) {
        gridHTML += `    <div style="position:absolute; width:14px; height:14px; border-radius:50%; background:${homeColors[key]}; top:6px; left:6px; border:2px solid rgba(255,255,255,0.5); box-shadow:0 0 6px #000; z-index:4;"></div>`;
      }
      
      gridHTML += `    <img class="tile-base" src="${shapeImg(tile.shape)}" alt="">`;
      if (tile.character) {
        gridHTML += `    <img class="tile-char" src="${charImg(tile.character)}" style="transform:rotate(${cDeg}deg)" alt="">`;
      }
      gridHTML += `  </div>`;

      // Player tokens
      if (playersHere.length) {
        gridHTML += '<div class="token-layer">';
        for (const p of playersHere) {
          // Dynamically grab the correct meeple SVG based on the player ID
          const meepleFile = `meeple_${PLAYER_COLORS_NAME[p.id]}.svg`;
          
          gridHTML += `<img src="${MEEPLE_BASE}${meepleFile}" class="token" style="border:none; box-shadow:none; background:transparent;" title="${p.name}" alt="${p.name}">`;
        }
        gridHTML += '</div>';
      }

      gridHTML += '</div>';
    }
  }
  gridHTML += '</div>';

  // Right arrows
  gridHTML += '<div class="side-arrows">';
  for (let r = 0; r < 7; r++) {
    if (movable.includes(r)) {
      const dis = arrowDisabled('right', r) ? 'disabled' : '';
      gridHTML += `<button class="push-arrow" style="height:var(--cell)" ${dis} title="Push row ${r} left" onclick="pushTile('right',${r})">◀</button>`;
    } else {
      gridHTML += `<button class="push-arrow spacer" style="height:var(--cell)" disabled></button>`;
    }
  }
  gridHTML += '</div>';

  gridHTML += '</div>';  // board-with-sides

  // ── Bottom push row ───────────────────────────────────────────
  let botRowHTML = '<div class="push-row">';
  botRowHTML += '<button class="push-arrow spacer" disabled></button>';
  for (let c = 0; c < 7; c++) {
    if (movable.includes(c)) {
      const dis = arrowDisabled('bottom', c) ? 'disabled' : '';
      botRowHTML += `<button class="push-arrow" ${dis} title="Push column ${c} up" onclick="pushTile('bottom',${c})">▲</button>`;
    } else {
      botRowHTML += '<button class="push-arrow spacer" disabled></button>';
    }
  }
  botRowHTML += '<button class="push-arrow spacer" disabled></button>';
  botRowHTML += '</div>';

  area.innerHTML = topRowHTML + gridHTML + botRowHTML;
}

function buildSpare(st) {
  const container = document.getElementById('spare-tile');
  const tile = st.spare;
  const cDeg = -rotDeg(tile.rotation);
  let html = `<div class="tile spare-tile">`;
  html += `  <div class="tile-inner" style="transform:rotate(${rotDeg(tile.rotation)}deg)">`;
  html += `    <img class="tile-base" src="${shapeImg(tile.shape)}" alt="" style="width:100%;height:100%;object-fit:cover">`;
  if (tile.character) {
    html += `    <img class="tile-char" src="${charImg(tile.character)}" style="transform:rotate(${cDeg}deg);width:100%;height:100%;object-fit:cover" alt="">`;
  }
  html += `  </div>`;
  html += `</div>`;
  container.innerHTML = html;
}

function buildPlayers(st) {
  const cp = st.current_player;
  document.documentElement.style.setProperty('--reach-player', cp.color);
  // Append '33' to the hex color to make it ~20% transparent for the soft background pulse!
  document.documentElement.style.setProperty('--reachable-bg', cp.color + '33');

  const list = document.getElementById('player-list');
  list.innerHTML = '';

  for (const p of st.players) {
    const isActive = p.id === cp.id;
    const hasWon = p.winner === true;   // backend should set this when done
    const baseName = `meeple_${PLAYER_COLORS_NAME[p.id]}`;

    // Pick meeple variant
    let meepleFile = `${baseName}.svg`;
    if (hasWon) {
      meepleFile = `meeple_winner_gold.svg`;
    } else if (isActive) {
      meepleFile = `${baseName}_glow.svg`;
    } else {
      meepleFile = `${baseName}_shadow.svg`;
    }

    const totalTokens = p.total_tokens !== undefined
      ? p.total_tokens
      : (p.deck.length + (p.current_target ? 1 : 0) + p.score);

    const needsHome = !p.current_target && p.deck.length === 0;

    let targetHtml = '';
    if (needsHome) {
      targetHtml = `
        <div style="
          text-align:center;
          font-size:10px;
          color:${p.color};
          border:1px solid ${p.color};
          padding:3px 5px;
          border-radius:3px;">
          🏠 Go Home
        </div>`;
    } else if (p.current_target) {
      targetHtml = `
        <img src="${charImg(p.current_target)}"
             style="width:44px;height:44px;border-radius:4px;border:1px solid var(--gold-dim);"
             title="Token ${p.score+1}/${totalTokens}">
      `;
    }

    const card = document.createElement('div');
    card.className = 'player-card' + (isActive ? ' active-player' : '');

    card.innerHTML = `
      <img src="${MEEPLE_BASE}${meepleFile}"
           style="width:34px;height:44px;flex-shrink:0; transition: transform 0.3s;" alt="${p.name}">
      <div class="player-info" style="flex:1;min-width:0;">
        <div class="player-name" style="font-size:0.8rem;">${p.name}</div>
        <div class="player-pos" style="font-size:0.65rem;">${p.score}/${totalTokens} tokens</div>
      </div>
      <div>${targetHtml}</div>
    `;

    list.appendChild(card);
  }
}


function buildTopBar(st) {
  const cp = st.current_player;

  // Set name and colour
  const nameEl = document.getElementById('tb-name');
  if (nameEl) {
    nameEl.textContent = cp.name;
    nameEl.style.color = cp.color;
  }

  // Phase label
  const phaseEl = document.getElementById('tb-phase');
  if (phaseEl) {
    phaseEl.textContent = phase === 'push' ? 'Push Phase' : 'Move Phase';
  }
}


function buildPhaseIndicator() {
  const ph1 = document.getElementById('ph-push');
  const ph2 = document.getElementById('ph-move');
  if (phase === 'push') {
    ph1.className = 'phase-step active';
    ph2.className = 'phase-step';
  } else {
    ph1.className = 'phase-step done';
    ph2.className = 'phase-step active';
  }
}

function render(st) {
  buildBoard(st);
  buildSpare(st);
  buildPlayers(st);
  buildTopBar(st);
  buildPhaseIndicator();
}

// ── Toast ─────────────────────────────────────────────────────────

let toastTimer = null;
function toast(msg, isError=false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (isError ? ' error' : '');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = ''; }, 2500);
}

// ── API helpers ───────────────────────────────────────────────────

async function post(url, body) {
  const r = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  return r.json();
}

// A Breadth-First Search to find the exact route through the maze
function findPath(grid, startR, startC, targetR, targetC) {
  // Define which directions the different tile shapes connect to.
  // 0=North, 1=East, 2=South, 3=West
  const exits = {
    'i': [0, 2],       // Straight path connects Top and Bottom
    'l': [0, 1],       // Corner path connects Top and Right
    't': [3, 0, 1]     // T-Junction connects Left, Top, and Right
  };

  // Helper to get actual exits after applying the tile's rotation
  function getTileExits(r, c) {
    const tile = grid[r][c];
    return exits[tile.shape].map(dir => (dir + tile.rotation) % 4);
  }

  const queue = [[startR, startC, [[startR, startC]]]];
  const visited = new Set([`${startR},${startC}`]);

  // Movement vectors: [row_change, col_change, direction_out, direction_in]
  const dirs = [
    [-1, 0, 0, 2], // Move North (Exiting 0, Entering 2)
    [0, 1, 1, 3],  // Move East (Exiting 1, Entering 3)
    [1, 0, 2, 0],  // Move South (Exiting 2, Entering 0)
    [0, -1, 3, 1]  // Move West (Exiting 3, Entering 1)
  ];

  while (queue.length > 0) {
    const [r, c, path] = queue.shift();
    if (r === targetR && c === targetC) return path;

    const currentExits = getTileExits(r, c);

    for (const [dr, dc, outDir, inDir] of dirs) {
      const nr = r + dr, nc = c + dc;
      // Check boundaries
      if (nr >= 0 && nr < 7 && nc >= 0 && nc < 7) {
        if (!visited.has(`${nr},${nc}`) && currentExits.includes(outDir)) {
          // Check if the next tile actually has an opening facing back at us
          if (getTileExits(nr, nc).includes(inDir)) {
            visited.add(`${nr},${nc}`);
            queue.push([nr, nc, [...path, [nr, nc]]]);
          }
        }
      }
    }
  }
  // Fallback to straight line if pathing fails for any reason
  return [[startR, startC], [targetR, targetC]]; 
}

// ── Actions ───────────────────────────────────────────────────────

async function rotateSpareTile() {
  if (phase !== 'push') { toast('You can only rotate during the push phase', true); return; }
   
  const st = await post(`${GAME_URL}/rotate-spare/`, {});
  state = st;
  render(state);
}

async function pushTile(direction, index) {
  if (phase !== 'push') { toast('Push phase only!', true); return; }
  
  // 1. Lock the UI during animation
  phase = 'animating';

  const grid = document.getElementById('grid');
  const tiles = Array.from(grid.querySelectorAll('.tile'));
  
  // Find all tiles in the row/col being pushed
  const movingTiles = tiles.filter(t => parseInt(t.dataset[direction === 'left' || direction === 'right' ? 'row' : 'col']) === index);

  // Sort them so index 0 is top/left and 6 is bottom/right
  movingTiles.sort((a, b) => {
    const key = direction === 'left' || direction === 'right' ? 'col' : 'row';
    return parseInt(a.dataset[key]) - parseInt(b.dataset[key]);
  });

  // Calculate dynamic pixel sizes (handles responsive mobile resizing)
  const rootStyles = getComputedStyle(document.documentElement);
  const cellPx = parseInt(rootStyles.getPropertyValue('--cell')) || 72;
  const gapPx = parseInt(rootStyles.getPropertyValue('--gap')) || 3;
  const step = cellPx + gapPx;

  let moveX = 0, moveY = 0;
  let startLeft = 0, startTop = 0;
  let ejectedTile;

  // Setup animation vectors based on direction
  if (direction === 'left') { moveX = step; startLeft = -step; startTop = index * step; ejectedTile = movingTiles[6]; }
  if (direction === 'right') { moveX = -step; startLeft = 7 * step; startTop = index * step; ejectedTile = movingTiles[0]; }
  if (direction === 'top') { moveY = step; startTop = -step; startLeft = index * step; ejectedTile = movingTiles[6]; }
  if (direction === 'bottom') { moveY = -step; startTop = 7 * step; startLeft = index * step; ejectedTile = movingTiles[0]; }

  // 2. Clone the spare tile and position it just outside the grid
  const spareContainer = document.getElementById('spare-tile');
  const incoming = spareContainer.querySelector('.tile').cloneNode(true);
  incoming.style.position = 'absolute';
  incoming.style.left = startLeft + 'px';
  incoming.style.top = startTop + 'px';
  incoming.style.transition = 'transform 0.4s ease-in-out';
  incoming.style.zIndex = '100';
  grid.appendChild(incoming);

  // 3. Prep the moving tiles
  movingTiles.forEach(t => {
    t.style.transition = 'transform 0.4s ease-in-out';
  });

  // 4. Calculate coordinates to make the ejected tile "fly" to the spare box
  const spareRect = spareContainer.getBoundingClientRect();
  const ejectRect = ejectedTile.getBoundingClientRect();
  const targetX = spareRect.left - ejectRect.left;
  const targetY = spareRect.top - ejectRect.top;
  ejectedTile.style.zIndex = '101';

  // Force DOM to acknowledge new elements before animating
  void incoming.offsetWidth;

  // 5. Fire the sliding animations!
  const transformStr = `translate(${moveX}px, ${moveY}px)`;
  incoming.style.transform = transformStr;
  
  movingTiles.forEach(t => {
    if (t !== ejectedTile) {
      t.style.transform = transformStr; // Slide row/col
    }
  });

  // Shrink, spin, and fly the ejected tile to the box
  ejectedTile.style.transform = `translate(${targetX}px, ${targetY}px) scale(0.6) rotate(180deg)`;
  ejectedTile.style.opacity = '0.2';
  spareContainer.style.opacity = '0.3'; 

  // 6. Wait for the CSS animation to finish AND the server to respond
const [st] = await Promise.all([
 
    post(`${GAME_URL}/push/`, { direction, index }),
    new Promise(r => setTimeout(r, 450))
  ]);

  spareContainer.style.opacity = '1';

  if (!st.push_ok) {
    toast(st.error || 'Cannot reverse the previous push', true);
    phase = 'push';
    render(state);
    return;
  }

  // 7. Update to the new state and snap the grid back into standard HTML
  state = st;
  phase = 'move';

 

  render(state);
  toast('Now move your token — click a green tile');
}

async function moveTo(row, col) {
  if (phase !== 'move') { toast('Move phase only!', true); return; }
  
  // 1. Lock the UI so players can't click wildly while the animation runs
  phase = 'animating';

  const previousTarget = state.current_player.current_target; 
  const oldRow = state.current_player.row;
  const oldCol = state.current_player.col;

  // 2. Map the route BEFORE sending the move to the server
  const path = findPath(state.tiles, oldRow, oldCol, row, col);

  // 3. Confirm with the server
  const st = await post(`${GAME_URL}/move/`, { player_id: MY_ID, row, col });
  if (!st.move_ok) { 
    toast(st.error || 'Cannot move there', true); 
    phase = 'move'; // Unlock UI on failure
    return; 
  }
  
  // 4. Time to walk! Find the meeple on the screen
  const startTile = document.querySelector(`.tile[data-row="${oldRow}"][data-col="${oldCol}"]`);
  
  if (startTile) {
    const meepleImg = startTile.querySelector(`.token[title="${state.current_player.name}"]`);
    if (meepleImg) {
      meepleImg.style.position = 'relative';
      meepleImg.style.zIndex = '999'; 

      // Read exact pixel sizes from CSS so it scales perfectly on mobile and desktop
      const rootStyles = getComputedStyle(document.documentElement);
      const cellPx = parseInt(rootStyles.getPropertyValue('--cell')) || 64;
      const gapPx = parseInt(rootStyles.getPropertyValue('--gap')) || 3;
      const step = cellPx + gapPx;

      // 500ms = 2 tiles per second. Using "linear" keeps the walk continuous without stopping on each tile
      const msPerTile = 500;
      meepleImg.style.transition = `transform ${msPerTile}ms linear`;

      // Loop through the GPS path and slide tile by tile
      for (let i = 1; i < path.length; i++) {
        const [pr, pc] = path[i];
        const moveX = (pc - oldCol) * step;
        const moveY = (pr - oldRow) * step;
        meepleImg.style.transform = `translate(${moveX}px, ${moveY}px)`;
        
        // Wait for this specific step to finish before moving to the next tile
        await new Promise(r => setTimeout(r, msPerTile));
      }
    }
  }

  // 5. Update the board to the new state and pass the turn
  state = st;
  phase = 'push';
  render(state);

  // Check if they found the treasure!
  if (st.message === "TARGET_FOUND") {
    const popup = document.getElementById('treasure-popup');
    const img = document.getElementById('treasure-img');
    
    img.src = charImg(previousTarget); 
    popup.classList.add('show');
    
    setTimeout(() => {
      popup.classList.remove('show');
      toast(`${state.current_player.name}'s turn`);
    }, 2500);
  } else {
    toast(`${state.current_player.name}'s turn`);
  }
}

// ── Init ──────────────────────────────────────────────────────────
render(state);
</script>
