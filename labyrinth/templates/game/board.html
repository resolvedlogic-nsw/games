<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Labyrinth – Game {{ game.id }}</title>
{% load static %}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════════════
   LABYRINTH – RESTORED MASTER STYLESHEET
   ═══════════════════════════════════════════════════════════════════ */
:root {
  --gold:       #c9a84c;
  --gold-dim:   rgba(201,168,76,0.35);
  --dark:       #0a0806;
  --dark2:      #120e05;
  --cell:       64px;
  --gap:        3px;
  --board-w:    calc(7 * var(--cell) + 6 * var(--gap));
  --board-scale: 1;
  --reachable:  rgba(220, 50, 50, 0.2);
  --reach-bdr:  var(--reach-player, #dc3232);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--dark); color: #d4c09a; font-family: 'Crimson Pro', Georgia, serif; overflow: hidden; }

body {
  background-image: 
    radial-gradient(ellipse at 15% 15%, #241505 0%, transparent 45%),
    radial-gradient(ellipse at 85% 85%, #160e02 0%, transparent 45%);
  display: flex; align-items: center; justify-content: center;
}

/* --- Layout Structure --- */
.game-layout {
  display: grid;
  width: 100%;
  max-width: none;
  height: 100vh;
  grid-template-columns: clamp(160px, 14vw, 240px) minmax(0, 1fr) clamp(160px, 14vw, 240px);
  gap: 16px;
  padding: 10px 12px;
  align-items: center;
}

.side-panel {
  width: 100%;
  max-width: 260px;
  min-width: 140px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  height: 100%;
  padding-top: 8px;
}

.panel-title {
  font-family: 'Cinzel Decorative', serif; font-size: 0.75rem; letter-spacing: 0.2em;
  color: var(--gold); text-transform: uppercase; margin-bottom: 12px;
  border-bottom: 1px solid var(--gold-dim); padding-bottom: 6px;
}

/* --- Turn Card & Controls --- */
.turn-card {
  background: rgba(0,0,0,0.4); border: 1px solid var(--gold-dim);
  border-radius: 6px; padding: 16px; text-align: center; box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
}
.player-dot { width: 16px; height: 16px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.3); display: inline-block; margin-bottom: 8px; }

.action-btn {
  display: block; width: 100%; text-align: center; background: rgba(20,14,4,0.6); 
  border: 1px solid var(--gold-dim); color: var(--gold); padding: 12px; border-radius: 4px;
  font-family: 'Cinzel Decorative', serif; font-size: 0.9rem; cursor: pointer; transition: all 0.2s; text-decoration: none;
}
.action-btn:hover:not(:disabled) { background: var(--gold); color: var(--dark); box-shadow: 0 0 12px rgba(201,168,76,0.4); }
.action-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* --- Board & Tiles --- */
.board-container {
  position: relative;
  width: calc((var(--board-w) + 80px) * var(--board-scale));
  height: calc((var(--board-w) + 80px) * var(--board-scale));
  margin: 0 auto;
  justify-self: center;
  padding: calc(40px * var(--board-scale));
  background: #1a140b; border: 2px solid var(--gold-dim); border-radius: 8px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.8), inset 0 0 40px rgba(0,0,0,0.8);
  overflow: visible;
}

.board-grid {
  position: relative;
  width: var(--board-w);
  height: var(--board-w);
  transform: scale(var(--board-scale));
  transform-origin: top left;
  margin: 0 auto;
}

.tile {
  position: absolute; width: var(--cell); height: var(--cell);
  transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
  background: #2a2012; border: 1px solid rgba(201,168,76,0.2); border-radius: 4px; overflow: hidden;
}
.tile-bg { width: 100%; height: 100%; background-size: cover; transition: transform 0.3s ease; }
.tile-char { 
  position: absolute; top: 11%; left: 11%; width: 78%; height: 78%; 
  object-fit: contain; z-index: 2; transition: transform 0.3s ease;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.9));
}

@keyframes pulse-reach {
  0% { background: rgba(220, 50, 50, 0.1); box-shadow: inset 0 0 0 2px var(--reach-player); }
  100% { background: rgba(220, 50, 50, 0.35); box-shadow: inset 0 0 0 4px var(--reach-player); }
}
.tile.reachable .tile-overlay { position: absolute; inset: 0; animation: pulse-reach 1.2s infinite alternate ease-in-out; pointer-events: none; }

/* --- Meeples --- */
.meeple {
  position: absolute; width: 36px; height: 36px; z-index: 10;
  transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); pointer-events: none;
}

/* --- Push Buttons --- */
.push-btn {
  position: absolute; width: 32px; height: 32px; background: rgba(20,14,4,0.9);
  border: 1px solid var(--gold-dim); border-radius: 4px; color: var(--gold);
  display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 20; transition: all 0.2s;
}
.push-btn:hover { background: var(--gold); color: var(--dark); transform: scale(1.1); }

/* --- Player Cards --- */
#players-list { overflow-y: auto; flex: 1; padding-right: 5px; }
.player-card { background: rgba(0,0,0,0.4); border: 1px solid var(--gold-dim); border-radius: 6px; padding: 12px; margin-bottom: 12px; position: relative; }
.player-card.active { border-color: var(--gold); background: rgba(201,168,76,0.05); }
.player-card.active::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: var(--gold); }

/* --- Popups & Toasts --- */
#treasure-popup { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.4s; }
#treasure-popup.show { opacity: 1; pointer-events: auto; }
.treasure-card { background: #1e1507; border: 1px solid var(--gold); padding: 50px; border-radius: 8px; text-align: center; }

#toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: #140e04; border: 1px solid var(--gold); padding: 12px 30px; border-radius: 30px; color: var(--gold); transition: transform 0.4s; z-index: 1000; }
#toast.show { transform: translateX(-50%) translateY(0); }

#device-summary { display: none; }
#quit-game-mobile { display: none; }

/*--@media (max-width: 980px) and (orientation: landscape) {
  html, body { overflow: auto; }
  .game-layout { height: auto; min-height: 100vh; align-items: flex-start; gap: 10px; }
  .side-panel { min-width: 120px; max-width: 180px; }
} -- */

@media (max-width: 900px) and (orientation: portrait) {
  html, body {
    height: auto;
    min-height: 100%;
    overflow: auto;
  }

  body {
    align-items: flex-start;
    justify-content: flex-start;
  }

  .game-layout {
    height: auto;
    min-height: 100dvh;
    grid-template-columns: 1fr;
    grid-template-rows: auto auto auto auto;
    gap: 10px;
    padding: 10px;
    align-items: start;
  }

  #phase-label { display: none; }

  .game-layout > .side-panel:first-child {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto auto;  
    gap: 10px;
    align-items: center;  
  }

  .game-layout > .board-container {
    order: 2;
    width: 100%;
    max-width: none;
    height: auto;
    padding: 12px;
  }

  .game-layout > .side-panel:last-child {
    order: 3;
    max-width: none;
    min-width: 0;
    height: auto;
    padding-top: 0;
    gap: 8px;
  }

  .game-layout > .side-panel:first-child .game-status-title {
    display: none;
  }

  #device-summary {
    display: block;
    grid-column: 1 / 2;
  }

  .game-layout > .side-panel:first-child .turn-card { grid-column: 1; grid-row: 1; margin: 0; }

  .game-layout > .side-panel:first-child .current-spare-title { grid-column: 2; grid-row: 1; margin: 0; align-self: end; }

  .game-layout > .side-panel:first-child .current-spare-wrapper { grid-column: 2; grid-row: 2; margin: 0; }

  .quit-desktop-wrap {
    display: none;
  }

  #quit-game-mobile {
    display: block;
    grid-column: 1 / -1;
    width: 100%;
    order: 4;
    grid-row: 4;
  }

  .turn-card { padding: 10px; }
  #turn-name { display: none; }
  #device-summary { grid-column: 1; grid-row: 2; align-self: start; }
  .action-btn { padding: 10px; font-size: 0.78rem; }

  #players-list {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    overflow-y: hidden;
    padding-bottom: 6px;
    flex: none;
  }

  .player-card {
    min-width: 0;
    flex: 1 1 0;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 4px;
    padding: 8px 10px;
    margin-bottom: 0;
  }

  /* Competitor cards: name + score only */
  #players-list .player-meeple-icon { display: none; }
  #players-list .player-target { display: none; }
  #players-list .hunting-label { display: none; }
  #players-list .token-word { display: none; }
  #players-list .player-details-row { background: transparent; padding: 0; border-radius: 0; }
}
</style>
</head>
<body>

<div class="game-layout">
  <div class="side-panel">
    <div class="panel-title game-status-title">Game Status</div>
    <div class="turn-card">
      <div class="player-dot" id="turn-dot"></div>
      <div id="turn-name" style="font-family:'Cinzel Decorative'; font-size:1.2rem;">Player</div>
      <div id="phase-label" style="font-size:0.9rem; color:var(--gold);">Push a Tile</div>
    </div>

    <div id="device-summary"></div>
    
    <div class="panel-title current-spare-title">Current Spare</div>
    <div class="spare-wrapper current-spare-wrapper" style="text-align:center;">
      <div class="spare-container" id="spare-container" style="margin: 0 auto 15px; width: 96px; height: 96px;"></div>
      <button class="action-btn" id="rotate-btn" onclick="handleAction('rotate')">↻ Rotate Tile</button>
    </div>

    <div class="quit-desktop-wrap" style="margin-top:auto;">
      <a href="{% url 'labyrinth:index' %}" class="action-btn quit-game-link" style="margin-bottom:10px;">Quit Game</a>
    </div>
  </div>

  <div class="board-container">
    <div class="board-grid" id="main-grid">
      <div id="tiles-layer" style="position: absolute; inset: 0;"></div>
      <div id="buttons-layer" style="position: absolute; inset: 0; pointer-events: none;"></div>
      <div id="meeples-layer" style="position: absolute; inset: 0; pointer-events: none;"></div>
    </div>
  </div>

  <div class="side-panel">
    <div class="panel-title">Adventurers</div>
    <div id="players-list"></div>
  </div>

  <a href="{% url 'labyrinth:index' %}" id="quit-game-mobile" class="action-btn quit-game-mobile-link">Quit Game</a>
</div>

<div id="treasure-popup">
  <div class="treasure-card">
    <h1 class="treasure-title" id="popup-title" style="font-family:'Cinzel Decorative'; color:var(--gold); margin-bottom:20px;">Target Found!</h1>
    <img id="treasure-img" src="" style="width:120px; height:120px; object-fit:contain; margin-bottom:20px;">
    <div id="game-over-btns" style="display:none;"><a href="{% url 'labyrinth:index' %}" class="action-btn">New Game</a></div>
  </div>
</div>

<div id="toast">Your Turn</div>

<script>
/* ═══════════════════════════════════════════════════════════════════
   LABYRINTH – RESTORED MASTER LOGIC
   ═══════════════════════════════════════════════════════════════════ */
const GAME_ID = {{ game.id }};
const MY_ID = parseInt("{{ player_id }}");
const THEME = "{{ theme }}";
const STATIC_URL = "{% static '' %}";
const IMG_BASE = THEME === 'pokemon' ? `${STATIC_URL}images/pokemon/` : `${STATIC_URL}images/`;

// Bootstrap data from Django
let state = JSON.parse('{{ state_json|safe }}');
let isProcessing = false;
let currentPhase = (state.last_push === null) ? 'push' : 'move';

function getTilePath(shape) { return THEME === 'pokemon' ? `${IMG_BASE}path${shape}.jpg` : `${IMG_BASE}shape${shape}.svg`; }
function charImg(id) { if (!id || id === '?') return `${IMG_BASE}secret.png`; return `${IMG_BASE}character${String(id).padStart(2, '0')}.png`; }
function getDisplayColor(color) {
    if (THEME === 'pokemon' && color === '#2ecc71') return '#9b59b6';
    return color;
}
function getDisplayName(player) {
    if (THEME === 'pokemon' && player && player.color === '#2ecc71') {
        return (player.name || '').replace(/green/gi, 'Purple');
    }
    return player.name;
}
function getMeeplePath(color) { 
    const displayColor = getDisplayColor(color);
    const colors = {'#e74c3c':'red', '#3498db':'blue', '#2ecc71':'green', '#f39c12':'yellow', '#9b59b6':'purple'};
    const name = colors[displayColor] || 'red';
    return THEME === 'pokemon' ? `${IMG_BASE}ball${name}.png` : `${IMG_BASE}meeple_${name}.svg`;
}

function getCellMetrics() {
    const cell = 64;
    const gap = 3;
    return { cell, gap, step: cell + gap };
}

function updateBoardScale() {
    const layout = document.querySelector('.game-layout');
    const boardContainer = document.querySelector('.game-layout > .board-container');
    const leftPanel = document.querySelector('.game-layout .side-panel:first-child');
    const rightPanel = document.querySelector('.game-layout .side-panel:last-child');
    if (!layout || !boardContainer || !leftPanel || !rightPanel) return;

    const baseBoardW = 7 * 64 + 6 * 3; // 7*64 + 6*3 = 466
    const baseOuter = baseBoardW + 80; // board + container padding (desktop-ish)
    const isPortraitMobile = window.matchMedia('(max-width: 900px) and (orientation: portrait)').matches;
    const layoutStyles = getComputedStyle(layout);
    const gap = parseFloat(layoutStyles.gap) || 16;
    const paddingX = (parseFloat(layoutStyles.paddingLeft) || 0) + (parseFloat(layoutStyles.paddingRight) || 0);
    const paddingY = (parseFloat(layoutStyles.paddingTop) || 0) + (parseFloat(layoutStyles.paddingBottom) || 0);

    let availableWidth;
    let availableHeight;
    if (isPortraitMobile) {
        // Portrait: fill width primarily; height can scroll.
        const containerPadding = 12; // must match portrait CSS padding
        const innerWidth = Math.max(280, window.innerWidth - paddingX - (containerPadding * 2));
        const minScale = 0.75;
        const scale = Math.max(minScale, Math.min(2.0, innerWidth / baseBoardW));
        document.documentElement.style.setProperty('--board-scale', scale.toFixed(3));
        return;
    } else {
        const reservedWidth = leftPanel.offsetWidth + rightPanel.offsetWidth + gap * 2 + 6;
        availableWidth = Math.max(320, window.innerWidth - reservedWidth - 24);
        availableHeight = Math.max(320, window.innerHeight - 24);
    }

  if (isPortrait) {
    const availableW = window.innerWidth - 24; 
    const scale = Math.min(1.0, availableW / baseW); // Locks to 100% screen width
    document.documentElement.style.setProperty('--board-scale', scale.toFixed(3));
  } else {
    const availableH = window.innerHeight - 100;
    const availableW = window.innerWidth - 500; // Account for wider side panels
    const target = Math.min(availableW, availableH, 900); // Higher desktop ceiling
    const scale = target / (baseW + 80);
    document.documentElement.style.setProperty('--board-scale', scale.toFixed(3));
  }

    document.documentElement.style.setProperty('--board-scale', scale.toFixed(3));
}

function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
}

function findPath(grid, startRow, startCol, targetRow, targetCol) {
    const baseExits = {
        i: [0, 2],
        l: [0, 1],
        t: [0, 1, 2]
    };
    const moves = [
        [-1, 0, 0, 2],
        [0, 1, 1, 3],
        [1, 0, 2, 0],
        [0, -1, 3, 1]
    ];

    function exitsAt(r, c) {
        const tile = grid[r][c];
        return (baseExits[tile.shape] || []).map(dir => (dir + tile.rotation) % 4);
    }

    const q = [[startRow, startCol, [[startRow, startCol]]]];
    const visited = new Set([`${startRow},${startCol}`]);

    while (q.length) {
        const [r, c, path] = q.shift();
        if (r === targetRow && c === targetCol) return path;

        const curExits = exitsAt(r, c);
        for (const [dr, dc, outDir, inDir] of moves) {
            const nr = r + dr;
            const nc = c + dc;
            if (nr < 0 || nr > 6 || nc < 0 || nc > 6) continue;
            const key = `${nr},${nc}`;
            if (visited.has(key)) continue;

            const nextExits = exitsAt(nr, nc);
            if (curExits.includes(outDir) && nextExits.includes(inDir)) {
                visited.add(key);
                q.push([nr, nc, [...path, [nr, nc]]]);
            }
        }
    }

    return [[startRow, startCol], [targetRow, targetCol]];
}

async function animateMeepleAlongPath(playerId, path, fromRow, fromCol) {
    const meeple = document.getElementById(`meeple-${playerId}`);
    if (!meeple || !Array.isArray(path) || path.length < 2) return;

    const { step } = getCellMetrics();
    const msPerTile = 500; // 2 tiles per second
    meeple.style.transition = `transform ${msPerTile}ms linear`;

    for (let i = 1; i < path.length; i++) {
        const [r, c] = path[i];
        const x = c * step + 14;
        const y = r * step + 14;
        meeple.style.transform = `translate(${x}px, ${y}px)`;
        await sleep(msPerTile);
    }
}

function render(st) {
    state = st;
    const cp = st.current_player;
    const myPlayer = st.players.find(p => p.id === MY_ID) || cp;
    const reachableCells = Array.isArray(st.reachable) ? st.reachable : [];
    const isOnlineMode = st.mode === 'online';
    const canActThisTurn = !isOnlineMode || st.current_turn === MY_ID;
    
    // Sync phase from server state
    if (st.last_push === null) currentPhase = 'push';
    else currentPhase = 'move';

    const displayTurnColor = getDisplayColor(cp.color);
    const turnDot = document.getElementById('turn-dot');
    const turnName = document.getElementById('turn-name');
    const phaseLabel = document.getElementById('phase-label');
    if (turnDot) turnDot.style.background = displayTurnColor;
    if (turnName && myPlayer) turnName.textContent = myPlayer.name || cp.name;
    if (phaseLabel) phaseLabel.textContent = currentPhase === 'push' ? "Push a Tile" : "Move your piece";
    document.getElementById('rotate-btn').disabled = (!canActThisTurn || currentPhase !== 'push' || isProcessing || st.phase === 'over');
    
    document.documentElement.style.setProperty('--reach-player', displayTurnColor);

    const tilesLayer = document.getElementById('tiles-layer');
    const buttonsLayer = document.getElementById('buttons-layer');
    const meeplesLayer = document.getElementById('meeples-layer');
    
    tilesLayer.innerHTML = ''; 
    buttonsLayer.innerHTML = '';
    
    const { cell, gap, step } = getCellMetrics();
    const corners = [[0,0], [0,6], [6,6], [6,0]];

    // Build Tiles
    for(let r=0; r<7; r++) {
        for(let c=0; c<7; c++) {
            const t = st.tiles[r][c];
            const isReachable = (currentPhase === 'move' && canActThisTurn && reachableCells.some(pos => pos[0] === r && pos[1] === c));
            
            const div = document.createElement('div');
            div.className = `tile ${isReachable ? 'reachable' : ''}`;
            div.style.transform = `translate(${c*step}px, ${r*step}px)`;
            
            const bg = document.createElement('div');
            bg.className = 'tile-bg';
            bg.style.backgroundImage = `url('${getTilePath(t.shape)}')`;
            bg.style.transform = `rotate(${t.rotation*90}deg)`;
            div.appendChild(bg);

            if(t.character) {
                const img = document.createElement('img');
                img.className = 'tile-char';
                img.src = charImg(t.character);
                img.style.transform = `rotate(-${t.rotation*90}deg)`;
                bg.appendChild(img);
            }
            
            // Home dots
            const cornerIdx = corners.findIndex(p => p[0]===r && p[1]===c);
            if(cornerIdx !== -1 && st.players[cornerIdx]) {
                const dot = document.createElement('div');
                dot.style.cssText = `position:absolute; top:5px; left:5px; width:12px; height:12px; border-radius:50%; background:${getDisplayColor(st.players[cornerIdx].color)}; border:2px solid #fff; z-index:3;`;
                div.appendChild(dot);
            }

            if(isReachable) {
                div.onclick = () => handleAction('move', {r, c});
                div.style.cursor = 'pointer';
                div.appendChild(document.createElement('div')).className = 'tile-overlay';
            }
            tilesLayer.appendChild(div);
        }
    }

    // Push Buttons
    if(currentPhase === 'push' && canActThisTurn && st.phase !== 'over') {
        const offsets = {
            'top': { x: c => c*step + (cell - 32) / 2, y: -34, sym: '▼' },
            'bottom': { x: c => c*step + (cell - 32) / 2, y: 7*step + 2, sym: '▲' },
            'left': { x: -34, y: r => r*step + (cell - 32) / 2, sym: '▶' },
            'right': { x: 7*step + 2, y: r => r*step + (cell - 32) / 2, sym: '◀' }
        };
        const lp = st.last_push;
        const revDir = {'left':'right','right':'left','top':'bottom','bottom':'top'};

        ['top','bottom','left','right'].forEach(dir => {
            [1,3,5].forEach(idx => {
                // Rule: Cannot immediately reverse the previous push
                if (lp && lp.index === idx && revDir[dir] === lp.direction) return;

                const btn = document.createElement('div');
                btn.className = 'push-btn';
                btn.style.pointerEvents = 'auto';
                btn.style.left = (typeof offsets[dir].x === 'function' ? offsets[dir].x(idx) : offsets[dir].x) + 'px';
                btn.style.top = (typeof offsets[dir].y === 'function' ? offsets[dir].y(idx) : offsets[dir].y) + 'px';
                btn.textContent = offsets[dir].sym;
                btn.onclick = (e) => { e.stopPropagation(); handleAction('push', {dir, idx}); };
                buttonsLayer.appendChild(btn);
            });
        });
    }

    // Meeples Layer
    st.players.forEach(p => {
        let m = document.getElementById(`meeple-${p.id}`);
        if(!m) {
            m = document.createElement('img');
            m.id = `meeple-${p.id}`; m.className = 'meeple';
            m.src = getMeeplePath(p.color);
            meeplesLayer.appendChild(m);
        }
        const tokenOffset = Math.round((cell - 36) / 2);
        m.style.transform = `translate(${p.col*step + tokenOffset}px, ${p.row*step + tokenOffset}px)`;
    });

    // Spare Tile
    const spareCont = document.getElementById('spare-container');
    spareCont.innerHTML = '';
    const sBg = document.createElement('div');
    sBg.className = 'tile-bg'; sBg.style.cssText = `width:100%; height:100%; background-image:url('${getTilePath(st.spare.shape)}'); transform:rotate(${st.spare.rotation*90}deg);`;
    if(st.spare.character) {
        const sImg = document.createElement('img');
        sImg.className = 'tile-char'; sImg.src = charImg(st.spare.character);
        sImg.style.transform = `rotate(-${st.spare.rotation*90}deg)`;
        sBg.appendChild(sImg);
    }
    spareCont.appendChild(sBg);

    // Device-player summary (mobile top area)
    const turnCard = document.querySelector('.turn-card');
    if (turnCard && myPlayer) {
        const totalTokensMy = myPlayer.total_tokens !== undefined
            ? myPlayer.total_tokens
            : (myPlayer.deck ? (myPlayer.deck.length + (myPlayer.current_target ? 1 : 0) + myPlayer.score) : myPlayer.score);

        const needsHomeMy = !myPlayer.current_target && Array.isArray(myPlayer.deck) && myPlayer.deck.length === 0;
        let myTargetHtml = '';
        if (needsHomeMy) {
            myTargetHtml = `
                <div style="
                    width:32px;height:32px;
                    border-radius:4px;
                    border:1px solid var(--gold-dim);
                    background:rgba(0,0,0,0.4);
                    display:flex;align-items:center;justify-content:center;
                    font-size:18px;">
                    🏠
                </div>
            `;
        } else if (myPlayer.current_target) {
            myTargetHtml = `
                <img src="${charImg(myPlayer.current_target)}"
                     style="width:32px;height:32px;border-radius:4px;border:1px solid var(--gold-dim);object-fit:contain;">
            `;
        }

        const summaryEl = document.getElementById('device-summary');
        if (summaryEl) {
            summaryEl.innerHTML = `
                <div style="display:flex; align-items:center; justify-content:space-between; gap:8px;">
                    <div style="display:flex; align-items:center; gap:8px; min-width:0;">
                        <img src="${getMeeplePath(myPlayer.color)}" style="width:22px; height:22px; object-fit:contain;">
                        <span style="font-family:'Cinzel Decorative'; color:${getDisplayColor(myPlayer.color)}; font-size:0.85rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${getDisplayName(myPlayer) || 'You'}</span>
                    </div>
                    <div style="display:flex; align-items:center; gap:8px;">
                        ${myTargetHtml || ''}
                        <span style="font-size:0.85rem; color:var(--gold-dim); white-space:nowrap;">${myPlayer.score} / ${totalTokensMy}</span>
                    </div>
                </div>
            `;
        }
    }

    // Sidebar Players
    const pList = document.getElementById('players-list');
    pList.innerHTML = '';
    const hideSelfInCompetitors = window.matchMedia('(max-width: 900px) and (orientation: portrait)').matches;
    st.players.forEach(p => {
        if (hideSelfInCompetitors && p.id === MY_ID) return;

        const card = document.createElement('div');
        card.className = `player-card ${p.id === st.current_turn ? 'active' : ''}`;
        
        const totalTokens = p.total_tokens !== undefined
            ? p.total_tokens
            : (p.deck ? (p.deck.length + (p.current_target ? 1 : 0) + p.score) : p.score);

        const needsHome = !p.current_target && Array.isArray(p.deck) && p.deck.length === 0;

        let targetHtml = '';
        if (needsHome) {
            // Home is the goal – show a house icon instead of a broken image
            targetHtml = `
                <div style="
                    width:40px;height:40px;
                    border-radius:4px;
                    border:1px solid var(--gold-dim);
                    background:rgba(0,0,0,0.4);
                    display:flex;align-items:center;justify-content:center;
                    font-size:20px;">
                    🏠
                </div>
            `;
        } else if (p.current_target) {
            if (isOnlineMode && p.id !== MY_ID && !p.winner) {
                // Other player's target stays secret – show a simple question mark, never a broken image
                targetHtml = `
                    <div style="
                        width:40px;height:40px;
                        border-radius:4px;
                        border:1px solid var(--gold-dim);
                        background:rgba(0,0,0,0.4);
                        display:flex;align-items:center;justify-content:center;
                        font-size:22px;">
                        ?
                    </div>
                `;
            } else {
                targetHtml = `
                    <img src="${charImg(p.current_target)}"
                         style="width:40px;height:40px;border-radius:4px;border:1px solid var(--gold-dim);object-fit:contain;">
                `;
            }
        }

        card.innerHTML = `
            <div style="display:flex; align-items:center; gap:10px; margin-bottom:8px;">
                <img src="${getMeeplePath(p.color)}" class="player-meeple-icon" style="width:20px; height:20px; object-fit:contain;">
                <span style="font-family:'Cinzel Decorative'; color:${getDisplayColor(p.color)}">${getDisplayName(p)} ${p.winner ? '👑' : ''}</span>
            </div>
            <div class="player-details-row" style="display:flex; align-items:center; gap:10px; background:rgba(0,0,0,0.3); padding:8px; border-radius:4px;">
                <div class="player-target">${targetHtml || ''}</div>
                <div>
                    <div class="hunting-label" style="font-size:0.7rem; color:var(--gold-dim); text-transform:uppercase;">Hunting</div>
                    <div class="player-score-line" style="font-size:0.9rem;">
                        <span class="token-word">Tokens:</span> ${p.score} / ${totalTokens}
                    </div>
                </div>
            </div>
        `;
        pList.appendChild(card);
    });

    updateBoardScale();
}

async function handleAction(type, data) {
    if(isProcessing) return;
    isProcessing = true;
    let url = '', body = {};

    if(type === 'rotate') url = `/labyrinth/${GAME_ID}/rotate-spare/`;
    if(type === 'push') { url = `/labyrinth/${GAME_ID}/push/`; body = {direction: data.dir, index: data.idx}; }
    if(type === 'move') {
        url = `/labyrinth/${GAME_ID}/move/`;
        body = {player_id: MY_ID, row: data.r, col: data.c ?? data.col};
    }

    const movingPlayer = type === 'move'
        ? state.players.find(p => p.id === state.current_turn)
        : null;
    const oldRow = movingPlayer ? movingPlayer.row : null;
    const oldCol = movingPlayer ? movingPlayer.col : null;
    const path = (type === 'move' && movingPlayer)
        ? findPath(state.tiles, oldRow, oldCol, data.r, data.c ?? data.col)
        : null;

    try {
        const res = await fetch(url, {
            method: 'POST',
            headers: {'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}'},
            body: JSON.stringify(body)
        });
        const st = await res.json();
        
        if(st.error) {
            toast(st.error, '#e74c3c');
            isProcessing = false;
            render(state);
            return;
        }

        // Animate the movement locally for the person who clicked
        if (type === 'move' && st.move_ok && movingPlayer && path) {
            await animateMeepleAlongPath(movingPlayer.id, path, oldRow, oldCol);
        }

        // Note: We removed the popup code from here. 
        // The polling loop below will now handle popups for EVERYONE.
        
        isProcessing = false;
        render(st);
    } catch(e) {
        toast("Network Error", "#e74c3c");
        isProcessing = false;
        render(state);
    }
}

function toast(msg, color='var(--gold)') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.style.borderColor = color; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
}

// Initial Run
document.addEventListener('DOMContentLoaded', () => {
    render(state);
    updateBoardScale();
});
window.addEventListener('resize', updateBoardScale);

// Poll for multiplayer updates
if(state.mode === 'online') {
    setInterval(async () => {
        // If we are currently moving our own meeple, don't interrupt with a poll
        if(isProcessing || state.phase === 'over') return;

        try {
            const res = await fetch(`/labyrinth/${GAME_ID}/state/`);
            const st = await res.json();

            // Check if the server has a newer version of the game than we do
            if(st.seq > state.seq) {
                
                // --- THE GLOBAL POPUP LOGIC ---
                // Compare every player's new data against our stored 'state'
                st.players.forEach((newP, i) => {
                    const oldP = state.players[i];
                    
                    // 1. Check if this player just found a token
                    if (newP.score > oldP.score) {
                        // The server updated the target already, so we show the 'old' target 
                        // because that's the one they just found.
                        showPopup('found', newP, oldP.current_target);
                    }
                    
                    // 2. Check if this player just won the game
                    if (newP.winner && !oldP.winner) {
                        showPopup('win', newP, null);
                    }
                });

                // Update our local state and redraw the board
                render(st);
            }
        } catch(e) {
            console.log("Polling blink..."); // Silent catch for minor network blips
        }
    }, 3000);
}

function showPopup(type, player, target) {
    const pop = document.getElementById('treasure-popup');
    const img = document.getElementById('treasure-img');
    const title = document.getElementById('popup-title');
    
    if (type === 'win') {
        title.textContent = `${player.name} WINS!`;
        img.src = getMeeplePath(player.color);
        document.getElementById('game-over-btns').style.display = 'block';
    } else {
        title.textContent = "Target Found!";
        img.src = charImg(target);
        // Auto-hide the "Found" popup after 2.5 seconds
        setTimeout(() => pop.classList.remove('show'), 2500);
    }
    
    pop.classList.add('show');
}
