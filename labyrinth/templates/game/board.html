<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Labyrinth – Game {{ game.id }}</title>
{% load static %}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --gold:       #c9a84c;
  --gold-dim:   rgba(201,168,76,0.35);
  --dark:       #0a0806;
  --cell:       64px;
  --gap:        3px;
  --board-w:    calc(7 * var(--cell) + 6 * var(--gap));
  --reachable:  rgba(220, 50, 50, 0.2);
  --reach-bdr:  var(--reach-player, #dc3232);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--dark); color: #d4c09a; font-family: 'Crimson Pro', Georgia, serif; overflow: hidden; }

body {
  background-image: 
    radial-gradient(ellipse at 15% 15%, #241505 0%, transparent 45%),
    radial-gradient(ellipse at 85% 85%, #160e02 0%, transparent 45%);
  display: flex;
  align-items: center;
  justify-content: center;
}

/* --- Main Layout --- */
.game-layout {
  display: flex;
  width: 100%;
  max-width: 1400px;
  height: 100vh;
  padding: 20px;
  gap: 30px;
  align-items: center;
  justify-content: space-between;
}

.side-panel {
  flex: 1;
  max-width: 280px;
  display: flex;
  flex-direction: column;
  gap: 24px;
  height: 100%;
  padding-top: 20px;
}

.panel-title {
  font-family: 'Cinzel Decorative', serif;
  font-size: 0.75rem;
  letter-spacing: 0.2em;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: 12px;
  border-bottom: 1px solid var(--gold-dim);
  padding-bottom: 6px;
}

/* --- Game Status --- */
.turn-card {
  background: rgba(0,0,0,0.4);
  border: 1px solid var(--gold-dim);
  border-radius: 6px;
  padding: 16px;
  text-align: center;
  box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
}
.player-dot {
  width: 16px; height: 16px; border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.3);
  display: inline-block; margin-bottom: 8px;
  transition: background 0.3s;
}
.turn-name { font-family: 'Cinzel Decorative', serif; font-size: 1.2rem; color: #fff; margin-bottom: 4px; }
.phase-label { font-size: 0.9rem; color: var(--gold); letter-spacing: 0.05em; }

.action-btn {
  display: block; width: 100%; text-align: center;
  background: rgba(20,14,4,0.6); border: 1px solid var(--gold-dim);
  color: var(--gold); padding: 12px; border-radius: 4px;
  font-family: 'Cinzel Decorative', serif; font-size: 0.9rem;
  cursor: pointer; transition: all 0.2s; text-decoration: none;
}
.action-btn:hover { background: var(--gold); color: var(--dark); box-shadow: 0 0 12px rgba(201,168,76,0.4); }
.action-btn:disabled { opacity: 0.5; cursor: not-allowed; pointer-events: none; }

/* --- Spare Tile --- */
.spare-wrapper { display: flex; flex-direction: column; align-items: center; gap: 15px; }
.spare-container {
  width: calc(var(--cell) * 1.5); height: calc(var(--cell) * 1.5);
  position: relative; border-radius: 6px; box-shadow: 0 10px 20px rgba(0,0,0,0.6);
  overflow: hidden; border: 1px solid rgba(201,168,76,0.4);
}

/* --- The Board --- */
.board-container {
  position: relative;
  width: calc(var(--board-w) + 60px); 
  height: calc(var(--board-w) + 60px);
  padding: 30px;
  background: #1a140b;
  border: 2px solid var(--gold-dim);
  border-radius: 8px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.8), inset 0 0 40px rgba(0,0,0,0.8);
  flex-shrink: 0;
}
.board-grid {
  position: relative;
  width: var(--board-w);
  height: var(--board-w);
}

/* Layer specific structural classes for older browser support */
.board-layer {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
}

/* --- Tiles --- */
.tile {
  position: absolute; width: var(--cell); height: var(--cell);
  transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); 
  left: 0; top: 0; border-radius: 4px; box-shadow: 0 4px 8px rgba(0,0,0,0.5);
  overflow: hidden; background: #2a2012; border: 1px solid rgba(201,168,76,0.2);
  pointer-events: auto;
}
.tile-bg { width: 100%; height: 100%; position: absolute; top: 0; left: 0; background-size: cover; transition: transform 0.3s ease; }
.tile-char { width: 60%; height: 60%; position: absolute; top: 20%; left: 20%; object-fit: contain; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.8)); z-index: 2; transition: transform 0.3s ease; }
.tile-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; transition: background 0.3s; z-index: 3; }

@keyframes pulse-reach {
  0% { background: rgba(220, 50, 50, 0.1); box-shadow: inset 0 0 0 2px var(--reach-bdr); }
  100% { background: rgba(220, 50, 50, 0.35); box-shadow: inset 0 0 0 4px var(--reach-bdr); }
}
.tile.reachable .tile-overlay { animation: pulse-reach 1.2s infinite alternate ease-in-out; }

/* --- Meeples --- */
.meeple {
  position: absolute; width: 36px; height: 36px;
  transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  z-index: 10; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.6)); pointer-events: none;
  left: 0; top: 0; 
}

/* --- Refined Push Buttons --- */
.push-btn {
  position: absolute; 
  width: 32px; height: 32px;
  background: rgba(20,14,4,0.85); 
  border: 1px solid var(--gold-dim); 
  border-radius: 4px;
  color: var(--gold); 
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; z-index: 20; font-size: 14px;
  transition: all 0.2s;
  box-shadow: 0 4px 6px rgba(0,0,0,0.5);
  pointer-events: auto;
}
.push-btn:hover { 
  background: var(--gold); color: var(--dark); 
  transform: scale(1.1); box-shadow: 0 0 10px var(--gold); 
}
.push-btn.disabled { opacity: 0.3; pointer-events: none; cursor: not-allowed; }

/* --- Player Cards --- */
#players-list { display: flex; flex-direction: column; gap: 12px; overflow-y: auto; padding-right: 5px; }
.player-card { background: rgba(0,0,0,0.4); border: 1px solid var(--gold-dim); border-radius: 6px; padding: 12px; transition: transform 0.2s, border-color 0.2s; position: relative; overflow: hidden; }
.player-card.active { border-color: var(--gold); background: rgba(201,168,76,0.05); box-shadow: inset 0 0 20px rgba(0,0,0,0.8), 0 0 10px rgba(201,168,76,0.1); }
.player-card.active::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: var(--gold); box-shadow: 0 0 8px var(--gold); }
.pcard-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.pcard-meeple { width: 24px; height: 24px; object-fit: contain; }
.pcard-name { font-family: 'Cinzel Decorative', serif; font-size: 0.9rem; font-weight: bold; color: #fff; }
.pcard-target { display: flex; align-items: center; gap: 12px; background: rgba(0,0,0,0.6); padding: 8px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.05); }

/* --- Popups --- */
#treasure-popup { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.4s; }
#treasure-popup.show { opacity: 1; pointer-events: auto; }
.treasure-card { background: linear-gradient(145deg, #1e1507, #0f0b04); border: 1px solid var(--gold); padding: 50px; border-radius: 8px; text-align: center; box-shadow: 0 0 50px rgba(201,168,76,0.2); transform: scale(0.9); transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
#treasure-popup.show .treasure-card { transform: scale(1); }
.treasure-title { font-family: 'Cinzel Decorative', serif; font-size: 2.5rem; color: var(--gold); margin-bottom: 20px; text-shadow: 0 0 20px rgba(201,168,76,0.6); }
#treasure-img { width: 120px; height: 120px; object-fit: contain; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.8)); margin-bottom: 30px; }
#toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: rgba(20,14,4,0.95); border: 1px solid var(--gold); padding: 12px 30px; border-radius: 30px; color: var(--gold); font-family: 'Cinzel Decorative', serif; letter-spacing: 0.1em; font-size: 0.9rem; transition: transform 0.4s ease-out; z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
#toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="game-layout">
  <div class="side-panel left-panel">
    <div>
      <div class="panel-title">Game Status</div>
      <div class="turn-card">
        <div class="player-dot" id="turn-dot"></div>
        <div class="turn-name" id="turn-name">Player</div>
        <div class="phase-label" id="phase-label">Push a Tile</div>
      </div>
      {% if game.mode == 'online' %}
      <div style="text-align:center; font-size:0.8rem; margin-top:10px; color:var(--gold-dim);">Room: <span style="color:#fff; letter-spacing:0.1em;">{{ game.room_code }}</span></div>
      {% endif %}
    </div>

    <div>
      <div class="panel-title">Current Spare</div>
      <div class="spare-wrapper">
        <div class="spare-container" id="spare-container"></div>
        <button class="action-btn" id="rotate-btn" onclick="rotateSpare()">↻ Rotate Tile</button>
      </div>
    </div>

    <div style="margin-top: auto; padding-bottom: 10px; display:flex; flex-direction:column; gap:10px;">
      <a href="{% url 'labyrinth:index' %}" class="action-btn">New Game</a>
      <a href="{% url 'labyrinth:online' %}" class="action-btn">Online Lobby</a>
    </div>
  </div>

  <div class="board-container" id="board-container">
    <div class="board-grid">
      <div id="tiles-layer" class="board-layer" style="z-index: 1;"></div>
      <div id="buttons-layer" class="board-layer" style="pointer-events: none; z-index: 2;"></div>
      <div id="meeples-layer" class="board-layer" style="pointer-events: none; z-index: 3;"></div>
    </div>
  </div>

  <div class="side-panel right-panel">
    <div class="panel-title">Adventurers</div>
    <div id="players-list"></div>
  </div>
</div>

<div id="treasure-popup">
  <div class="treasure-card">
    <div class="treasure-title" id="popup-title">Target Found!</div>
    <img id="treasure-img" src="" alt="Popup Image">
    <div id="game-over-buttons" style="display: none; margin-top: 24px; gap: 14px; justify-content: center;">
      <button class="action-btn" style="width: auto;" onclick="document.getElementById('treasure-popup').classList.remove('show')">View Board</button>
      <a href="{% url 'labyrinth:index' %}" class="action-btn" style="width: auto;">New Game</a>
    </div>
  </div>
</div>

<div id="toast">Your Turn</div>

<script>
const GAME_ID = {{ game.id }};
const BASE_URL = `/labyrinth/${GAME_ID}`;
const STATIC_URL = "{% static '' %}";
const THEME = "{{ theme }}";
const MODE = "{{ game.mode }}";
const MY_ID = parseInt("{{ player_id }}") || 0;
const IMG_BASE = THEME === 'pokemon' ? `${STATIC_URL}images/pokemon/` : `${STATIC_URL}images/`;

let state = null;
let phase = 'push';
let isProcessing = false; 

function getTilePath(shape) { return THEME === 'pokemon' ? `${IMG_BASE}path${shape}.jpg` : `${IMG_BASE}shape${shape}.svg`; }
function getMeeplePath(colorHex) {
  const cMap = { '#e74c3c':'red', '#3498db':'blue', '#2ecc71':'green', '#f39c12':'yellow', '#9b59b6':'purple' };
  const colorName = cMap[colorHex] || 'red';
  return THEME === 'pokemon' ? `${IMG_BASE}ball${colorName}.png` : `${IMG_BASE}meeple_${colorName}.svg`; 
}
function charImg(id) {
  if (id === '?') return `${IMG_BASE}secret.png`; 
  const n = String(id).padStart(2, '0');
  return `${IMG_BASE}character${n}.png`;
}

// BOOTSTRAP INITIAL DATA - Bypasses initial network fetch to guarantee instant rendering!
document.addEventListener('DOMContentLoaded', () => {
    try {
        const rawState = '{{ state_json|escapejs }}';
        state = JSON.parse(rawState);
        render(state);
    } catch (e) {
        console.error("Critical error bootstrapping game state:", e);
        toast("Critical error loading game. Please refresh.", "#e74c3c");
    }
});

if (MODE === 'online') {
  setInterval(() => {
    if (isProcessing) return; 
    fetch(`${BASE_URL}/poll/`)
      .then(r => r.json())
      .then(newState => {
        if (!state || newState.seq > state.seq) { state = newState; render(state); }
      })
      .catch(e => console.error(e));
  }, 2500);
}

function toast(msg, color = 'var(--gold)') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.style.borderColor = color; el.style.color = color;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

function canInteract() { return MODE === 'pass_and_play' || state.current_turn === MY_ID; }

function render(st) {
  state = st;
  
  const currPlayer = st.current_player || st.players[st.current_turn];
  
  document.getElementById('turn-dot').style.background = currPlayer.color;
  document.getElementById('turn-name').textContent = currPlayer.name;
  
  if (MODE === 'online' && st.current_turn !== MY_ID) {
    document.getElementById('phase-label').textContent = `Waiting for move...`;
  } else {
    document.getElementById('phase-label').textContent = phase === 'push' ? "Push a Tile" : "Move your piece";
  }

  document.getElementById('rotate-btn').disabled = (phase !== 'push' || !canInteract() || isProcessing);

  buildGrid(st);
  buildSpare(st.spare);
  buildPlayers(st);
  
  if (st.phase === 'over') {
    const winner = st.players.find(p => p.winner);
    if (winner && winner.id !== MY_ID && MODE === 'online') {
       toast(`Game Over! ${winner.name} wins!`, winner.color);
    }
  }
}

function buildGrid(st) {
  const tilesEl = document.getElementById('tiles-layer');
  const buttonsEl = document.getElementById('buttons-layer');
  const meeplesEl = document.getElementById('meeples-layer');
  
  if(!tilesEl || !buttonsEl || !meeplesEl) return;

  tilesEl.innerHTML = '';
  buttonsEl.innerHTML = '';

  const cell = 64; const gap = 3;
  const corners = [[0,0], [0,6], [6,6], [6,0]];
  
  // Safe array fallback
  const reachableArr = st.reachable || [];
  
  for (let r = 0; r < 7; r++) {
    for (let c = 0; c < 7; c++) {
      const t = st.tiles[r][c];
      const isReachable = (phase === 'move') && reachableArr.some(([rr, cc]) => rr === r && cc === c);
      
      const div = document.createElement('div');
      div.className = `tile ${isReachable ? 'reachable' : ''}`;
      div.style.transform = `translate(${c * (cell + gap)}px, ${r * (cell + gap)}px)`;
      
      if (isReachable && canInteract() && !isProcessing) {
        div.style.cursor = 'pointer';
        div.onclick = () => moveTo(r, c);
      }

      const bg = document.createElement('div');
      bg.className = 'tile-bg';
      bg.style.backgroundImage = `url('${getTilePath(t.shape)}')`;
      bg.style.transform = `rotate(${t.rotation * 90}deg)`;
      div.appendChild(bg);

      if (t.character) {
        const img = document.createElement('img');
        img.className = 'tile-char';
        img.src = charImg(t.character);
        img.style.transform = `rotate(-${t.rotation * 90}deg)`;
        bg.appendChild(img);
      }
      
      // Robust home corner rendering
      const cornerIndex = corners.findIndex(pos => pos[0] === r && pos[1] === c);
      const homePlayer = st.players.find(p => p.id === cornerIndex);
      
      if (homePlayer) {
        const homeDot = document.createElement('div');
        homeDot.style.position = 'absolute';
        homeDot.style.width = '18px';
        homeDot.style.height = '18px';
        homeDot.style.borderRadius = '50%';
        homeDot.style.backgroundColor = homePlayer.color;
        homeDot.style.top = '6px';
        homeDot.style.left = '6px';
        homeDot.style.border = '2px solid rgba(255,255,255,0.8)';
        homeDot.style.boxShadow = '0 2px 5px rgba(0,0,0,0.8)';
        homeDot.style.zIndex = '4';
        div.appendChild(homeDot);
      }

      const overlay = document.createElement('div');
      overlay.className = 'tile-overlay';
      div.appendChild(overlay);

      tilesEl.appendChild(div);
    }
  }

  if (phase === 'push' && canInteract() && st.phase !== 'over') {
    const indices = [1, 3, 5];
    const offsets = {
      'top':    { x: c => c*(cell+gap)+cell/2-16, y: () => -28, sym: '▼' },
      'bottom': { x: c => c*(cell+gap)+cell/2-16, y: () => 7*(cell+gap)-4, sym: '▲' },
      'left':   { x: () => -28, y: r => r*(cell+gap)+cell/2-16, sym: '▶' },
      'right':  { x: () => 7*(cell+gap)-4, y: r => r*(cell+gap)+cell/2-16, sym: '◀' }
    };

    const lp = st.last_push;
    const revDir = {'left':'right','right':'left','top':'bottom','bottom':'top'};
    
    ['top','bottom','left','right'].forEach(dir => {
      indices.forEach(idx => {
        if (lp && lp.index === idx && revDir[dir] === lp.direction) return;
        const btn = document.createElement('div');
        btn.className = `push-btn ${isProcessing ? 'disabled' : ''}`;
        const fn = offsets[dir];
        btn.style.left = `${fn.x(idx)}px`;
        btn.style.top = `${fn.y(idx)}px`;
        btn.textContent = fn.sym;
        btn.onclick = () => pushTile(dir, idx);
        buttonsEl.appendChild(btn);
      });
    });
  }

  st.players.forEach(p => {
    let m = document.getElementById(`meeple-${p.id}`);
    if (!m) {
      m = document.createElement('img');
      m.id = `meeple-${p.id}`;
      m.className = 'meeple';
      m.src = getMeeplePath(p.color);
      meeplesEl.appendChild(m);
    }
    m.style.transform = `translate(${p.col * (cell + gap) + cell/2 - 18}px, ${p.row * (cell + gap) + cell/2 - 18}px)`;
  });
}

function buildSpare(sp) {
  const container = document.getElementById('spare-container');
  if(!container) return;
  container.innerHTML = '';
  const bg = document.createElement('div');
  bg.className = 'tile-bg';
  bg.style.backgroundImage = `url('${getTilePath(sp.shape)}')`;
  bg.style.transform = `rotate(${sp.rotation * 90}deg)`;
  
  if (sp.character) {
    const img = document.createElement('img');
    img.className = 'tile-char';
    img.src = charImg(sp.character);
    img.style.transform = `rotate(-${sp.rotation * 90}deg)`;
    bg.appendChild(img);
  }
  container.appendChild(bg);
}

function buildPlayers(st) {
  const list = document.getElementById('players-list');
  if(!list) return;
  list.innerHTML = '';
  
  st.players.forEach(p => {
    const isTurn = (p.id === st.current_turn);
    const card = document.createElement('div');
    card.className = `player-card ${isTurn ? 'active' : ''}`;
    
    const needsHome = p.current_target === null;
    let targetHtml = '';
    
    if (needsHome) {
      targetHtml = `<div style="width:44px; height:44px; border-radius:4px; border:1px solid var(--gold-dim); background: rgba(0,0,0,0.4); display:flex; align-items:center; justify-content:center; box-shadow: inset 0 0 8px rgba(0,0,0,0.8);"><div style="width:24px; height:24px; border-radius:50%; background:${p.color}; border:2px solid rgba(255,255,255,0.8); box-shadow: 0 0 10px ${p.color}; display:flex; align-items:center; justify-content:center; font-size:12px;">🏠</div></div>`;
    } else if (p.current_target === '?') {
      targetHtml = `<div style="width:44px;height:44px;display:flex;align-items:center;justify-content:center;border:1px solid var(--gold-dim);color:var(--gold); font-size: 24px;">?</div>`;
    } else {
      targetHtml = `<img src="${charImg(p.current_target)}" style="width:44px; height:44px; object-fit:contain;">`;
    }

    card.innerHTML = `
      <div class="pcard-header">
        <img src="${getMeeplePath(p.color)}" class="pcard-meeple">
        <span class="pcard-name" style="color: ${p.color}">${p.name} ${p.winner ? '👑' : ''}</span>
      </div>
      <div class="pcard-target">
        ${targetHtml}
        <div style="flex:1;">
          <div style="font-size:0.7rem; color:var(--gold-dim); text-transform:uppercase; margin-bottom:4px;">${needsHome ? 'Return Home!' : 'Hunting'}</div>
          <div style="font-size:0.8rem;">Tokens: <span style="color:#fff">${p.score} / ${p.total_tokens}</span></div>
        </div>
      </div>
    `;
    list.appendChild(card);
  });
}

function rotateSpare() {
  if (!canInteract() || phase !== 'push' || isProcessing) return;
  isProcessing = true;
  fetch(`${BASE_URL}/rotate-spare/`, {method:'POST', headers:{'X-CSRFToken':'{{ csrf_token }}'}})
    .then(r => { if (!r.ok) throw new Error(); return r.json(); })
    .then(st => render(st))
    .catch(e => toast("Server Error! Please try again.", "#e74c3c"))
    .finally(() => isProcessing = false);
}

function pushTile(dir, idx) {
  if (!canInteract() || phase !== 'push' || isProcessing) return;
  isProcessing = true;
  fetch(`${BASE_URL}/push/`, { method: 'POST', headers: {'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}'}, body: JSON.stringify({direction: dir, index: idx}) })
  .then(r => { if (!r.ok) throw new Error(); return r.json(); })
  .then(st => {
    if (st.error) { toast(st.error, '#e74c3c'); return; }
    phase = 'move';
    const currPlayer = st.current_player || st.players[st.current_turn];
    document.documentElement.style.setProperty('--reach-player', currPlayer.color);
    render(st);
  })
  .catch(e => toast("Server Error! Please try again.", "#e74c3c"))
  .finally(() => isProcessing = false);
}

function moveTo(r, c) {
  if (!canInteract() || phase !== 'move' || isProcessing) return;
  isProcessing = true;
  
  const currP = state.current_player || state.players[state.current_turn];
  const previousTarget = currP.current_target;

  fetch(`${BASE_URL}/move/`, { method: 'POST', headers: {'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}'}, body: JSON.stringify({player_id: MY_ID, row: r, col: c}) })
  .then(r => { if (!r.ok) throw new Error(); return r.json(); })
  .then(st => {
    phase = st.phase === 'over' ? 'game_over' : 'push';
    render(st);

    if (st.error) { toast(st.error, '#e74c3c'); return; }
    
    const popup = document.getElementById('treasure-popup');
    const img = document.getElementById('treasure-img');
    const title = document.getElementById('popup-title');
    const btnGroup = document.getElementById('game-over-buttons');
    
    const updatedCurrP = st.current_player || st.players[st.current_turn];

    if (st.message === "PLAYER_WON") {
      title.textContent = `${updatedCurrP.name} WINS!`;
      title.style.color = updatedCurrP.color;
      title.style.textShadow = `0 0 20px ${updatedCurrP.color}`;
      img.src = getMeeplePath(updatedCurrP.color); 
      btnGroup.style.display = 'flex';
      popup.classList.add('show');
    } else if (st.message === "TARGET_FOUND") {
      title.textContent = "Target Found!";
      title.style.color = "var(--gold)";
      title.style.textShadow = "0 0 20px var(--gold)";
      img.src = charImg(previousTarget); 
      btnGroup.style.display = 'none';
      popup.classList.add('show');
      
      setTimeout(() => {
        popup.classList.remove('show');
        if (st.phase !== 'over') toast(`${st.players[st.current_turn].name}'s turn`);
      }, 2500);
    } else {
      if (st.phase !== 'over') toast(`${st.players[st.current_turn].name}'s turn`);
    }
  })
  .catch(e => toast("Server Error! Please try again.", "#e74c3c"))
  .finally(() => isProcessing = false);
}
</script>
</body>
</html>
