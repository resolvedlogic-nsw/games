<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Grass background -->
  <rect width="100" height="100" fill="#5a7a3a"/>
  <!-- Corner path: vertical N half + horizontal E half meeting at centre -->
  <!-- Vertical strip from top to centre -->
  <rect x="30" y="0" width="40" height="70" fill="#c8a96e"/>
  <!-- Horizontal strip from centre to right -->
  <rect x="30" y="30" width="70" height="40" fill="#c8a96e"/>
  <!-- Inner corner rounding (grass patch) -->
  <circle cx="30" cy="30" r="18" fill="#5a7a3a"/>
  <!-- Path texture -->
  <line x1="38" y1="0" x2="38" y2="62" stroke="#b89458" stroke-width="1" opacity="0.5"/>
  <line x1="50" y1="0" x2="50" y2="50" stroke="#d4b47a" stroke-width="1" opacity="0.4"/>
  <line x1="30" y1="38" x2="100" y2="38" stroke="#b89458" stroke-width="1" opacity="0.5"/>
  <line x1="30" y1="50" x2="100" y2="50" stroke="#d4b47a" stroke-width="1" opacity="0.4"/>
  <!-- Grass edge shading -->
  <rect x="0" y="0" width="32" height="100" fill="#4a6a2a" opacity="0.3"/>
  <rect x="0" y="68" width="100" height="32" fill="#4a6a2a" opacity="0.3"/>
</svg>
