<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Grass background -->
  <rect width="100" height="100" fill="#5a7a3a"/>
  <!-- Dirt path - vertical strip N to S -->
  <rect x="30" y="0" width="40" height="100" fill="#c8a96e"/>
  <!-- Path texture lines -->
  <line x1="38" y1="0" x2="38" y2="100" stroke="#b89458" stroke-width="1" opacity="0.5"/>
  <line x1="50" y1="0" x2="50" y2="100" stroke="#d4b47a" stroke-width="1" opacity="0.4"/>
  <line x1="62" y1="0" x2="62" y2="100" stroke="#b89458" stroke-width="1" opacity="0.5"/>
  <!-- Grass edge shading -->
  <rect x="0" y="0" width="32" height="100" fill="#4a6a2a" opacity="0.3"/>
  <rect x="68" y="0" width="32" height="100" fill="#4a6a2a" opacity="0.3"/>
</svg>
