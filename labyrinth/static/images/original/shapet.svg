<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Grass background -->
  <rect width="100" height="100" fill="#5a7a3a"/>
  <!-- Vertical strip N to S (open top and bottom) -->
  <rect x="30" y="0" width="40" height="100" fill="#c8a96e"/>
  <!-- Horizontal strip centre to right (open right, closed left) -->
  <rect x="30" y="30" width="70" height="40" fill="#c8a96e"/>
  <!-- Grass patch - blocks the left/west opening -->
  <rect x="0" y="30" width="32" height="40" fill="#5a7a3a"/>
   
  <!-- Path texture - vertical -->
  <line x1="38" y1="0" x2="38" y2="100" stroke="#b89458" stroke-width="1" opacity="0.5"/>
  <line x1="50" y1="0" x2="50" y2="100" stroke="#d4b47a" stroke-width="1" opacity="0.4"/>
  <line x1="62" y1="0" x2="62" y2="100" stroke="#b89458" stroke-width="1" opacity="0.5"/>
  <!-- Path texture - horizontal (right branch only) -->
  <line x1="44" y1="38" x2="100" y2="38" stroke="#b89458" stroke-width="1" opacity="0.5"/>
  <line x1="44" y1="50" x2="100" y2="50" stroke="#d4b47a" stroke-width="1" opacity="0.4"/>
  <line x1="44" y1="62" x2="100" y2="62" stroke="#b89458" stroke-width="1" opacity="0.5"/>
  <!-- Grass edge shading - left only -->
  <rect x="0" y="0" width="32" height="30" fill="#4a6a2a" opacity="0.35"/>
  <rect x="0" y="70" width="32" height="30" fill="#4a6a2a" opacity="0.35"/>
</svg>
