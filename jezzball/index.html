<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JezzBall (HTML5)</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #111;
    color: #eee;
    font-family: system-ui, sans-serif;
  }
  #ui {
    position: fixed;
    top: 10px;
    left: 10px;
    z-index: 10;
    background: rgba(0,0,0,0.5);
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 14px;
  }
</style>
</head>
<body>

<div id="ui">
  Level: <span id="level">1</span> |
  Lives: <span id="lives">5</span> |
  Captured: <span id="captured">0%</span>
</div>

<canvas id="game"></canvas>

<script type="module" src="jezz.js"></script>
</body>
</html>
